  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080c14; color: #fff; font-family: 'DM Sans', 'Segoe UI', sans-serif; }
    input::placeholder { color: rgba(255,255,255,0.25); }
    select option { background: #0f172a; color: #fff; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px) {
      .grid-4 { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      body { padding: 0 !important; }
      .dash-wrap { padding: 12px !important; }
      .dash-header { flex-direction: column; align-items: flex-start !important; gap: 12px; }
      .dash-header-actions { flex-wrap: wrap; width: 100%; }
      .tab-bar { gap: 6px !important; }
      .tab-bar button { padding: 7px 12px !important; font-size: 12px !important; }
      .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
    @media (max-width: 900px) {
      .dash-header-actions .confirm-box { display: none; }
    }
    .pgn { display:flex; align-items:center; justify-content:flex-end; gap:6px; padding:14px 20px; border-top:1px solid rgba(255,255,255,0.06); flex-wrap:wrap; }
    .pgn-info { font-size:11px; color:rgba(255,255,255,0.3); margin-right:6px; }
    .pgn-btn { min-width:32px; height:32px; padding:0 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.45); font-size:12px; cursor:pointer; transition:all 0.15s; }
    .pgn-btn:hover:not(:disabled) { border-color:rgba(56,189,248,0.5); color:#38bdf8; background:rgba(56,189,248,0.1); }
    .pgn-btn.on { border-color:#38bdf8; color:#38bdf8; background:rgba(56,189,248,0.15); font-weight:700; }
    .pgn-btn:disabled { opacity:0.25; cursor:not-allowed; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .fade-up { animation: fadeUp 0.3s ease; }
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 400px 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @media print {
      body { background: #fff !important; color: #000 !important; }
      .no-print, .tab-bar, .dash-header-actions { display: none !important; }
      .dash-wrap { background: #fff !important; color: #000 !important; padding: 16px !important; }
      .card-base { background: #f9f9f9 !important; border: 1px solid #ddd !important; color: #000 !important; break-inside: avoid; }
      table { border-collapse: collapse !important; width: 100% !important; }
      th, td { border: 1px solid #ccc !important; color: #000 !important; padding: 6px 10px !important; font-size: 11px !important; }
      th { background: #eee !important; font-weight: 700 !important; }
      canvas { max-width: 100% !important; }
      @page { margin: 1.5cm; size: A4 landscape; }
    }
  </style>

// -- SEGURANÇA: rate limiting de login no cliente --
const MAX_LOGIN_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000;
function getLoginAttempts() { try { return parseInt(sessionStorage.getItem("vtr_login_attempts")||"0",10); } catch { return 0; } }
function getLockoutUntil() { try { return parseInt(sessionStorage.getItem("vtr_login_lockout")||"0",10); } catch { return 0; } }
function recordFailedAttempt() {
  try {
    const a = getLoginAttempts() + 1;
    sessionStorage.setItem("vtr_login_attempts", String(a));
    if (a >= MAX_LOGIN_ATTEMPTS) sessionStorage.setItem("vtr_login_lockout", String(Date.now() + LOCKOUT_MS));
  } catch {}
}
function resetLoginAttempts() { try { sessionStorage.removeItem("vtr_login_attempts"); sessionStorage.removeItem("vtr_login_lockout"); } catch {} }
function isLockedOut() { const u=getLockoutUntil(); if(!u)return false; if(Date.now()<u)return true; resetLoginAttempts(); return false; }
function lockoutRemainingSeconds() { const u=getLockoutUntil(); return u?Math.max(0,Math.ceil((u-Date.now())/1000)):0; }

// -- SEGURANÇA: sanitização de strings vindas de planilhas --
function sanitizeStr(v, maxLen=500) {
  if(v===null||v===undefined)return"";
  return String(v).trim().slice(0,maxLen).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,"");
}

  return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:0}).format(v||0);

function formatSaldo(mensalidade, saldo) {
  if (!mensalidade) return "—";
  return formatCurrency(saldo);
}
function calcStatus(mensalidade, custo) {
  if (!mensalidade) return "SEM DADOS";
  const lucro = mensalidade - custo;
  if (lucro < 0) return "PREJUÍZO";
  if (lucro < mensalidade * 0.3) return "RISCO";

}
function limparFantasia(raw) {
  if (!raw) return "";
  let s = String(raw).trim();
  s = s.replace(/\s*\(.*?\)\s*$/, "").trim();
  s = s.replace(/^\(.*?\)\s*/, "").trim();
  return s;
}
function limparEmpresa(raw, cidade) {
  if (!raw) return "";
  let s = String(raw).trim();
  s = s.replace(/\(.*?\)/g, "").trim();
  s = s.replace(/^\d+\.\s*/, "").trim();
  s = s.toUpperCase().trim();
  if (s.includes("CEARÁ") || s.includes("CEARA") || s === "CEARÁ" || s === "CEARA") return "SERVIS CEARÁ";
  if (s.includes("AMAZONAS") || s === "MANAUS") return "SERVIS AMAZONAS";
  if (s.includes("MARANHÃO") || s.includes("MARANHAO")) return "SERVIS MARANHÃO";
  if (s.includes("PIAUÍ") || s.includes("PIAUI") || s.includes("SECOPI")) {
    const c = String(cidade || "").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    if (c.includes("PICOS") || c.includes("FLORIANO") || c.includes("VALENCA")) return "SECOPI PICOS";
    if (c.includes("PARNAI") || c.includes("LUIS CORREIA") || c.includes("CORREIA")) return "SECOPI PARNAÍBA";
    if (c.includes("TERESINA") || c.includes("ALTOS") || c.includes("DEMERVAL") || c.includes("BENEDITINOS")) return "SECOPI TERESINA";
    return "SECOPI";
  }
  if (s.includes("P3") || s.includes("SOLUC")) return "1 P3 SOLUCOES";
  if (s.includes("PROGUARD")) return "2 PROGUARD";
  if (s.includes("MAVER")) return "Maver Monitoramento";
  if (s.includes("SIDERAL")) return "SIDERALTECH";
  if (s.includes("VISION") || s.includes("VISÃO")) return "VISION SEGURANCA";
  if (s.includes("OVERTEC")) return "OVERTEC";
  if (s.includes("LUXUS")) return "3 LUXUS SERVICOS E TECNOLOGIA LTDA";
  if (s.includes("PRIORIDADE")) return "4 PRIORIDADE SERVICOS TERCEIRIZADOS LTDA";
  if (s.includes("PERES")) return "PERES MONITORAMENTO";
  return s;
}
function parseDataHora(str) {
  if (!str) return null;
  const m = String(str).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return new Date(`${m[3]}-${m[2]}-${m[1]}T00:00:00`);
  const d = new Date(str);
  return isNaN(d) ? null : d;
}
function getWeekKey(date) {
  if (!date) return null;
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${yyyy}-${mm}-${dd}`;
}
function weekLabel(key) {
  if (!key) return "—";
  const [y,m,d] = key.split("-");
  const start = new Date(`${y}-${m}-${d}T00:00:00`);
  const end = new Date(start); end.setDate(end.getDate()+6);
  const fmt = dt => `${String(dt.getDate()).padStart(2,"0")}/${String(dt.getMonth()+1).padStart(2,"0")}`;
  return `${fmt(start)} – ${fmt(end)}/${end.getFullYear()}`;
}
function getMonthKey(date) {
  if (!date) return null;
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
const MESES_PT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
function monthLabel(key) {
  if (!key) return "—";
  const [y,m] = key.split("-");
  return `${MESES_PT[parseInt(m)-1]}/${y}`;
}

function Pagination({ total, page, perPage, onChange }) {
  const totalPages = Math.max(1, Math.ceil(total/perPage));
  if (totalPages <= 1) return null;
  const pages = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i===1||i===totalPages||Math.abs(i-page)<=1) pages.push(i);
    else if (pages[pages.length-1]!=="…") pages.push("…");
  }
  return (
    <div className="pgn">
      <span className="pgn-info">Página {page} de {totalPages} · {total} registros</span>
      <button className="pgn-btn" disabled={page===1} onClick={()=>onChange(page-1)}>‹</button>
      {pages.map((p,i)=>p==="…"?<span key={i} style={{color:"rgba(255,255,255,0.2)",fontSize:12,padding:"0 2px"}}>…</span>:<button key={p} className={`pgn-btn${page===p?" on":""}`} onClick={()=>onChange(p)}>{p}</button>)}
      <button className="pgn-btn" disabled={page===totalPages} onClick={()=>onChange(page+1)}>›</button>
    </div>
  );
}

function ComparativoClienteModal({ cliente, periodoKey, keyFn, labelFn, dispatchesFiltrados, tipoVisao, accentAtivo, onClose }) {
  if (!cliente) return null;
  const [obs, setObs] = useState("");
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    const cacheKey = `${cliente.codigo_cliente}||${cliente.filial}`;
    if (obsCache.has(cacheKey)) { setObs(obsCache.get(cacheKey)); return; }
    async function loadObs() {
      const { data } = await supabaseClient.from("clients").select("observacao").eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial).single();
      const valor = data?.observacao || "";
      obsCache.set(cacheKey, valor);
      setObs(valor);
    }
    loadObs();
  }, [cliente.codigo_cliente, cliente.filial]);

  async function salvarObs() {
    setSaving(true);
    await supabaseClient.from("clients").update({ observacao: obs }).eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial);
    const cacheKey = `${cliente.codigo_cliente}||${cliente.filial}`;
    obsCache.set(cacheKey, obs);
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  }

  const meusDeslocs = dispatchesFiltrados.filter(d => {
    const dt = parseDataHora(d.data_hora);
    if (!dt||keyFn(dt)!==periodoKey) return false;
    if (d.codigo_cliente!==cliente.codigo_cliente||d.filial!==cliente.filial) return false;
    if (tipoVisao==="normal"&&d.portaria_inteligente) return false;
    if (tipoVisao==="pi"&&!d.portaria_inteligente) return false;
    return true;
  });
  const eventoMap = {};
  for (const d of meusDeslocs) eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;
  const eventos = Object.entries(eventoMap).sort((a,b)=>b[1]-a[1]);
  const total = meusDeslocs.length;

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }} onClick={onClose}>
      <div style={{ background:"#0f172a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,width:"100%",maxWidth:620,maxHeight:"90vh",overflowY:"auto",padding:28 }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20 }}>
          <div>
            <div style={{ fontSize:17,fontWeight:700,color:"#fff",marginBottom:4 }}>{cliente.nome_cliente}</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)" }}>Cód. {cliente.codigo_cliente} · {cliente.filial}</div>
            <div style={{ marginTop:6,display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:99,background:`${accentAtivo}18`,border:`1px solid ${accentAtivo}40`,fontSize:11,fontWeight:700,color:accentAtivo }}>
              📅 {labelFn(periodoKey)} · {total} eventos
            </div>
          </div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13 }}>✕</button>
        </div>
        {eventos.length===0?(
          <div style={{ textAlign:"center",padding:32,color:"rgba(255,255,255,0.3)",fontSize:13 }}>Nenhum evento encontrado</div>
        ):(
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:14 }}>Motivos dos Deslocamentos</div>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              {eventos.map(([evt,cnt],i)=>{
                const pct=total>0?Math.round((cnt/total)*100):0;
                return (
                  <div key={i}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                      <span style={{ fontSize:12,color:"rgba(255,255,255,0.8)",display:"flex",alignItems:"center",gap:7 }}>
                        <span style={{ width:8,height:8,borderRadius:"50%",background:CHART_COLORS[i%CHART_COLORS.length],flexShrink:0,display:"inline-block" }} />{evt}
                      </span>
                      <span style={{ fontSize:12,fontWeight:700,color:CHART_COLORS[i%CHART_COLORS.length],marginLeft:12,flexShrink:0 }}>{cnt}x · {pct}%</span>
                    </div>
                    <div style={{ height:5,borderRadius:999,background:"rgba(255,255,255,0.06)" }}>
                      <div style={{ height:"100%",width:`${pct}%`,borderRadius:999,background:CHART_COLORS[i%CHART_COLORS.length] }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:10 }}>Observação / Acompanhamento</div>
          <textarea value={obs} onChange={e=>setObs(e.target.value)} placeholder="Ex: Cliente com sensor defeituoso, aguardando visita técnica..." style={{ width:"100%",minHeight:88,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit",lineHeight:1.5 }} onFocus={e=>e.target.style.borderColor=accentAtivo} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"} />
          <div style={{ display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,marginTop:8 }}>
            {saved&&<span style={{ fontSize:12,color:"#34d399",fontWeight:600 }}>✅ Salvo!</span>}
            <button onClick={salvarObs} disabled={saving} style={{ background:accentAtivo,border:"none",color:"#000",borderRadius:8,padding:"8px 20px",cursor:"pointer",fontWeight:700,fontSize:13,opacity:saving?0.6:1 }}>{saving?"Salvando...":"Salvar Observação"}</button>
          </div>
        </div>
        {meusDeslocs.length>0&&(
          <div>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:12 }}>Histórico ({meusDeslocs.length})</div>
            <div style={{ display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto" }}>
              {meusDeslocs.map((d,i)=>(
                <div key={i} style={{ display:"flex",justifyContent:"space-between",padding:"7px 12px",background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:11 }}>
                  <span style={{ color:"rgba(255,255,255,0.75)" }}>{d.evento}</span>
                  <div style={{ display:"flex",gap:14,color:"rgba(255,255,255,0.3)",flexShrink:0,marginLeft:12 }}>
                    <span>{d.viatura}</span><span>{d.data_hora}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Gráfico de tendência geral ──
function TendenciaChart({ periodos, dispatchesFiltrados, keyFn, labelFn, tipoVisao, accentNormal, accentPI, periodoA, periodoB }) {
  const ref=useRef(null); const inst=useRef(null);

  const chartData=useMemo(()=>{
    return periodos.map(p=>{
      let normal=0,pi=0;
      for(const d of dispatchesFiltrados){
        const dt=parseDataHora(d.data_hora);
        if(!dt||keyFn(dt)!==p)continue;
        if(d.portaria_inteligente)pi++;else normal++;
      }
      return{label:labelFn(p),normal,pi,total:normal+pi};
    });
  },[periodos,dispatchesFiltrados,tipoVisao]);

  useEffect(()=>{
    if(!ref.current||!chartData.length)return;
    if(inst.current)inst.current.destroy();
    const labels=chartData.map(d=>d.label);
    const datasets=[];
    if(tipoVisao!=="pi")datasets.push({
      label:"🚗 Normal",data:chartData.map(d=>d.normal),
      borderColor:accentNormal,backgroundColor:accentNormal+"22",
      fill:true,tension:0.35,pointBackgroundColor:chartData.map((_,i)=>{
        const p=periodos[i];
        if(p===periodoA)return accentNormal;
        if(p===periodoB)return "#a78bfa";
        return accentNormal+"88";
      }),
      pointRadius:chartData.map((_,i)=>{const p=periodos[i];return(p===periodoA||p===periodoB)?7:4;}),
      pointHoverRadius:8,borderWidth:2,
    });
    if(tipoVisao!=="normal")datasets.push({
      label:"🏢 Portaria",data:chartData.map(d=>d.pi),
      borderColor:accentPI,backgroundColor:accentPI+"18",
      fill:true,tension:0.35,pointBackgroundColor:accentPI+"aa",
      pointRadius:4,pointHoverRadius:7,borderWidth:2,borderDash:tipoVisao==="ambos"?[4,3]:[],
    });
    inst.current=new Chart(ref.current,{
      type:"line",
      data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{display:tipoVisao==="ambos",labels:{color:"rgba(255,255,255,0.6)",font:{size:11},boxWidth:12}},
          tooltip:{
            backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,
            titleColor:"#fff",bodyColor:"rgba(255,255,255,0.7)",padding:12,
            callbacks:{
              afterBody:(items)=>{
                const idx=items[0]?.dataIndex;
                const p=periodos[idx];
                if(p===periodoA)return["","▶ Período A selecionado"];
                if(p===periodoB)return["","▶ Período B selecionado"];
                return[];
              }
            }
          },
        },
        scales:{
          x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10},maxRotation:35}},
          y:{grid:{color:"rgba(255,255,255,0.06)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}},beginAtZero:true},
        },
        animation:{duration:500},
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(chartData),periodoA,periodoB,tipoVisao]);

  if(!chartData.length)return<div style={{height:260,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.2)",fontSize:12}}>Sem dados suficientes</div>;
  return(
    <div>
      <div style={{position:"relative",height:260}}><canvas ref={ref}/></div>
      {(periodoA||periodoB)&&<div style={{display:"flex",gap:16,marginTop:12,fontSize:11,color:"rgba(255,255,255,0.4)",justifyContent:"center"}}>
        {periodoA&&<span><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:accentNormal,marginRight:5}}/>Período A: <strong style={{color:accentNormal}}>{labelFn(periodoA)}</strong></span>}
        {periodoB&&<span><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:"#a78bfa",marginRight:5}}/>Período B: <strong style={{color:"#a78bfa"}}>{labelFn(periodoB)}</strong></span>}
      </div>}
    </div>
  );
}

// ── Gráfico de barras top clientes A vs B ──
function TopClientesChart({ dataA, dataB, labelA, labelB, accentA, accentB }) {
  const ref=useRef(null); const inst=useRef(null);

  const chartData=useMemo(()=>{
    const allKeys=new Set([...dataA.clientes.map(c=>c.nome_cliente),...dataB.clientes.map(c=>c.nome_cliente)]);
    const mapA=Object.fromEntries(dataA.clientes.map(c=>[c.nome_cliente,c.total]));
    const mapB=Object.fromEntries(dataB.clientes.map(c=>[c.nome_cliente,c.total]));
    const sorted=[...allKeys].map(k=>({nome:k,a:mapA[k]||0,b:mapB[k]||0}))
      .sort((x,y)=>(y.a+y.b)-(x.a+x.b)).slice(0,10);
    return sorted;
  },[dataA,dataB]);

  useEffect(()=>{
    if(!ref.current||!chartData.length)return;
    if(inst.current)inst.current.destroy();
    const labels=chartData.map(d=>d.nome.length>18?d.nome.slice(0,18)+"…":d.nome);
    inst.current=new Chart(ref.current,{
      type:"bar",
      data:{labels,datasets:[
        {label:labelA,data:chartData.map(d=>d.a),backgroundColor:accentA+"99",borderColor:accentA,borderWidth:1,borderRadius:5,borderSkipped:false},
        {label:labelB,data:chartData.map(d=>d.b),backgroundColor:accentB+"88",borderColor:accentB,borderWidth:1,borderRadius:5,borderSkipped:false},
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{labels:{color:"rgba(255,255,255,0.6)",font:{size:11},boxWidth:12}},
          tooltip:{backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,titleColor:"#fff",bodyColor:"rgba(255,255,255,0.7)",padding:12},
        },
        scales:{
          x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10},maxRotation:35}},
          y:{grid:{color:"rgba(255,255,255,0.06)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}},beginAtZero:true},
        },
        animation:{duration:400},
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(chartData),labelA,labelB]);

  if(!chartData.length)return<div style={{height:260,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.2)",fontSize:12}}>Selecione dois períodos para comparar</div>;
  return<div style={{position:"relative",height:260}}><canvas ref={ref}/></div>;
}

// ── Gráfico de barras por filial A vs B ──
function FilialChart({ periodoA, periodoB, labelA, labelB, dispatchesFiltrados, keyFn, tipoVisao, accentA, accentB }) {
  const ref=useRef(null); const inst=useRef(null);

  const chartData=useMemo(()=>{
    const mapA={},mapB={};
    for(const d of dispatchesFiltrados){
      if(tipoVisao==="normal"&&d.portaria_inteligente)continue;
      if(tipoVisao==="pi"&&!d.portaria_inteligente)continue;
      const dt=parseDataHora(d.data_hora);if(!dt||!d.filial)continue;
      const p=keyFn(dt);
      if(p===periodoA)mapA[d.filial]=(mapA[d.filial]||0)+1;
      if(p===periodoB)mapB[d.filial]=(mapB[d.filial]||0)+1;
    }
    const filiais=new Set([...Object.keys(mapA),...Object.keys(mapB)]);
    return [...filiais].map(f=>({filial:f,a:mapA[f]||0,b:mapB[f]||0})).sort((x,y)=>(y.a+y.b)-(x.a+x.b));
  },[periodoA,periodoB,dispatchesFiltrados,tipoVisao]);

  useEffect(()=>{
    if(!ref.current||!chartData.length)return;
    if(inst.current)inst.current.destroy();
    const labels=chartData.map(d=>d.filial.length>14?d.filial.slice(0,14)+"…":d.filial);
    inst.current=new Chart(ref.current,{
      type:"bar",
      data:{labels,datasets:[
        {label:labelA,data:chartData.map(d=>d.a),backgroundColor:accentA+"99",borderColor:accentA,borderWidth:1,borderRadius:5,borderSkipped:false},
        {label:labelB,data:chartData.map(d=>d.b),backgroundColor:accentB+"88",borderColor:accentB,borderWidth:1,borderRadius:5,borderSkipped:false},
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{labels:{color:"rgba(255,255,255,0.6)",font:{size:11},boxWidth:12}},
          tooltip:{
            backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,
            titleColor:"#fff",bodyColor:"rgba(255,255,255,0.7)",padding:12,
            callbacks:{
              afterBody:(items)=>{
                const i=items[0]?.dataIndex;
                const d=chartData[i];
                if(!d)return[];
                const diff=d.a-d.b;
                const pct=d.b>0?Math.round((diff/d.b)*100):null;
                return[`Variação: ${diff>0?"+":""}${diff}${pct!==null?` (${pct>0?"+":""}${pct}%)`:""}` ];
              }
            }
          },
        },
        scales:{
          x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10},maxRotation:35}},
          y:{grid:{color:"rgba(255,255,255,0.06)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}},beginAtZero:true},
        },
        animation:{duration:400},
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(chartData),labelA,labelB]);

  if(!chartData.length)return<div style={{height:220,display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.2)",fontSize:12}}>Sem dados para os períodos selecionados</div>;
  return<div style={{position:"relative",height:220}}><canvas ref={ref}/></div>;
}

function ComparativosPeriodo({ dispatches, dispatchesFiltrados, tipoVisao, periodoTipo }) {
  const isWeek = periodoTipo==="semana";
  const [periodoA, setPeriodoA] = useState("");
  const [periodoB, setPeriodoB] = useState("");
  const [clienteModal, setClienteModal] = useState(null);

  const periodos = useMemo(()=>{
    const s=new Set();
    for (const d of dispatchesFiltrados){const dt=parseDataHora(d.data_hora);if(dt)s.add(isWeek?getWeekKey(dt):getMonthKey(dt));}
    return Array.from(s).filter(Boolean).sort().reverse();
  },[dispatchesFiltrados,isWeek]);

  useEffect(()=>{setPeriodoA("");setPeriodoB("");},[periodoTipo]);
  useEffect(()=>{if(periodos.length>0&&!periodoA)setPeriodoA(periodos[0]);if(periodos.length>1&&!periodoB)setPeriodoB(periodos[1]);},[periodos]);

  const labelFn=isWeek?weekLabel:monthLabel;
  const keyFn=isWeek?getWeekKey:getMonthKey;
  const accentNormal=isWeek?"#38bdf8":"#fb923c";
  const accentPI="#a78bfa";

  function buildData(periodoKey, tipo) {
    if (!periodoKey) return { clientes:[], total:0 };
    const clienteMap={};
    for (const d of dispatchesFiltrados){
      const dt=parseDataHora(d.data_hora);
      if(!dt||keyFn(dt)!==periodoKey)continue;
      if(tipo==="normal"&&d.portaria_inteligente)continue;
      if(tipo==="pi"&&!d.portaria_inteligente)continue;
      const key=`${d.codigo_cliente}||${d.filial}`;
      if(!clienteMap[key])clienteMap[key]={codigo_cliente:d.codigo_cliente,nome_cliente:d.nome_cliente||d.codigo_cliente,filial:d.filial,total:0};
      clienteMap[key].total++;
    }
    const clientes=Object.values(clienteMap).sort((a,b)=>b.total-a.total);
    return {clientes,total:clientes.reduce((s,c)=>s+c.total,0)};
  }

  const dataA_normal=useMemo(()=>buildData(periodoA,"normal"),[periodoA,dispatchesFiltrados]);
  const dataB_normal=useMemo(()=>buildData(periodoB,"normal"),[periodoB,dispatchesFiltrados]);
  const dataA_pi=useMemo(()=>buildData(periodoA,"pi"),[periodoA,dispatchesFiltrados]);
  const dataB_pi=useMemo(()=>buildData(periodoB,"pi"),[periodoB,dispatchesFiltrados]);
  const dataA_ativo=tipoVisao==="pi"?dataA_pi:dataA_normal;
  const dataB_ativo=tipoVisao==="pi"?dataB_pi:dataB_normal;
  const accentAtivo=tipoVisao==="pi"?accentPI:accentNormal;
  const iconeAtivo=tipoVisao==="pi"?"🏢":"🚗";
  const labelTipo=tipoVisao==="pi"?"Portaria Inteligente":"Deslocamentos Normais";
  const variacaoA=dataA_ativo.total, variacaoB=dataB_ativo.total;
  const variacao=variacaoA&&variacaoB?Math.round(((variacaoA-variacaoB)/variacaoB)*100):null;

  const evolucaoData=useMemo(()=>{
    const clienteMap={};
    for (const d of dispatchesFiltrados){
      if(tipoVisao==="normal"&&d.portaria_inteligente)continue;
      if(tipoVisao==="pi"&&!d.portaria_inteligente)continue;
      const key=`${d.codigo_cliente}||${d.filial}`;
      if(!clienteMap[key])clienteMap[key]={codigo:d.codigo_cliente,nome:d.nome_cliente||d.codigo_cliente,filial:d.filial,periodos:{}};
      const dt=parseDataHora(d.data_hora);
      if(!dt)continue;
      const pk=keyFn(dt);
      if(!pk)continue;
      clienteMap[key].periodos[pk]=(clienteMap[key].periodos[pk]||0)+1;
    }
    const clientes=Object.values(clienteMap).map(c=>({...c,total:Object.values(c.periodos).reduce((s,v)=>s+v,0)})).sort((a,b)=>b.total-a.total).slice(0,15);
    return {clientes,periodos:periodos.slice(0,isWeek?8:12)};
  },[dispatchesFiltrados,periodos,tipoVisao,isWeek]);

  if (periodos.length===0) return <EmptyState icon="📅" title="Datas não encontradas" sub="Os deslocamentos importados não contêm datas reconhecíveis para agrupar por período." />;

  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};
  const labelPeriodo=isWeek?"Semana":"Mês";

  return (
    <div>
      <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:20 }}>
        {periodos.length} {isWeek?"semanas":"meses"} disponíveis ·
        <span style={{ marginLeft:6,color:accentAtivo,fontWeight:600 }}>{tipoVisao==="pi"?"🏢 Portaria Inteligente":tipoVisao==="ambos"?"🔀 Normal + PI":"🚗 Normal"}</span>
      </div>

      {/* ── GRÁFICOS COMPARATIVOS — topo ── */}
      <div style={{ marginBottom:28 }}>
        <SectionLabel>📈 Gráficos Comparativos</SectionLabel>

        {/* Linha de tendência */}
        <Card style={{ marginBottom:16 }}>
          <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div>
              <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>Tendência Geral — {isWeek?"Semanas":"Meses"}</div>
              <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>Volume total por {isWeek?"semana":"mês"} · pontos marcados = Período A e B selecionados</div>
            </div>
          </div>
          <div style={{ padding:20 }}>
            <TendenciaChart
              periodos={periodos.slice(0,isWeek?12:18).reverse()}
              dispatchesFiltrados={dispatchesFiltrados}
              keyFn={keyFn} labelFn={labelFn} tipoVisao={tipoVisao}
              accentNormal={accentNormal} accentPI={accentPI}
              periodoA={periodoA} periodoB={periodoB}
            />
          </div>
        </Card>

        {/* Barras A vs B lado a lado */}
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:16 }}>
          {periodoA&&periodoB&&(
            <Card>
              <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>Top Clientes — A vs B</div>
                <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>{labelFn(periodoA)} vs {labelFn(periodoB)}</div>
              </div>
              <div style={{ padding:20 }}>
                <TopClientesChart dataA={dataA_ativo} dataB={dataB_ativo} labelA={labelFn(periodoA)} labelB={labelFn(periodoB)} accentA={accentAtivo} accentB="#a78bfa" />
              </div>
            </Card>
          )}
          {periodoA&&periodoB&&(
            <Card>
              <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>Por Filial — A vs B</div>
                <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>{labelFn(periodoA)} vs {labelFn(periodoB)}</div>

              </div>
            </Card>
          )}
        </div>
      </div>

      <div style={{ marginBottom:28 }}>
        <SectionLabel>Comparação Lado a Lado</SectionLabel>
        <div style={{ display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:16,alignItems:"center",marginBottom:20 }}>
          <div style={{ borderRadius:14,border:`1px solid ${accentAtivo}40`,background:`${accentAtivo}08`,padding:"14px 18px" }}>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:accentAtivo,marginBottom:8 }}>{labelPeriodo} A</div>

              {tipoVisao==="pi"&&(()=>{const vPI=dataA_pi.total&&dataB_pi.total?Math.round(((dataA_pi.total-dataB_pi.total)/dataB_pi.total)*100):null;return <KPICard label="Variação PI A vs B" value={vPI!==null?`${vPI>0?"+":""}${vPI}%`:"—"} sub={vPI>0?"▲ aumento — atenção":"▼ redução — positivo"} icon={vPI>0?"⚠️":"✅"} accent={vPI>0?"#f87171":"#34d399"} />;})()}
            </div>
          </div>
        )}
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:16 }}>
          {[{periodoKey:periodoA,data:dataA_ativo,cor:accentAtivo,lado:"A",piData:dataA_pi},{periodoKey:periodoB,data:dataB_ativo,cor:"#a78bfa",lado:"B",piData:dataB_pi}].map(({periodoKey,data,cor,lado,piData})=>(
            <Card key={lado}>
              <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <div>
                  <span style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:cor }}>{labelPeriodo} {lado}</span>
                  <div style={{ fontSize:13,fontWeight:700,color:"#fff",marginTop:2 }}>{labelFn(periodoKey)}</div>
                  <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{iconeAtivo} {labelTipo}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:22,fontWeight:800,color:cor }}>{data.total}</div>
                  <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>eventos</div>
                  {tipoVisao==="ambos"&&piData.total>0&&<div style={{ fontSize:10,color:"#a78bfa",marginTop:2 }}>+{piData.total} PI</div>}
                </div>
              </div>
              <div style={{ maxHeight:340,overflowY:"auto" }}>
                {data.clientes.length===0?(
                  <div style={{ padding:24,textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:12 }}>Nenhum dado neste período</div>
                ):data.clientes.slice(0,10).map((c,i)=>{
                  const pct=Math.round((c.total/(data.clientes[0]?.total||1))*100);
                  return (
                    <div key={i} onClick={()=>setClienteModal({cliente:c,periodoKey})} style={{ padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background=`${cor}10`} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5 }}>
                        <div style={{ display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0 }}>
                          <span style={{ fontSize:11,fontWeight:800,color:cor,minWidth:20 }}>#{i+1}</span>
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize:12,fontWeight:600,color:cor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:4 }}>{c.nome_cliente}<span style={{ fontSize:9,opacity:0.5 }}>↗</span></div>
                            <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace" }}>{c.codigo_cliente}</div>
                          </div>
                        </div>
                        <span style={{ fontSize:15,fontWeight:800,color:cor,marginLeft:8,flexShrink:0 }}>{c.total}</span>
                      </div>
                      <div style={{ height:3,borderRadius:999,background:"rgba(255,255,255,0.06)" }}>
                        <div style={{ height:"100%",width:`${pct}%`,borderRadius:999,background:cor,opacity:0.7 }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          ))}
        </div>
      </div>
      <EvolucaoTable data={evolucaoData} labelFn={labelFn} periodLabel={isWeek?"semana":"mês"} accentColor={accentAtivo} tipoVisao={tipoVisao} />
      {clienteModal&&(
        <ComparativoClienteModal cliente={clienteModal.cliente} periodoKey={clienteModal.periodoKey} keyFn={keyFn} labelFn={labelFn} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} accentAtivo={accentAtivo} onClose={()=>setClienteModal(null)} />
      )}
    </div>
  );
}

function ComparativosSemanas({ dispatches, filiais, dispatchesFiltrados, tipoVisao }) {
  return <ComparativosPeriodo dispatches={dispatches} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} periodoTipo="semana" />;
}
function ComparativosMeses({ dispatches, dispatchesFiltrados, tipoVisao }) {
  return <ComparativosPeriodo dispatches={dispatches} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} periodoTipo="mes" />;
}

function EvolucaoTable({ data, labelFn, periodLabel, accentColor, tipoVisao }) {
  const bgBase=accentColor==="#fb923c"?"251,146,60":"56,189,248";
  return (
    <div>
      <SectionLabel>Evolução {periodLabel==="mês"?"Mês a Mês":"Semana a Semana"} — Top 15 Clientes</SectionLabel>
      <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:14 }}>
        Últimos {data.periodos.length} {periodLabel==="mês"?"meses":"semanas"} disponíveis · ordenado por volume total
        {tipoVisao!=="ambos"&&<span style={{ marginLeft:8,color:tipoVisao==="pi"?"#a78bfa":accentColor }}>· {tipoVisao==="pi"?"🏢 Portaria Inteligente":"🚗 Normal"}</span>}
      </div>
      <Card style={{ overflow:"auto" }}>
        <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
          <thead>
            <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
              <th style={{ padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)",whiteSpace:"nowrap",position:"sticky",left:0,background:"#0d1220",zIndex:1 }}>Cliente</th>
              <th style={{ padding:"12px 10px",textAlign:"center",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)",whiteSpace:"nowrap" }}>Total</th>
              {data.periodos.map(p=>(
                <th key={p} style={{ padding:"12px 10px",textAlign:"center",fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.25)",whiteSpace:"nowrap",minWidth:76 }}>
                  {periodLabel==="mês"?labelFn(p):(<><div>{labelFn(p).split("–")[0].trim()}</div><div style={{ opacity:0.6 }}>– {labelFn(p).split("–")[1]?.trim()}</div></>)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.clientes.length===0?(
              <tr><td colSpan={data.periodos.length+2} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.25)" }}>Nenhum dado encontrado</td></tr>
            ):data.clientes.map((c,i)=>{
              const maxTotal=data.clientes[0]?.total||1;
              return (
                <tr key={i} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"10px 16px",position:"sticky",left:0,background:"#0d1220",zIndex:1 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                      <span style={{ fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",minWidth:18 }}>#{i+1}</span>
                      <div>
                        <div style={{ fontWeight:600,color:"#fff",fontSize:12,whiteSpace:"nowrap" }}>{c.nome.length>26?c.nome.slice(0,26)+"…":c.nome}</div>
                        <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace" }}>{c.codigo}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ padding:"10px 10px",textAlign:"center" }}>
                    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
                      <span style={{ fontWeight:800,color:accentColor,fontSize:14 }}>{c.total}</span>
                      <div style={{ width:36,height:3,borderRadius:99,background:"rgba(255,255,255,0.06)" }}>
                        <div style={{ height:"100%",width:`${Math.round((c.total/maxTotal)*100)}%`,borderRadius:99,background:accentColor,opacity:0.7 }} />
                      </div>
                    </div>
                  </td>
                  {data.periodos.map((p,pi)=>{
                    const val=c.periodos[p]||0;
                    const prev=pi<data.periodos.length-1?(c.periodos[data.periodos[pi+1]]||0):null;
                    const trend=prev!==null?(val>prev?"▲":val<prev?"▼":"─"):null;
                    const trendColor=val>(prev||0)?"#f87171":val<(prev||0)?"#34d399":"rgba(255,255,255,0.2)";
                    const maxPVal=Math.max(...data.clientes.map(cl=>cl.periodos[p]||0));
                    const intensity=maxPVal>0?val/maxPVal:0;
                    return (
                      <td key={p} style={{ padding:"10px 10px",textAlign:"center" }}>
                        {val>0?(
                          <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:2 }}>
                            <div style={{ width:32,height:24,borderRadius:6,background:`rgba(${bgBase},${0.1+intensity*0.6})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:intensity>0.5?"#fff":accentColor }}>{val}</div>
                            {trend&&<span style={{ fontSize:9,color:trendColor }}>{trend}</span>}
                          </div>
                        ):<span style={{ color:"rgba(255,255,255,0.1)",fontSize:11 }}>—</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
      <div style={{ marginTop:10,fontSize:11,color:"rgba(255,255,255,0.2)",lineHeight:1.7 }}>
        💡 Células com fundo mais intenso = maior volume no período · <span style={{ color:"#f87171" }}>▲ aumento</span> · <span style={{ color:"#34d399" }}>▼ redução</span> em relação ao período anterior
      </div>
    </div>
  );
}

// ── MELHORIA 2: recebe mesFiltro/setMesFiltro como props ──
// ── Gráfico donut de motivos no modal do cliente ──
function ClienteDonutChart({ eventos, total }) {
  const ref=useRef(null);const inst=useRef(null);
  useEffect(()=>{
    if(!ref.current||!eventos.length)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{
      type:"doughnut",
      data:{
        labels:eventos.slice(0,6).map(([e])=>e.length>22?e.slice(0,22)+"…":e),
        datasets:[{data:eventos.slice(0,6).map(([,v])=>v),backgroundColor:CHART_COLORS.map(c=>c+"cc"),borderColor:"#0f172a",borderWidth:2,hoverOffset:6}]
      },
      options:{
        responsive:true,maintainAspectRatio:false,cutout:"68%",
        plugins:{
          legend:{position:"right",labels:{color:"rgba(255,255,255,0.6)",font:{size:10},boxWidth:10,padding:8}},
          tooltip:{backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,titleColor:"#fff",bodyColor:"rgba(255,255,255,0.7)",padding:10,callbacks:{label:(i)=>`${i.label}: ${i.raw}x (${Math.round((i.raw/total)*100)}%)`}},
        },
        animation:{duration:400},
      }
    });
    return()=>{if(inst.current)inst.current.destroy();};
  },[JSON.stringify(eventos)]);
  if(!eventos.length)return null;
  return<div style={{position:"relative",height:180}}><canvas ref={ref}/></div>;
}

// ── Painel de Filiais ──
// ══════════════════════════════════════════════
// MAPA DE CALOR — por Bairro
// ══════════════════════════════════════════════
function MapaCalorTab({ clients, dispatches }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [mesFiltro,setMesFiltro]=useState("Todos");
  const [metrica,setMetrica]=useState("deslocamentos"); // deslocamentos | clientes | prejuizo
  const [bairroSelecionado,setBairroSelecionado]=useState(null);
  const [busca,setBusca]=useState("");

  const filiais=useMemo(()=>{
    const s=new Set(clients.map(c=>c.filial).filter(Boolean));
    return["Todas",...Array.from(s).sort()];
  },[clients]);

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  const dispMap=useMemo(()=>{
    const m={};
    for(const d of dispatches.filter(x=>!x.portaria_inteligente)){
      if(mesFiltro!=="Todos"){const dt=parseDataHora(d.data_hora);if(!dt||getMonthKey(dt)!==mesFiltro)continue;}
      const k=`${d.codigo_cliente}||${d.filial}`;
      m[k]=(m[k]||0)+1;
    }
    return m;
  },[dispatches,mesFiltro]);

  // Agrega dados por bairro
  const dadosBairro=useMemo(()=>{
    const bairroMap={};
    const clientesFiltrados=clients.filter(c=>{
      if(!c.bairro||!c.bairro.trim())return false;
      if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;
      return true;
    });

    for(const c of clientesFiltrados){
      const b=c.bairro.trim();
      if(!bairroMap[b])bairroMap[b]={
        bairro:b,clientes:[],totalDesl:0,totalMens:0,totalCusto:0,
        saudavel:0,risco:0,prejuizo:0,semDados:0
      };
      const key=`${c.codigo_cliente}||${c.filial}`;
      const desl=dispMap[key]||0;
      const mens=parseFloat(c.mensalidade)||0;
      const custoUnit=c.custo_individual||CUSTO_FISCAL;
      const custo=desl*custoUnit;
      const status=calcStatus(mens,custo);
      bairroMap[b].clientes.push({...c,desl,custo,resultado:mens-custo,status});
      bairroMap[b].totalDesl+=desl;
      bairroMap[b].totalMens+=mens;
      bairroMap[b].totalCusto+=custo;
      if(status==="SAUDÁVEL")bairroMap[b].saudavel++;
      else if(status==="RISCO")bairroMap[b].risco++;
      else if(status==="PREJUÍZO")bairroMap[b].prejuizo++;
      else bairroMap[b].semDados++;
    }
    return Object.values(bairroMap).sort((a,b)=>b.totalDesl-a.totalDesl);
  },[clients,dispMap,filialFiltro]);

  const dadosFiltrados=useMemo(()=>{
    if(!busca.trim())return dadosBairro;
    return dadosBairro.filter(d=>d.bairro.toLowerCase().includes(busca.toLowerCase()));
  },[dadosBairro,busca]);

  // Escala de calor baseada na métrica
  const maxValor=useMemo(()=>{
    if(dadosFiltrados.length===0)return 1;
    if(metrica==="deslocamentos")return Math.max(...dadosFiltrados.map(d=>d.totalDesl))||1;
    if(metrica==="clientes")return Math.max(...dadosFiltrados.map(d=>d.clientes.length))||1;
    if(metrica==="prejuizo")return Math.max(...dadosFiltrados.map(d=>d.prejuizo))||1;
    return 1;
  },[dadosFiltrados,metrica]);

  function getValor(d){
    if(metrica==="deslocamentos")return d.totalDesl;
    if(metrica==="clientes")return d.clientes.length;
    if(metrica==="prejuizo")return d.prejuizo;
    return 0;
  }

  function getHeatColor(valor,max){
    if(max===0||valor===0)return{bg:"rgba(255,255,255,0.04)",border:"rgba(255,255,255,0.08)",text:"rgba(255,255,255,0.3)"};
    const intensity=valor/max;
    if(metrica==="prejuizo"){
      // Vermelho para prejuízo
      const r=Math.round(248*intensity+50*(1-intensity));
      const g=Math.round(30*(1-intensity));
      const b=Math.round(30*(1-intensity));
      return{bg:`rgba(${r},${g},${b},${0.15+intensity*0.5})`,border:`rgba(${r},${g},${b},${0.3+intensity*0.4})`,text:intensity>0.4?"#fff":"#f87171"};
    }
    // Azul→roxo→laranja para volume
    if(intensity<0.25)return{bg:"rgba(56,189,248,0.12)",border:"rgba(56,189,248,0.25)",text:"#38bdf8"};
    if(intensity<0.5)return{bg:"rgba(129,140,248,0.2)",border:"rgba(129,140,248,0.4)",text:"#818cf8"};
    if(intensity<0.75)return{bg:"rgba(251,146,60,0.25)",border:"rgba(251,146,60,0.5)",text:"#fb923c"};
    return{bg:"rgba(248,113,113,0.3)",border:"rgba(248,113,113,0.6)",text:"#f87171"};
  }

  const selStyle={padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:12,outline:"none",cursor:"pointer"};
  const bairroSel=bairroSelecionado?dadosBairro.find(d=>d.bairro===bairroSelecionado):null;

  const temBairros=dadosBairro.length>0;

  return(
    <div>
      {/* Header */}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>🔥 Mapa de Calor — por Bairro</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>
            {temBairros?`${dadosBairro.length} bairros com clientes cadastrados`:"Nenhum bairro encontrado — importe clientes com a coluna Bairro preenchida"}
          </div>
        </div>
        <div style={{ display:"flex",gap:8,flexWrap:"wrap",alignItems:"center" }}>
          <select value={filialFiltro} onChange={e=>setFilialFiltro(e.target.value)} style={selStyle}>
            {filiais.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          <select value={mesFiltro} onChange={e=>setMesFiltro(e.target.value)} style={selStyle}>
            {mesesDisponiveis.map(m=><option key={m} value={m}>{m==="Todos"?"Todos os meses":monthLabel(m)}</option>)}
          </select>
        </div>
      </div>

      {!temBairros?(
        <EmptyState icon="🗺️" title="Nenhum bairro cadastrado ainda"
          sub="Reimporte a planilha de clientes com a coluna Bairro preenchida. Após a importação, o mapa de calor será gerado automaticamente." />
      ):(
        <>
          {/* KPIs */}
          <div className="grid-4" style={{ marginBottom:20 }}>
            <KPICard label="Bairros com dados" value={dadosBairro.length} sub={`${dadosBairro.filter(d=>d.totalDesl>0).length} com deslocamentos`} icon="📍" accent="#f472b6" />
            <KPICard label="Total Deslocamentos" value={dadosBairro.reduce((s,d)=>s+d.totalDesl,0)} sub="todos os bairros" icon="🚗" accent="#38bdf8" />
            <KPICard label="Bairro mais ativo" value={dadosBairro[0]?.bairro.slice(0,16)||"—"} sub={`${dadosBairro[0]?.totalDesl||0} deslocamentos`} icon="🔥" accent="#fb923c" />
            <KPICard label="Clientes mapeados" value={dadosBairro.reduce((s,d)=>s+d.clientes.length,0)} sub="com bairro preenchido" icon="👥" accent="#34d399" />
          </div>

          {/* Controles de métrica + busca */}
          <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center" }}>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:600 }}>Colorir por:</div>
            {[["deslocamentos","🚗 Deslocamentos"],["clientes","👥 Clientes"],["prejuizo","🔴 Em Prejuízo"]].map(([v,l])=>(
              <FilterBtn key={v} active={metrica===v} onClick={()=>setMetrica(v)}>{l}</FilterBtn>
            ))}
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Filtrar bairro…"
              style={{ marginLeft:"auto",padding:"7px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:12,outline:"none",width:180 }} />
          </div>

          {/* Legenda */}
          <div style={{ display:"flex",gap:6,marginBottom:16,alignItems:"center",flexWrap:"wrap" }}>
            <span style={{ fontSize:11,color:"rgba(255,255,255,0.35)" }}>Intensidade:</span>
            {metrica==="prejuizo"?
              [["Baixo","rgba(248,113,113,0.15)"],["Médio","rgba(248,80,80,0.35)"],["Alto","rgba(248,50,50,0.55)"],["Crítico","rgba(248,20,20,0.7)"]].map(([l,bg])=>(
                <div key={l} style={{ display:"flex",alignItems:"center",gap:4 }}>
                  <div style={{ width:14,height:14,borderRadius:3,background:bg }} />
                  <span style={{ fontSize:10,color:"rgba(255,255,255,0.4)" }}>{l}</span>
                </div>
              ))
            :[["Baixo","rgba(56,189,248,0.15)"],["Médio-baixo","rgba(129,140,248,0.2)"],["Médio-alto","rgba(251,146,60,0.25)"],["Alto","rgba(248,113,113,0.3)"]].map(([l,bg])=>(
                <div key={l} style={{ display:"flex",alignItems:"center",gap:4 }}>
                  <div style={{ width:14,height:14,borderRadius:3,background:bg }} />
                  <span style={{ fontSize:10,color:"rgba(255,255,255,0.4)" }}>{l}</span>
                </div>
              ))
            }
          </div>

          <div style={{ display:"grid",gridTemplateColumns:"1fr 320px",gap:16,alignItems:"start" }}>
            {/* Grade de calor */}
            <div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8 }}>
                {dadosFiltrados.map(d=>{
                  const val=getValor(d);
                  const heat=getHeatColor(val,maxValor);
                  const ativo=bairroSelecionado===d.bairro;
                  const saudePct=d.clientes.filter(c=>c.status==="SAUDÁVEL").length/Math.max(d.clientes.filter(c=>c.status!=="SEM DADOS").length,1)*100;
                  const bgAtivo=heat.bg.replace(/rgba\((\d+),(\d+),(\d+),[^)]+\)/,"rgba($1,$2,$3,0.35)");
                  return(
                    <div key={d.bairro} onClick={()=>setBairroSelecionado(ativo?null:d.bairro)}
                      style={{ borderRadius:12,border:ativo?`2px solid ${heat.text}`:`1px solid ${heat.border}`,background:ativo?bgAtivo:heat.bg,padding:"12px 14px",cursor:"pointer",transition:"all 0.2s",transform:ativo?"scale(1.02)":"scale(1)" }}
                      onMouseEnter={e=>e.currentTarget.style.transform="scale(1.03)"}
                      onMouseLeave={e=>e.currentTarget.style.transform=ativo?"scale(1.02)":"scale(1)"}>
                      <div style={{ fontSize:12,fontWeight:700,color:heat.text,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>
                        📍 {d.bairro}
                      </div>
                      <div style={{ fontSize:20,fontWeight:800,color:heat.text,marginBottom:4 }}>{val}</div>
                      <div style={{ fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:6 }}>
                        {metrica==="deslocamentos"?"deslocamentos":metrica==="clientes"?"clientes":"em prejuízo"}
                      </div>
                      {/* Mini barra de saúde */}
                      <div style={{ height:3,borderRadius:99,background:"rgba(255,255,255,0.08)",overflow:"hidden" }}>
                        <div style={{ height:"100%",width:`${Math.min(saudePct,100)}%`,borderRadius:99,background:"#34d399",opacity:0.8 }} />
                      </div>
                      <div style={{ display:"flex",justifyContent:"space-between",marginTop:4 }}>
                        <span style={{ fontSize:9,color:"rgba(255,255,255,0.3)" }}>{d.clientes.length} clientes</span>
                        <span style={{ fontSize:9,color:d.prejuizo>0?"#f87171":"rgba(255,255,255,0.3)" }}>{d.prejuizo>0?`${d.prejuizo} prej.`:""}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              {dadosFiltrados.length===0&&(
                <div style={{ textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.25)" }}>
                  Nenhum bairro encontrado para "{busca}"
                </div>
              )}
            </div>

            {/* Painel lateral — detalhe do bairro ou ranking */}
            <div style={{ position:"sticky",top:20 }}>
              {bairroSel?(
                <Card>
                  <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:14,fontWeight:700,color:"#f472b6" }}>📍 {bairroSel.bairro}</div>
                        <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{bairroSel.clientes.length} clientes</div>
                      </div>
                      <button onClick={()=>setBairroSelecionado(null)} style={{ background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:12 }}>✕</button>
                    </div>
                  </div>
                  <div style={{ padding:"14px 18px" }}>
                    {/* Mini KPIs do bairro */}
                    <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14 }}>
                      {[
                        {label:"Deslocamentos",val:bairroSel.totalDesl,color:"#38bdf8"},
                        {label:"Mensalidade",val:formatCurrency(bairroSel.totalMens),color:"#34d399"},
                        {label:"Custo Total",val:formatCurrency(bairroSel.totalCusto),color:"#fb923c"},
                        {label:"Resultado",val:formatCurrency(bairroSel.totalMens-bairroSel.totalCusto),color:(bairroSel.totalMens-bairroSel.totalCusto)>=0?"#34d399":"#f87171"},
                      ].map(k=>(
                        <div key={k.label} style={{ background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",textAlign:"center" }}>
                          <div style={{ fontSize:13,fontWeight:800,color:k.color }}>{k.val}</div>
                          <div style={{ fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2,textTransform:"uppercase" }}>{k.label}</div>
                        </div>
                      ))}
                    </div>
                    {/* Status dos clientes */}
                    <div style={{ display:"flex",gap:6,marginBottom:12,flexWrap:"wrap" }}>
                      {[["SAUDÁVEL","#34d399",bairroSel.saudavel],["RISCO","#fbbf24",bairroSel.risco],["PREJUÍZO","#f87171",bairroSel.prejuizo],["SEM DADOS","#94a3b8",bairroSel.semDados]].filter(([,, v])=>v>0).map(([l,c,v])=>(
                        <span key={l} style={{ fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:`${c}20`,color:c,border:`1px solid ${c}40` }}>{v} {l}</span>
                      ))}
                    </div>
                    {/* Lista de clientes */}
                    <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",marginBottom:8 }}>Clientes</div>
                    <div style={{ maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:4 }}>
                      {bairroSel.clientes.sort((a,b)=>b.desl-a.desl).map((c,i)=>{
                        const statusCfg=STATUS_CONFIG[c.status]||STATUS_CONFIG["SEM DADOS"];
                        return(
                          <div key={i} style={{ padding:"7px 10px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                            <div style={{ minWidth:0 }}>
                              <div style={{ fontSize:11,fontWeight:600,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:140 }}>{c.nome_cliente}</div>
                              <div style={{ fontSize:10,color:"rgba(255,255,255,0.35)" }}>{c.filial}</div>
                            </div>
                            <div style={{ textAlign:"right",flexShrink:0,marginLeft:8 }}>
                              <div style={{ fontSize:12,fontWeight:700,color:"#38bdf8" }}>{c.desl}</div>
                              <span style={{ fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:99,background:statusCfg.bg,color:statusCfg.text }}>{c.status}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </Card>
              ):(
                <Card>
                  <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                    <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>🏆 Ranking de Bairros</div>
                    <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>por {metrica==="deslocamentos"?"deslocamentos":metrica==="clientes"?"clientes":"em prejuízo"} · clique num bairro para detalhes</div>
                  </div>
                  <div style={{ maxHeight:480,overflowY:"auto" }}>
                    {dadosBairro.slice(0,15).map((d,i)=>{
                      const val=getValor(d);
                      const heat=getHeatColor(val,maxValor);
                      const pct=maxValor>0?Math.round((val/maxValor)*100):0;
                      return(
                        <div key={d.bairro} onClick={()=>setBairroSelecionado(d.bairro)}
                          style={{ padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background 0.15s" }}
                          onMouseEnter={e=>e.currentTarget.style.background="rgba(244,114,182,0.06)"}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                            <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                              <span style={{ fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",minWidth:18 }}>#{i+1}</span>
                              <div>
                                <div style={{ fontSize:12,fontWeight:600,color:heat.text }}>{d.bairro}</div>
                                <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>{d.clientes.length} clientes</div>
                              </div>
                            </div>
                            <span style={{ fontSize:15,fontWeight:800,color:heat.text }}>{val}</span>
                          </div>
                          <div style={{ height:3,borderRadius:99,background:"rgba(255,255,255,0.06)" }}>
                            <div style={{ height:"100%",width:`${pct}%`,borderRadius:99,background:heat.text,opacity:0.7,transition:"width 0.4s" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function FiliaisTab({ clients, dispatches }) {
  const [mesFiltro,setMesFiltro]=useState("Todos");
  const mesesDisponiveis=useMemo(()=>{const s=new Set();for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];},[dispatches]);

  const filiaisData=useMemo(()=>{
    const base=mesFiltro==="Todos"?dispatches:dispatches.filter(d=>{const dt=parseDataHora(d.data_hora);return dt&&getMonthKey(dt)===mesFiltro;});
    const normais=base.filter(d=>!d.portaria_inteligente);
    const pi=base.filter(d=>d.portaria_inteligente);
    const filiais=new Set([...clients.map(c=>c.filial),...base.map(d=>d.filial)].filter(Boolean));
    return Array.from(filiais).map(f=>{
      const clientesFil=clients.filter(c=>c.filial===f);
      const desl=normais.filter(d=>d.filial===f).length;
      const piEvt=pi.filter(d=>d.filial===f).length;
      const totalMens=clientesFil.reduce((s,c)=>s+(parseFloat(c.mensalidade)||0),0);
      const custoTotal=desl*(clientesFil[0]?.custo_individual||CUSTO_FISCAL);
      const saldo=totalMens-custoTotal;
      const comMens=clientesFil.filter(c=>c.mensalidade>0);
      const saudavel=comMens.filter(c=>calcStatus(c.mensalidade,desl/(comMens.length||1)*(c.custo_individual||CUSTO_FISCAL))==="SAUDÁVEL").length;
      const saude=comMens.length>0?Math.round((saudavel/comMens.length)*100):null;
      // Último deslocamento
      const deslFil=[...normais,...pi].filter(d=>d.filial===f);
      const datas=deslFil.map(d=>parseDataHora(d.data_hora)).filter(Boolean).sort((a,b)=>b-a);
      const ultimaData=datas[0]?datas[0].toLocaleDateString("pt-BR"):"—";
      const diasSemDados=datas[0]?Math.floor((Date.now()-datas[0].getTime())/(1000*60*60*24)):null;
      return{filial:f,clientes:clientesFil.length,desl,piEvt,totalMens,custoTotal,saldo,saude,ultimaData,diasSemDados};
    }).sort((a,b)=>b.desl-a.desl);
  },[clients,dispatches,mesFiltro]);

  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};

  if(filiaisData.length===0)return<EmptyState icon="🏢" title="Nenhuma filial encontrada" sub="Importe clientes e deslocamentos para ver o painel de filiais." />;

  return(
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>🏢 Painel de Filiais</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{filiaisData.length} filiais · visão executiva consolidada</div>
        </div>
        <select value={mesFiltro} onChange={e=>setMesFiltro(e.target.value)} style={selStyle}>
          {mesesDisponiveis.map(m=><option key={m} value={m}>{m==="Todos"?"Todos os meses":monthLabel(m)}</option>)}
        </select>
      </div>

      {/* Cards de filial */}
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:16,marginBottom:28 }}>
        {filiaisData.map(f=>{
          const saudeColor=f.saude===null?"#94a3b8":f.saude>=70?"#34d399":f.saude>=40?"#fbbf24":"#f87171";
          const saudeLabel=f.saude===null?"SEM DADOS":f.saude>=70?"SAUDÁVEL":f.saude>=40?"ATENÇÃO":"CRÍTICO";
          const alertaDias=f.diasSemDados!==null&&f.diasSemDados>7;
          return(
            <Card key={f.filial}>
              <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>{f.filial}</div>
                  <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{f.clientes} clientes</div>
                </div>
                <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                  <span style={{ fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,background:saudeColor+"20",color:saudeColor,border:`1px solid ${saudeColor}40` }}>{saudeLabel}</span>
                </div>
              </div>
              <div style={{ padding:"14px 18px" }}>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14 }}>
                  {[{label:"Deslocamentos",val:f.desl,color:"#38bdf8"},{label:"Portaria Int.",val:f.piEvt,color:"#a78bfa"},{label:"Mensalidade",val:formatCurrency(f.totalMens),color:"#34d399"}].map(k=>(
                    <div key={k.label} style={{ textAlign:"center",background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 6px" }}>
                      <div style={{ fontSize:16,fontWeight:800,color:k.color }}>{k.val}</div>
                      <div style={{ fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em" }}>{k.label}</div>
                    </div>
                  ))}
                </div>
                {f.totalMens>0&&(
                  <div style={{ display:"flex",justifyContent:"space-between",padding:"8px 12px",borderRadius:8,background:f.saldo>=0?"rgba(52,211,153,0.08)":"rgba(248,113,113,0.08)",border:`1px solid ${f.saldo>=0?"rgba(52,211,153,0.2)":"rgba(248,113,113,0.2)"}`,marginBottom:10 }}>
                    <span style={{ fontSize:11,color:"rgba(255,255,255,0.5)" }}>Resultado</span>
                    <span style={{ fontSize:13,fontWeight:800,color:f.saldo>=0?"#34d399":"#f87171" }}>{formatCurrency(f.saldo)}</span>
                  </div>
                )}
                {/* Barra de saúde */}
                {f.saude!==null&&(
                  <div style={{ marginBottom:10 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                      <span style={{ fontSize:10,color:"rgba(255,255,255,0.4)" }}>Saúde da carteira</span>
                      <span style={{ fontSize:10,fontWeight:700,color:saudeColor }}>{f.saude}%</span>
                    </div>
                    <div style={{ height:6,borderRadius:99,background:"rgba(255,255,255,0.07)",overflow:"hidden" }}>
                      <div style={{ height:"100%",width:`${f.saude}%`,borderRadius:99,background:saudeColor,transition:"width 0.6s" }} />
                    </div>
                  </div>
                )}
                {/* Última atualização */}
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <span style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>Último desl.:</span>
                  <span style={{ fontSize:11,fontWeight:600,color:alertaDias?"#f87171":"rgba(255,255,255,0.5)",display:"flex",alignItems:"center",gap:4 }}>
                    {alertaDias&&<span style={{ fontSize:13 }}>⚠️</span>}
                    {f.ultimaData}
                    {f.diasSemDados!==null&&<span style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>({f.diasSemDados}d)</span>}
                  </span>
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {/* Tabela resumo */}
      <SectionLabel>Resumo Consolidado</SectionLabel>
      <Card>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                {["Filial","Clientes","Desl.","Port. Int.","Mensalidade","Custo Op.","Resultado","Saúde","Último Desl."].map(h=>(
                  <th key={h} style={{ padding:"10px 14px",textAlign:h==="Filial"?"left":"center",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filiaisData.map((f,i)=>{
                const saudeColor=f.saude===null?"#94a3b8":f.saude>=70?"#34d399":f.saude>=40?"#fbbf24":"#f87171";
                const alertaDias=f.diasSemDados!==null&&f.diasSemDados>7;
                return(
                  <tr key={f.filial} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{ padding:"10px 14px",fontWeight:600,color:"#fff" }}>{f.filial}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"rgba(255,255,255,0.5)" }}>{f.clientes}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#38bdf8" }}>{f.desl}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"#a78bfa" }}>{f.piEvt||"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"#34d399" }}>{f.totalMens>0?formatCurrency(f.totalMens):"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"#fb923c" }}>{f.custoTotal>0?formatCurrency(f.custoTotal):"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:f.totalMens>0?(f.saldo>=0?"#34d399":"#f87171"):"rgba(255,255,255,0.2)" }}>{f.totalMens>0?formatCurrency(f.saldo):"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center" }}>
                      {f.saude!==null?<span style={{ fontSize:11,fontWeight:700,color:saudeColor }}>{f.saude}%</span>:<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}
                    </td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:alertaDias?"#f87171":"rgba(255,255,255,0.4)",fontWeight:alertaDias?700:400,fontSize:11 }}>
                      {alertaDias&&"⚠️ "}{f.ultimaData}{f.diasSemDados!==null&&<span style={{ fontSize:10,marginLeft:4,color:"rgba(255,255,255,0.25)" }}>({f.diasSemDados}d)</span>}
                    </td>
                  </tr>
                );
              })}
              <tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}>
                <td style={{ padding:"10px 14px",fontWeight:700,color:"rgba(255,255,255,0.5)",fontSize:11,textTransform:"uppercase" }}>Total</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#fff" }}>{filiaisData.reduce((s,f)=>s+f.clientes,0)}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:800,color:"#38bdf8",fontSize:14 }}>{filiaisData.reduce((s,f)=>s+f.desl,0)}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#a78bfa" }}>{filiaisData.reduce((s,f)=>s+f.piEvt,0)}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#34d399" }}>{formatCurrency(filiaisData.reduce((s,f)=>s+f.totalMens,0))}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#fb923c" }}>{formatCurrency(filiaisData.reduce((s,f)=>s+f.custoTotal,0))}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:800,fontSize:14,color:filiaisData.reduce((s,f)=>s+f.saldo,0)>=0?"#34d399":"#f87171" }}>{formatCurrency(filiaisData.reduce((s,f)=>s+f.saldo,0))}</td>
                <td colSpan={2}></td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function ComparativosTab({ dispatches, clients }) {
  const [subAba,setSubAba]=useState("semanas");
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [areaFiltro,setAreaFiltro]=useState("Todas");
  const [tipoVisao,setTipoVisao]=useState("normal");

  const filiais=useMemo(()=>{const s=new Set(dispatches.map(d=>d.filial).filter(Boolean));return["Todas",...Array.from(s).sort()];},[dispatches]);

  // Áreas disponíveis — apenas para filial SERVIS CEARÁ (ou quando filial filtrada tem áreas)
  const areasDisponiveis=useMemo(()=>{
    const base=filialFiltro==="Todas"?clients:clients.filter(c=>c.filial===filialFiltro);
    const areas=new Set(base.map(c=>String(c.area||"").trim()).filter(Boolean));
    if(areas.size===0)return[];
    return[...areas].sort().map(a=>{
      const coord=base.find(cl=>cl.area===a&&cl.coordenador)?.coordenador||"";
      return{area:a,label:coord?`${a} — ${coord}`:a};
    });
  },[clients,filialFiltro]);

  // Códigos dos clientes da área selecionada
  const codigosArea=useMemo(()=>{
    if(areaFiltro==="Todas")return null;
    const set=new Set(clients.filter(c=>c.area===areaFiltro).map(c=>`${c.codigo_cliente}||${c.filial}`));
    return set.size>0?set:null;
  },[clients,areaFiltro]);

  const dispatchesFiltrados=useMemo(()=>{
    let base=filialFiltro==="Todas"?dispatches:dispatches.filter(d=>d.filial===filialFiltro);
    if(codigosArea)base=base.filter(d=>codigosArea.has(`${d.codigo_cliente}||${d.filial}`));
    return base;
  },[dispatches,filialFiltro,codigosArea]);

  if(dispatches.length===0)return<EmptyState icon="📅" title="Nenhum dado para comparar" sub="Importe deslocamentos com data para visualizar os comparativos." />;
  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};
  return (
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>📅 Comparativos</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>
            Análise comparativa por semana e por mês
            {areaFiltro!=="Todas"&&<span style={{ marginLeft:8,color:"#fb923c",fontWeight:600 }}>· Área {areaFiltro}{areasDisponiveis.find(a=>a.area===areaFiltro)?.label.includes("—")?" — "+areasDisponiveis.find(a=>a.area===areaFiltro)?.label.split("—")[1].trim():""}</span>}
          </div>
        </div>
        <div style={{ display:"flex",gap:10,flexWrap:"wrap",alignItems:"center" }}>
          <select value={filialFiltro} onChange={e=>{setFilialFiltro(e.target.value);setAreaFiltro("Todas");}} style={selStyle}>
            {filiais.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          {areasDisponiveis.length>0&&(
            <select value={areaFiltro} onChange={e=>setAreaFiltro(e.target.value)} style={{ ...selStyle,borderColor:areaFiltro!=="Todas"?"rgba(251,146,60,0.5)":"rgba(255,255,255,0.12)",color:areaFiltro!=="Todas"?"#fb923c":"#fff" }}>
              <option value="Todas">🗂 Todas as áreas</option>
              {areasDisponiveis.map(a=><option key={a.area} value={a.area}>🗂 {a.label}</option>)}
            </select>
          )}
          <div style={{ display:"flex",gap:6 }}>
            {[["normal","🚗 Normal"],["pi","🏢 Port. Int."],["ambos","🔀 Ambos"]].map(([v,l])=>(
              <FilterBtn key={v} active={tipoVisao===v} onClick={()=>setTipoVisao(v)}>{l}</FilterBtn>
            ))}
          </div>
        </div>
      </div>
      <div style={{ display:"flex",gap:6,marginBottom:24,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:16 }}>
