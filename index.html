  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    select option { background: #0f172a; color: #fff; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }

    @media (max-width: 640px) { .grid-4 { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } body { padding: 0 !important; } .dash-wrap { padding: 16px !important; } }

    .pgn-btn:hover:not(:disabled) { border-color:rgba(56,189,248,0.5); color:#38bdf8; background:rgba(56,189,248,0.1); }
    .pgn-btn.on { border-color:#38bdf8; color:#38bdf8; background:rgba(56,189,248,0.15); font-weight:700; }
    .pgn-btn:disabled { opacity:0.25; cursor:not-allowed; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .fade-up { animation: fadeUp 0.3s ease; }
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 400px 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useEffect, useCallback } = React;
const supabaseClient = window._supabaseClient;

const CUSTO_FISCAL = 48;
const CHART_COLORS = ["#38bdf8","#818cf8","#34d399","#fb923c","#f472b6","#a78bfa","#4ade80","#f43f5e","#06b6d4"];
const STATUS_CONFIG = {
  "PREJUÍZO":  { bg:"#ef444420", text:"#f87171", border:"#ef444440", dot:"#f87171" },
  "RISCO":     { bg:"#f59e0b20", text:"#fbbf24", border:"#f59e0b40", dot:"#fbbf24" },
  "SAUDÁVEL":  { bg:"#10b98120", text:"#34d399", border:"#10b98140", dot:"#34d399" },
  "SEM DADOS": { bg:"#ffffff10", text:"rgba(255,255,255,0.3)", border:"#ffffff15", dot:"rgba(255,255,255,0.2)" },
};

const obsCache = new Map();

function formatCurrency(v) {
  return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL",minimumFractionDigits:0}).format(v||0);
}
function formatSaldo(mensalidade, saldo) {
  if (!mensalidade) return "—";
  return formatCurrency(saldo);
}
function calcStatus(mensalidade, custo) {
  if (!mensalidade) return "SEM DADOS";
  const lucro = mensalidade - custo;
  if (lucro < 0) return "PREJUÍZO";
  if (lucro < mensalidade * 0.3) return "RISCO";
  return "SAUDÁVEL";
}
function limparFantasia(raw) {
  if (!raw) return "";
  let s = String(raw).trim();
  s = s.replace(/\s*\(.*?\)\s*$/, "").trim();
  s = s.replace(/^\(.*?\)\s*/, "").trim();
  return s;
}
function limparEmpresa(raw, cidade) {
  if (!raw) return "";
  let s = String(raw).trim();
  s = s.replace(/\(.*?\)/g, "").trim();
  s = s.replace(/^\d+\.\s*/, "").trim();
  s = s.toUpperCase().trim();
  if (s.includes("CEARÁ") || s.includes("CEARA") || s === "CEARÁ" || s === "CEARA") return "SERVIS CEARÁ";
  if (s.includes("AMAZONAS") || s === "MANAUS") return "SERVIS AMAZONAS";
  if (s.includes("MARANHÃO") || s.includes("MARANHAO")) return "SERVIS MARANHÃO";
  if (s.includes("PIAUÍ") || s.includes("PIAUI") || s.includes("SECOPI")) {
    const c = String(cidade || "").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    if (c.includes("PICOS") || c.includes("FLORIANO") || c.includes("VALENCA")) return "SECOPI PICOS";
    if (c.includes("PARNAI") || c.includes("LUIS CORREIA") || c.includes("CORREIA")) return "SECOPI PARNAÍBA";
    if (c.includes("TERESINA") || c.includes("ALTOS") || c.includes("DEMERVAL") || c.includes("BENEDITINOS")) return "SECOPI TERESINA";
    return "SECOPI";
  }
  if (s.includes("P3") || s.includes("SOLUC")) return "1 P3 SOLUCOES";
  if (s.includes("PROGUARD")) return "2 PROGUARD";
  if (s.includes("MAVER")) return "Maver Monitoramento";
  if (s.includes("SIDERAL")) return "SIDERALTECH";
  if (s.includes("VISION") || s.includes("VISÃO")) return "VISION SEGURANCA";
  if (s.includes("OVERTEC")) return "OVERTEC";
  if (s.includes("LUXUS")) return "3 LUXUS SERVICOS E TECNOLOGIA LTDA";
  if (s.includes("PRIORIDADE")) return "4 PRIORIDADE SERVICOS TERCEIRIZADOS LTDA";
  if (s.includes("PERES")) return "PERES MONITORAMENTO";
  return s;
}
function parseDataHora(str) {
  if (!str) return null;
  const m = String(str).match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if (m) return new Date(`${m[3]}-${m[2]}-${m[1]}T00:00:00`);
  const d = new Date(str);
  return isNaN(d) ? null : d;
}
function getWeekKey(date) {
  if (!date) return null;
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  d.setDate(d.getDate() + diff);
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${yyyy}-${mm}-${dd}`;
}
function weekLabel(key) {
  if (!key) return "—";
  const [y,m,d] = key.split("-");
  const start = new Date(`${y}-${m}-${d}T00:00:00`);
  const end = new Date(start); end.setDate(end.getDate()+6);
  const fmt = dt => `${String(dt.getDate()).padStart(2,"0")}/${String(dt.getMonth()+1).padStart(2,"0")}`;
  return `${fmt(start)} – ${fmt(end)}/${end.getFullYear()}`;
}
function getMonthKey(date) {
  if (!date) return null;
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
const MESES_PT = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
function monthLabel(key) {
  if (!key) return "—";
  const [y,m] = key.split("-");
  return `${MESES_PT[parseInt(m)-1]}/${y}`;
}

// ── MELHORIA 3: Skeleton loader para tabelas ──
function TableSkeleton({ rows=8, cols=6 }) {
  return (
    <div style={{ padding:"8px 0" }}>
      {Array.from({length:rows}).map((_,i) => (
        <div key={i} style={{ display:"flex", gap:12, padding:"12px 16px", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
          {Array.from({length:cols}).map((_,j) => (
            <div key={j} className="skeleton" style={{ height:14, flex: j===1?3:1, borderRadius:6 }} />
          ))}
        </div>
      ))}
    </div>
  );
}

// ── MELHORIA 3: Spinner inline leve ──
function InlineSpinner({ label="Carregando..." }) {
  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:10, padding:"40px 20px", color:"rgba(255,255,255,0.3)", fontSize:13 }}>
      <div style={{ width:18, height:18, borderRadius:"50%", border:"2px solid rgba(255,255,255,0.1)", borderTopColor:"#38bdf8", animation:"spin 0.7s linear infinite", flexShrink:0 }} />
      {label}
    </div>
  );
}

function KPICard({ label, value, sub, accent, icon }) {
  return (
    <div style={{ position:"relative", overflow:"hidden", borderRadius:16, border:"1px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.04)", padding:20, boxShadow:`0 0 40px -10px ${accent}44` }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <span style={{ fontSize:10, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", color:"rgba(255,255,255,0.35)" }}>{label}</span>
        <span style={{ fontSize:18 }}>{icon}</span>
      </div>
      <div style={{ fontSize:24, fontWeight:800, color:"#fff" }}>{value}</div>
      {sub && <div style={{ fontSize:11, color:"rgba(255,255,255,0.35)", marginTop:3 }}>{sub}</div>}
      <div style={{ position:"absolute", bottom:-16, right:-16, width:80, height:80, borderRadius:"50%", background:accent, opacity:0.12, filter:"blur(20px)" }} />
    </div>
  );
}
function StatusBadge({ status }) {
  const cfg = STATUS_CONFIG[status] || STATUS_CONFIG["SEM DADOS"];
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap:6, borderRadius:999, border:`1px solid ${cfg.border}`, background:cfg.bg, color:cfg.text, padding:"3px 10px", fontSize:11, fontWeight:700 }}>
      <span style={{ width:6, height:6, borderRadius:"50%", background:cfg.dot }} />{status}
    </span>
  );
}
function SectionLabel({ children }) {
  return (
    <div style={{ fontSize:10, fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", color:"rgba(255,255,255,0.35)", marginBottom:16, display:"flex", alignItems:"center", gap:8 }}>
      <span style={{ height:1, width:16, background:"rgba(255,255,255,0.15)", display:"inline-block" }} />{children}
    </div>
  );
}
function TabBtn({ active, onClick, children, accent }) {
  return (
    <button onClick={onClick} style={{ padding:"9px 20px", borderRadius:10, fontSize:13, fontWeight:600, cursor:"pointer", border:active?`1px solid ${accent||"#38bdf8"}`:"1px solid rgba(255,255,255,0.08)", background:active?`${accent||"#38bdf8"}18`:"transparent", color:active?(accent||"#38bdf8"):"rgba(255,255,255,0.45)", transition:"all 0.15s" }}>
      {children}
    </button>
  );
}
function FilterBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{ padding:"5px 14px", borderRadius:999, fontSize:11, fontWeight:600, cursor:"pointer", border:active?"1px solid #38bdf8":"1px solid rgba(255,255,255,0.1)", background:active?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.04)", color:active?"#38bdf8":"rgba(255,255,255,0.45)", transition:"all 0.15s" }}>
      {children}
    </button>
  );
}
function EmptyState({ icon, title, sub }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"60px 20px", gap:12 }}>
      <div style={{ fontSize:40 }}>{icon}</div>
      <div style={{ fontSize:15, fontWeight:600, color:"rgba(255,255,255,0.4)" }}>{title}</div>
      {sub && <div style={{ fontSize:12, color:"rgba(255,255,255,0.2)", textAlign:"center", maxWidth:340, lineHeight:1.6 }}>{sub}</div>}
    </div>
  );
}
function Card({ children, style }) {
  return <div style={{ borderRadius:16, border:"1px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.04)", overflow:"hidden", ...style }}>{children}</div>;
}
function ColTag({ children, color }) {
  return <span style={{ display:"inline-flex", alignItems:"center", background:`${color}15`, border:`1px solid ${color}30`, borderRadius:6, padding:"2px 8px", fontSize:11, color, fontWeight:600, fontFamily:"monospace" }}>{children}</span>;
}

// ── MELHORIA 2: Filtro de mês compartilhado entre abas ──
function MesFiltroBar({ value, onChange, meses, accent="#38bdf8", label="Período" }) {
  const selStyle = {
    padding:"9px 14px", borderRadius:10,
    border: value!=="Todos" ? `1px solid ${accent}50` : "1px solid rgba(255,255,255,0.12)",
    background: value!=="Todos" ? `${accent}12` : "rgba(255,255,255,0.06)",
    color: value!=="Todos" ? accent : "#fff",
    fontSize:13, fontWeight: value!=="Todos" ? 700 : 400, outline:"none", cursor:"pointer"
  };
  return (
    <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:20, flexWrap:"wrap" }}>
      <div style={{ fontSize:12, color:"rgba(255,255,255,0.4)", fontWeight:600 }}>📅 {label}:</div>
      <select value={value} onChange={e=>onChange(e.target.value)} style={selStyle}>
        {meses.map(m => <option key={m} value={m}>{m==="Todos"?"Todos os meses":monthLabel(m)}</option>)}
      </select>
      {value!=="Todos" && (
        <div style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"4px 12px", borderRadius:99, background:`${accent}10`, border:`1px solid ${accent}25`, fontSize:12, color:accent, fontWeight:600 }}>
          Exibindo: {monthLabel(value)}
          <button onClick={()=>onChange("Todos")} style={{ background:"none", border:"none", color:`${accent}90`, cursor:"pointer", fontSize:13, padding:"0 2px", lineHeight:1 }}>✕</button>
        </div>
      )}
    </div>
  );
}

function BarChart({ data, label, height=220 }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current || !data?.length) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type:"bar",
      data:{ labels:data.map(d=>d.label), datasets:[{ label, data:data.map(d=>d.value), backgroundColor:CHART_COLORS.map(c=>c+"99"), borderColor:CHART_COLORS, borderWidth:1, borderRadius:6, borderSkipped:false }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,titleColor:"#fff",bodyColor:"rgba(255,255,255,0.65)",padding:10} }, scales:{ x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10},maxRotation:35}}, y:{grid:{color:"rgba(255,255,255,0.06)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}},beginAtZero:true} }, animation:{duration:400} },
    });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data)]);
  if (!data?.length) return <div style={{ height, display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(255,255,255,0.2)", fontSize:12 }}>Sem dados</div>;
  return <div style={{ position:"relative", height }}><canvas ref={ref} /></div>;
}
function DonutChart({ data, height=220 }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current || !data?.length) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type:"doughnut",
      data:{ labels:data.map(d=>d.label), datasets:[{ data:data.map(d=>d.value), backgroundColor:CHART_COLORS.map(c=>c+"cc"), borderColor:"#080c14", borderWidth:3, hoverOffset:8 }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:"62%", plugins:{ legend:{position:"right",labels:{color:"rgba(255,255,255,0.55)",font:{size:11},padding:10,boxWidth:12,usePointStyle:true}}, tooltip:{backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,titleColor:"#fff",bodyColor:"rgba(255,255,255,0.65)",padding:10} }, animation:{duration:400} },
    });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data)]);
  if (!data?.length) return <div style={{ height, display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(255,255,255,0.2)", fontSize:12 }}>Sem dados</div>;
  return <div style={{ position:"relative", height }}><canvas ref={ref} /></div>;
}
function LineChart({ data, label, color="#38bdf8", height=220 }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current || !data?.length) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, {
      type:"line",
      data:{ labels:data.map(d=>d.label), datasets:[{ label, data:data.map(d=>d.value), borderColor:color, backgroundColor:color+"18", fill:true, tension:0.4, pointBackgroundColor:color, pointRadius:4, pointHoverRadius:6 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{backgroundColor:"#0f172a",borderColor:"rgba(255,255,255,0.12)",borderWidth:1,titleColor:"#fff",bodyColor:"rgba(255,255,255,0.65)",padding:10} }, scales:{ x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}}}, y:{grid:{color:"rgba(255,255,255,0.06)"},ticks:{color:"rgba(255,255,255,0.4)",font:{size:10}},beginAtZero:true} }, animation:{duration:400} },
    });
    return () => { if (inst.current) inst.current.destroy(); };
  }, [JSON.stringify(data)]);
  if (!data?.length) return <div style={{ height, display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(255,255,255,0.2)", fontSize:12 }}>Sem dados</div>;
  return <div style={{ position:"relative", height }}><canvas ref={ref} /></div>;
}

function Pagination({ total, page, perPage, onChange }) {
  const totalPages = Math.max(1, Math.ceil(total/perPage));
  if (totalPages <= 1) return null;
  const pages = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i===1||i===totalPages||Math.abs(i-page)<=1) pages.push(i);
    else if (pages[pages.length-1]!=="…") pages.push("…");
  }
  return (
    <div className="pgn">
      <span className="pgn-info">Página {page} de {totalPages} · {total} registros</span>
      <button className="pgn-btn" disabled={page===1} onClick={()=>onChange(page-1)}>‹</button>
      {pages.map((p,i)=>p==="…"?<span key={i} style={{color:"rgba(255,255,255,0.2)",fontSize:12,padding:"0 2px"}}>…</span>:<button key={p} className={`pgn-btn${page===p?" on":""}`} onClick={()=>onChange(p)}>{p}</button>)}
      <button className="pgn-btn" disabled={page===totalPages} onClick={()=>onChange(page+1)}>›</button>
    </div>
  );
}
function DropZone({ color, fileName, inputRef, onChange, label }) {
  return (
    <div onClick={()=>inputRef.current?.click()} style={{ border:`2px dashed ${color}40`, borderRadius:12, padding:"28px 20px", textAlign:"center", cursor:"pointer", background:`${color}06`, transition:"all 0.15s" }}
      onMouseEnter={e=>e.currentTarget.style.borderColor=`${color}80`}
      onMouseLeave={e=>e.currentTarget.style.borderColor=`${color}40`}>
      <div style={{ fontSize:28, marginBottom:8 }}>📂</div>
      <div style={{ fontSize:13, color:fileName?"#fff":"rgba(255,255,255,0.45)", marginBottom:4, fontWeight:fileName?600:400 }}>{fileName||label}</div>
      <div style={{ fontSize:11, color:"rgba(255,255,255,0.2)" }}>.xlsx ou .xls</div>
      <input ref={inputRef} type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={onChange} />
    </div>
  );
}

function ComparativoClienteModal({ cliente, periodoKey, keyFn, labelFn, dispatchesFiltrados, tipoVisao, accentAtivo, onClose }) {
  if (!cliente) return null;
  const [obs, setObs] = useState("");
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    const cacheKey = `${cliente.codigo_cliente}||${cliente.filial}`;
    if (obsCache.has(cacheKey)) { setObs(obsCache.get(cacheKey)); return; }
    async function loadObs() {
      const { data } = await supabaseClient.from("clients").select("observacao").eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial).single();
      const valor = data?.observacao || "";
      obsCache.set(cacheKey, valor);
      setObs(valor);
    }
    loadObs();
  }, [cliente.codigo_cliente, cliente.filial]);

  async function salvarObs() {
    setSaving(true);
    await supabaseClient.from("clients").update({ observacao: obs }).eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial);
    const cacheKey = `${cliente.codigo_cliente}||${cliente.filial}`;
    obsCache.set(cacheKey, obs);
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  }

  const meusDeslocs = dispatchesFiltrados.filter(d => {
    const dt = parseDataHora(d.data_hora);
    if (!dt||keyFn(dt)!==periodoKey) return false;
    if (d.codigo_cliente!==cliente.codigo_cliente||d.filial!==cliente.filial) return false;
    if (tipoVisao==="normal"&&d.portaria_inteligente) return false;
    if (tipoVisao==="pi"&&!d.portaria_inteligente) return false;
    return true;
  });
  const eventoMap = {};
  for (const d of meusDeslocs) eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;
  const eventos = Object.entries(eventoMap).sort((a,b)=>b[1]-a[1]);
  const total = meusDeslocs.length;

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }} onClick={onClose}>
      <div style={{ background:"#0f172a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,width:"100%",maxWidth:620,maxHeight:"90vh",overflowY:"auto",padding:28 }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20 }}>
          <div>
            <div style={{ fontSize:17,fontWeight:700,color:"#fff",marginBottom:4 }}>{cliente.nome_cliente}</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)" }}>Cód. {cliente.codigo_cliente} · {cliente.filial}</div>
            <div style={{ marginTop:6,display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:99,background:`${accentAtivo}18`,border:`1px solid ${accentAtivo}40`,fontSize:11,fontWeight:700,color:accentAtivo }}>
              📅 {labelFn(periodoKey)} · {total} eventos
            </div>
          </div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13 }}>✕</button>
        </div>
        {eventos.length===0?(
          <div style={{ textAlign:"center",padding:32,color:"rgba(255,255,255,0.3)",fontSize:13 }}>Nenhum evento encontrado</div>
        ):(
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:14 }}>Motivos dos Deslocamentos</div>
            <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
              {eventos.map(([evt,cnt],i)=>{
                const pct=total>0?Math.round((cnt/total)*100):0;
                return (
                  <div key={i}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                      <span style={{ fontSize:12,color:"rgba(255,255,255,0.8)",display:"flex",alignItems:"center",gap:7 }}>
                        <span style={{ width:8,height:8,borderRadius:"50%",background:CHART_COLORS[i%CHART_COLORS.length],flexShrink:0,display:"inline-block" }} />{evt}
                      </span>
                      <span style={{ fontSize:12,fontWeight:700,color:CHART_COLORS[i%CHART_COLORS.length],marginLeft:12,flexShrink:0 }}>{cnt}x · {pct}%</span>
                    </div>
                    <div style={{ height:5,borderRadius:999,background:"rgba(255,255,255,0.06)" }}>
                      <div style={{ height:"100%",width:`${pct}%`,borderRadius:999,background:CHART_COLORS[i%CHART_COLORS.length] }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        <div style={{ marginBottom:20 }}>
          <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:10 }}>Observação / Acompanhamento</div>
          <textarea value={obs} onChange={e=>setObs(e.target.value)} placeholder="Ex: Cliente com sensor defeituoso, aguardando visita técnica..." style={{ width:"100%",minHeight:88,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit",lineHeight:1.5 }} onFocus={e=>e.target.style.borderColor=accentAtivo} onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.1)"} />
          <div style={{ display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,marginTop:8 }}>
            {saved&&<span style={{ fontSize:12,color:"#34d399",fontWeight:600 }}>✅ Salvo!</span>}
            <button onClick={salvarObs} disabled={saving} style={{ background:accentAtivo,border:"none",color:"#000",borderRadius:8,padding:"8px 20px",cursor:"pointer",fontWeight:700,fontSize:13,opacity:saving?0.6:1 }}>{saving?"Salvando...":"Salvar Observação"}</button>
          </div>
        </div>
        {meusDeslocs.length>0&&(
          <div>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:12 }}>Histórico ({meusDeslocs.length})</div>
            <div style={{ display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto" }}>
              {meusDeslocs.map((d,i)=>(
                <div key={i} style={{ display:"flex",justifyContent:"space-between",padding:"7px 12px",background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:11 }}>
                  <span style={{ color:"rgba(255,255,255,0.75)" }}>{d.evento}</span>
                  <div style={{ display:"flex",gap:14,color:"rgba(255,255,255,0.3)",flexShrink:0,marginLeft:12 }}>
                    <span>{d.viatura}</span><span>{d.data_hora}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ComparativosPeriodo({ dispatches, dispatchesFiltrados, tipoVisao, periodoTipo }) {
  const isWeek = periodoTipo==="semana";
  const [periodoA, setPeriodoA] = useState("");
  const [periodoB, setPeriodoB] = useState("");
  const [clienteModal, setClienteModal] = useState(null);

  const periodos = useMemo(()=>{
    const s=new Set();
    for (const d of dispatchesFiltrados){const dt=parseDataHora(d.data_hora);if(dt)s.add(isWeek?getWeekKey(dt):getMonthKey(dt));}
    return Array.from(s).filter(Boolean).sort().reverse();
  },[dispatchesFiltrados,isWeek]);

  useEffect(()=>{setPeriodoA("");setPeriodoB("");},[periodoTipo]);
  useEffect(()=>{if(periodos.length>0&&!periodoA)setPeriodoA(periodos[0]);if(periodos.length>1&&!periodoB)setPeriodoB(periodos[1]);},[periodos]);

  const labelFn=isWeek?weekLabel:monthLabel;
  const keyFn=isWeek?getWeekKey:getMonthKey;
  const accentNormal=isWeek?"#38bdf8":"#fb923c";
  const accentPI="#a78bfa";

  function buildData(periodoKey, tipo) {
    if (!periodoKey) return { clientes:[], total:0 };
    const clienteMap={};
    for (const d of dispatchesFiltrados){
      const dt=parseDataHora(d.data_hora);
      if(!dt||keyFn(dt)!==periodoKey)continue;
      if(tipo==="normal"&&d.portaria_inteligente)continue;
      if(tipo==="pi"&&!d.portaria_inteligente)continue;
      const key=`${d.codigo_cliente}||${d.filial}`;
      if(!clienteMap[key])clienteMap[key]={codigo_cliente:d.codigo_cliente,nome_cliente:d.nome_cliente||d.codigo_cliente,filial:d.filial,total:0};
      clienteMap[key].total++;
    }
    const clientes=Object.values(clienteMap).sort((a,b)=>b.total-a.total);
    return {clientes,total:clientes.reduce((s,c)=>s+c.total,0)};
  }

  const dataA_normal=useMemo(()=>buildData(periodoA,"normal"),[periodoA,dispatchesFiltrados]);
  const dataB_normal=useMemo(()=>buildData(periodoB,"normal"),[periodoB,dispatchesFiltrados]);
  const dataA_pi=useMemo(()=>buildData(periodoA,"pi"),[periodoA,dispatchesFiltrados]);
  const dataB_pi=useMemo(()=>buildData(periodoB,"pi"),[periodoB,dispatchesFiltrados]);
  const dataA_ativo=tipoVisao==="pi"?dataA_pi:dataA_normal;
  const dataB_ativo=tipoVisao==="pi"?dataB_pi:dataB_normal;
  const accentAtivo=tipoVisao==="pi"?accentPI:accentNormal;
  const iconeAtivo=tipoVisao==="pi"?"🏢":"🚗";
  const labelTipo=tipoVisao==="pi"?"Portaria Inteligente":"Deslocamentos Normais";
  const variacaoA=dataA_ativo.total, variacaoB=dataB_ativo.total;
  const variacao=variacaoA&&variacaoB?Math.round(((variacaoA-variacaoB)/variacaoB)*100):null;

  const evolucaoData=useMemo(()=>{
    const clienteMap={};
    for (const d of dispatchesFiltrados){
      if(tipoVisao==="normal"&&d.portaria_inteligente)continue;
      if(tipoVisao==="pi"&&!d.portaria_inteligente)continue;
      const key=`${d.codigo_cliente}||${d.filial}`;
      if(!clienteMap[key])clienteMap[key]={codigo:d.codigo_cliente,nome:d.nome_cliente||d.codigo_cliente,filial:d.filial,periodos:{}};
      const dt=parseDataHora(d.data_hora);
      if(!dt)continue;
      const pk=keyFn(dt);
      if(!pk)continue;
      clienteMap[key].periodos[pk]=(clienteMap[key].periodos[pk]||0)+1;
    }
    const clientes=Object.values(clienteMap).map(c=>({...c,total:Object.values(c.periodos).reduce((s,v)=>s+v,0)})).sort((a,b)=>b.total-a.total).slice(0,15);
    return {clientes,periodos:periodos.slice(0,isWeek?8:12)};
  },[dispatchesFiltrados,periodos,tipoVisao,isWeek]);

  if (periodos.length===0) return <EmptyState icon="📅" title="Datas não encontradas" sub="Os deslocamentos importados não contêm datas reconhecíveis para agrupar por período." />;

  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};
  const labelPeriodo=isWeek?"Semana":"Mês";

  return (
    <div>
      <div style={{ fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:20 }}>
        {periodos.length} {isWeek?"semanas":"meses"} disponíveis ·
        <span style={{ marginLeft:6,color:accentAtivo,fontWeight:600 }}>{tipoVisao==="pi"?"🏢 Portaria Inteligente":tipoVisao==="ambos"?"🔀 Normal + PI":"🚗 Normal"}</span>
      </div>
      <div style={{ marginBottom:28 }}>
        <SectionLabel>Comparação Lado a Lado</SectionLabel>
        <div style={{ display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:16,alignItems:"center",marginBottom:20 }}>
          <div style={{ borderRadius:14,border:`1px solid ${accentAtivo}40`,background:`${accentAtivo}08`,padding:"14px 18px" }}>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:accentAtivo,marginBottom:8 }}>{labelPeriodo} A</div>
            <select value={periodoA} onChange={e=>setPeriodoA(e.target.value)} style={{ ...selStyle,width:"100%",border:`1px solid ${accentAtivo}40`,background:`${accentAtivo}12`,color:accentAtivo,fontWeight:700 }}>
              {periodos.map(p=><option key={p} value={p}>{labelFn(p)}</option>)}
            </select>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:22,color:"rgba(255,255,255,0.2)" }}>⇄</div>
            {variacao!==null&&<div style={{ fontSize:12,fontWeight:700,color:variacao>0?"#f87171":"#34d399",marginTop:4 }}>{variacao>0?"▲":"▼"} {Math.abs(variacao)}%</div>}
          </div>
          <div style={{ borderRadius:14,border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.05)",padding:"14px 18px" }}>
            <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#a78bfa",marginBottom:8 }}>{labelPeriodo} B</div>
            <select value={periodoB} onChange={e=>setPeriodoB(e.target.value)} style={{ ...selStyle,width:"100%",border:"1px solid rgba(167,139,250,0.3)",background:"rgba(167,139,250,0.08)",color:"#a78bfa",fontWeight:700 }}>
              {periodos.map(p=><option key={p} value={p}>{labelFn(p)}</option>)}
            </select>
          </div>
        </div>
        {(tipoVisao==="normal"||tipoVisao==="ambos")&&(
          <div style={{ marginBottom:16 }}>
            {tipoVisao==="ambos"&&<div style={{ fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:10 }}>🚗 Deslocamentos Normais</div>}
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12 }}>
              <KPICard label={`${labelPeriodo} A — Normal`} value={dataA_normal.total} sub={labelFn(periodoA)} icon="🚗" accent={accentNormal} />
              <KPICard label={`${labelPeriodo} B — Normal`} value={dataB_normal.total} sub={labelFn(periodoB)} icon="🚗" accent="#a78bfa" />
              {tipoVisao==="normal"&&<KPICard label="Variação" value={variacao!==null?`${variacao>0?"+":""}${variacao}%`:"—"} sub="A vs B" icon={variacao>0?"📈":"📉"} accent={variacao>0?"#f87171":"#34d399"} />}
            </div>
          </div>
        )}
        {(tipoVisao==="pi"||tipoVisao==="ambos")&&(
          <div style={{ marginBottom:16 }}>
            {tipoVisao==="ambos"&&<div style={{ fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)",marginBottom:10 }}>🏢 Portaria Inteligente</div>}
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12 }}>
              <KPICard label={`${labelPeriodo} A — PI`} value={dataA_pi.total} sub={labelFn(periodoA)} icon="🏢" accent={accentNormal} />
              <KPICard label={`${labelPeriodo} B — PI`} value={dataB_pi.total} sub={labelFn(periodoB)} icon="🏢" accent="#a78bfa" />
              {tipoVisao==="pi"&&(()=>{const vPI=dataA_pi.total&&dataB_pi.total?Math.round(((dataA_pi.total-dataB_pi.total)/dataB_pi.total)*100):null;return <KPICard label="Variação PI" value={vPI!==null?`${vPI>0?"+":""}${vPI}%`:"—"} sub="A vs B" icon={vPI>0?"📈":"📉"} accent={vPI>0?"#f87171":"#34d399"} />;})()}
            </div>
          </div>
        )}
        <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:16 }}>
          {[{periodoKey:periodoA,data:dataA_ativo,cor:accentAtivo,lado:"A",piData:dataA_pi},{periodoKey:periodoB,data:dataB_ativo,cor:"#a78bfa",lado:"B",piData:dataB_pi}].map(({periodoKey,data,cor,lado,piData})=>(
            <Card key={lado}>
              <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <div>
                  <span style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:cor }}>{labelPeriodo} {lado}</span>
                  <div style={{ fontSize:13,fontWeight:700,color:"#fff",marginTop:2 }}>{labelFn(periodoKey)}</div>
                  <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{iconeAtivo} {labelTipo}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:22,fontWeight:800,color:cor }}>{data.total}</div>
                  <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>eventos</div>
                  {tipoVisao==="ambos"&&piData.total>0&&<div style={{ fontSize:10,color:"#a78bfa",marginTop:2 }}>+{piData.total} PI</div>}
                </div>
              </div>
              <div style={{ maxHeight:340,overflowY:"auto" }}>
                {data.clientes.length===0?(
                  <div style={{ padding:24,textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:12 }}>Nenhum dado neste período</div>
                ):data.clientes.slice(0,10).map((c,i)=>{
                  const pct=Math.round((c.total/(data.clientes[0]?.total||1))*100);
                  return (
                    <div key={i} onClick={()=>setClienteModal({cliente:c,periodoKey})} style={{ padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background=`${cor}10`} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5 }}>
                        <div style={{ display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0 }}>
                          <span style={{ fontSize:11,fontWeight:800,color:cor,minWidth:20 }}>#{i+1}</span>
                          <div style={{ minWidth:0 }}>
                            <div style={{ fontSize:12,fontWeight:600,color:cor,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:4 }}>{c.nome_cliente}<span style={{ fontSize:9,opacity:0.5 }}>↗</span></div>
                            <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace" }}>{c.codigo_cliente}</div>
                          </div>
                        </div>
                        <span style={{ fontSize:15,fontWeight:800,color:cor,marginLeft:8,flexShrink:0 }}>{c.total}</span>
                      </div>
                      <div style={{ height:3,borderRadius:999,background:"rgba(255,255,255,0.06)" }}>
                        <div style={{ height:"100%",width:`${pct}%`,borderRadius:999,background:cor,opacity:0.7 }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </Card>
          ))}
        </div>
      </div>
      <EvolucaoTable data={evolucaoData} labelFn={labelFn} periodLabel={isWeek?"semana":"mês"} accentColor={accentAtivo} tipoVisao={tipoVisao} />
      {clienteModal&&(
        <ComparativoClienteModal cliente={clienteModal.cliente} periodoKey={clienteModal.periodoKey} keyFn={keyFn} labelFn={labelFn} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} accentAtivo={accentAtivo} onClose={()=>setClienteModal(null)} />
      )}
    </div>
  );
}

function ComparativosSemanas({ dispatches, filiais, dispatchesFiltrados, tipoVisao }) {
  return <ComparativosPeriodo dispatches={dispatches} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} periodoTipo="semana" />;
}
function ComparativosMeses({ dispatches, dispatchesFiltrados, tipoVisao }) {
  return <ComparativosPeriodo dispatches={dispatches} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} periodoTipo="mes" />;
}

function EvolucaoTable({ data, labelFn, periodLabel, accentColor, tipoVisao }) {
  const bgBase=accentColor==="#fb923c"?"251,146,60":"56,189,248";
  return (
    <div>
      <SectionLabel>Evolução {periodLabel==="mês"?"Mês a Mês":"Semana a Semana"} — Top 15 Clientes</SectionLabel>
      <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:14 }}>
        Últimos {data.periodos.length} {periodLabel==="mês"?"meses":"semanas"} disponíveis · ordenado por volume total
        {tipoVisao!=="ambos"&&<span style={{ marginLeft:8,color:tipoVisao==="pi"?"#a78bfa":accentColor }}>· {tipoVisao==="pi"?"🏢 Portaria Inteligente":"🚗 Normal"}</span>}
      </div>
      <Card style={{ overflow:"auto" }}>
        <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
          <thead>
            <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
              <th style={{ padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)",whiteSpace:"nowrap",position:"sticky",left:0,background:"#0d1220",zIndex:1 }}>Cliente</th>
              <th style={{ padding:"12px 10px",textAlign:"center",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)",whiteSpace:"nowrap" }}>Total</th>
              {data.periodos.map(p=>(
                <th key={p} style={{ padding:"12px 10px",textAlign:"center",fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.25)",whiteSpace:"nowrap",minWidth:76 }}>
                  {periodLabel==="mês"?labelFn(p):(<><div>{labelFn(p).split("–")[0].trim()}</div><div style={{ opacity:0.6 }}>– {labelFn(p).split("–")[1]?.trim()}</div></>)}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {data.clientes.length===0?(
              <tr><td colSpan={data.periodos.length+2} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.25)" }}>Nenhum dado encontrado</td></tr>
            ):data.clientes.map((c,i)=>{
              const maxTotal=data.clientes[0]?.total||1;
              return (
                <tr key={i} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"10px 16px",position:"sticky",left:0,background:"#0d1220",zIndex:1 }}>
                    <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                      <span style={{ fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",minWidth:18 }}>#{i+1}</span>
                      <div>
                        <div style={{ fontWeight:600,color:"#fff",fontSize:12,whiteSpace:"nowrap" }}>{c.nome.length>26?c.nome.slice(0,26)+"…":c.nome}</div>
                        <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",fontFamily:"monospace" }}>{c.codigo}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{ padding:"10px 10px",textAlign:"center" }}>
                    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}>
                      <span style={{ fontWeight:800,color:accentColor,fontSize:14 }}>{c.total}</span>
                      <div style={{ width:36,height:3,borderRadius:99,background:"rgba(255,255,255,0.06)" }}>
                        <div style={{ height:"100%",width:`${Math.round((c.total/maxTotal)*100)}%`,borderRadius:99,background:accentColor,opacity:0.7 }} />
                      </div>
                    </div>
                  </td>
                  {data.periodos.map((p,pi)=>{
                    const val=c.periodos[p]||0;
                    const prev=pi<data.periodos.length-1?(c.periodos[data.periodos[pi+1]]||0):null;
                    const trend=prev!==null?(val>prev?"▲":val<prev?"▼":"─"):null;
                    const trendColor=val>(prev||0)?"#f87171":val<(prev||0)?"#34d399":"rgba(255,255,255,0.2)";
                    const maxPVal=Math.max(...data.clientes.map(cl=>cl.periodos[p]||0));
                    const intensity=maxPVal>0?val/maxPVal:0;
                    return (
                      <td key={p} style={{ padding:"10px 10px",textAlign:"center" }}>
                        {val>0?(
                          <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:2 }}>
                            <div style={{ width:32,height:24,borderRadius:6,background:`rgba(${bgBase},${0.1+intensity*0.6})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:intensity>0.5?"#fff":accentColor }}>{val}</div>
                            {trend&&<span style={{ fontSize:9,color:trendColor }}>{trend}</span>}
                          </div>
                        ):<span style={{ color:"rgba(255,255,255,0.1)",fontSize:11 }}>—</span>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </Card>
      <div style={{ marginTop:10,fontSize:11,color:"rgba(255,255,255,0.2)",lineHeight:1.7 }}>
        💡 Células com fundo mais intenso = maior volume no período · <span style={{ color:"#f87171" }}>▲ aumento</span> · <span style={{ color:"#34d399" }}>▼ redução</span> em relação ao período anterior
      </div>
    </div>
  );
}

// ── MELHORIA 2: recebe mesFiltro/setMesFiltro como props ──

        <button onClick={()=>setSubAba("meses")} style={{ padding:"8px 20px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:subAba==="meses"?"1px solid #fb923c":"1px solid rgba(255,255,255,0.08)",background:subAba==="meses"?"rgba(251,146,60,0.12)":"rgba(255,255,255,0.03)",color:subAba==="meses"?"#fb923c":"rgba(255,255,255,0.4)",transition:"all 0.15s" }}>📆 Meses</button>

// ── MELHORIA 2: recebe mesFiltro/setMesFiltro/mesesTodos como props ──
function PortariaTab({ dispatches, clients, supabaseClient, mesFiltro, setMesFiltro, mesesTodos }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [clienteSelecionado,setClienteSelecionado]=useState(null);
  const [loadingTabela,setLoadingTabela]=useState(false); // MELHORIA 3

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches.filter(x=>x.portaria_inteligente)){
      const dt=parseDataHora(d.data_hora);
      if(dt){const mk=getMonthKey(dt);if(mk)s.add(mk);}
    }
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  // usa mesFiltro compartilhado, filtra meses válidos para PI
  const mesFiltroEfetivo = mesesDisponiveis.includes(mesFiltro) ? mesFiltro : "Todos";

  const dispatchesMes=useMemo(()=>{
    if(mesFiltroEfetivo==="Todos")return dispatches;
    return dispatches.filter(d=>{
      const dt=parseDataHora(d.data_hora);
      return dt&&getMonthKey(dt)===mesFiltroEfetivo;
    });
  },[dispatches,mesFiltroEfetivo]);

  const { ranking,porFilial,eventos,filiais,totalEventos }=useMemo(()=>{
    const piDispatches=dispatchesMes.filter(d=>d.portaria_inteligente);
    if(piDispatches.length===0)return{ranking:[],porFilial:[],eventos:[],filiais:["Todas"],totalEventos:0};
    const clienteMap={},filialMap={},eventoMap={},mensMap={};
    for(const c of clients)mensMap[`${c.codigo_cliente}||${c.filial}`]=parseFloat(c.mensalidade)||0;
    for(const d of piDispatches){
      const key=`${d.codigo_cliente}||${d.filial}`;
      if(!clienteMap[key])clienteMap[key]={codigo_cliente:d.codigo_cliente,nome_cliente:d.nome_cliente||d.codigo_cliente,filial:d.filial,total_eventos:0};
      clienteMap[key].total_eventos++;
      if(d.filial)filialMap[d.filial]=(filialMap[d.filial]||0)+1;
      if(d.evento)eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;
    }
    const ranking=Object.values(clienteMap).map(c=>{const mens=mensMap[`${c.codigo_cliente}||${c.filial}`]||0;const custo=c.total_eventos*CUSTO_FISCAL;const saldo=mens-custo;return{...c,mensalidade:mens,custo_operacional:custo,saldo,status_financeiro:calcStatus(mens,custo)};}).sort((a,b)=>b.total_eventos-a.total_eventos);
    const filiais=["Todas",...new Set(piDispatches.map(d=>d.filial).filter(Boolean))];
    const porFilial=Object.entries(filialMap).map(([filial,total])=>({filial,total})).sort((a,b)=>b.total-a.total);
    const eventos=Object.entries(eventoMap).map(([evento,total])=>({evento,total})).sort((a,b)=>b.total-a.total).slice(0,7);
    return{ranking,porFilial,eventos,filiais,totalEventos:piDispatches.length};
  },[dispatchesMes,clients]);

  const rankingFiltrado=useMemo(()=>{const base=filialFiltro==="Todas"?ranking:ranking.filter(r=>r.filial===filialFiltro);return base.slice(0,10);},[ranking,filialFiltro]);
  if(totalEventos===0&&mesFiltroEfetivo==="Todos")return <EmptyState icon="🏢" title="Nenhum evento de Portaria Inteligente" sub="Os eventos de Portaria Inteligente são detectados automaticamente na importação da planilha de deslocamentos." />;

  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};

  return (
    <>
      {/* MELHORIA 2: usa MesFiltroBar compartilhado */}
      <MesFiltroBar value={mesFiltroEfetivo} onChange={setMesFiltro} meses={mesesDisponiveis} accent="#a78bfa" />

      {totalEventos===0&&mesFiltroEfetivo!=="Todos"?(
        <EmptyState icon="🏢" title={`Nenhum evento de PI em ${monthLabel(mesFiltroEfetivo)}`} sub="Tente selecionar outro mês ou 'Todos os meses'." />
      ):(
      <>
      {(()=>{
        const base=filialFiltro==="Todas"?ranking:ranking.filter(r=>r.filial===filialFiltro);
        const totalEvtFil=base.reduce((s,c)=>s+c.total_eventos,0);
        const totalMensPi=base.reduce((s,c)=>s+(c.mensalidade||0),0);
        const totalCustoPi=base.reduce((s,c)=>s+c.custo_operacional,0);
        const totalSaldoPi=base.reduce((s,c)=>s+(c.mensalidade?c.saldo:0),0);
        return(
          <>
            <div className="grid-4" style={{ marginBottom:12 }}>
              <KPICard label="Total de Eventos" value={totalEvtFil} sub={filialFiltro!=="Todas"?filialFiltro.slice(0,18):"portaria inteligente"} icon="🏢" accent="#a78bfa" />
              <KPICard label="Clientes Ativos" value={base.length} sub="com eventos registrados" icon="👥" accent="#38bdf8" />
              <KPICard label="Mensalidade Total" value={formatCurrency(totalMensPi)} sub={`${base.filter(c=>c.mensalidade>0).length} clientes c/ mensalidade`} icon="💳" accent="#34d399" />
              <KPICard label="Saldo Total" value={formatCurrency(totalSaldoPi)} sub="mensalidade − custo op." icon={totalSaldoPi>=0?"✅":"❌"} accent={totalSaldoPi>=0?"#34d399":"#f87171"} />
            </div>
            <div className="grid-4" style={{ marginBottom:28 }}>
              <KPICard label="Média por Cliente" value={(totalEvtFil/(base.length||1)).toFixed(1)} sub="eventos/cliente" icon="📊" accent="#34d399" />
              <KPICard label="Custo Operacional" value={formatCurrency(totalCustoPi)} sub={`@ R$ ${CUSTO_FISCAL}/evento`} icon="💰" accent="#fb923c" />
              <KPICard label="Em Prejuízo" value={base.filter(c=>c.status_financeiro==="PREJUÍZO").length} sub="com mensalidade" icon="🔴" accent="#f87171" />
              <KPICard label="Em Risco" value={base.filter(c=>c.status_financeiro==="RISCO").length} sub="com mensalidade" icon="🟡" accent="#fbbf24" />
            </div>
          </>
        );
      })()}
      <MesesResumo dispatches={mesFiltroEfetivo==="Todos"?dispatches:dispatchesMes} filialFiltro={filialFiltro} tipo="pi" clients={clients} />
      <div className="grid-2">
        <Card><div style={{ padding:20 }}><SectionLabel>Eventos por Filial</SectionLabel><BarChart data={porFilial.map(d=>({label:d.filial.slice(0,14),value:d.total}))} label="Eventos" height={220} /></div></Card>
        <Card><div style={{ padding:20 }}><SectionLabel>Eventos Mais Frequentes</SectionLabel><DonutChart data={eventos.map(d=>({label:d.evento.slice(0,24),value:d.total}))} height={220} /></div></Card>
      </div>
      <Card>
        <div style={{ borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12 }}>
          <div><SectionLabel>Top 10 — Portaria Inteligente</SectionLabel><p style={{ fontSize:11,color:"rgba(255,255,255,0.25)",margin:"-8px 0 0" }}>Ordenado por quantidade de eventos</p></div>
          <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>{filiais.map(f=><FilterBtn key={f} active={filialFiltro===f} onClick={()=>setFilialFiltro(f)}>{f}</FilterBtn>)}</div>
        </div>
        {/* MELHORIA 3: skeleton na tabela */}
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                {["#","Cliente","Filial","Eventos","Mensalidade","Custo Op.","Saldo","Status"].map(h=>(
                  <th key={h} style={{ padding:"12px 16px",textAlign:["Eventos","Mensalidade","Custo Op.","Saldo"].includes(h)?"right":h==="Status"?"center":"left",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rankingFiltrado.length===0?<tr><td colSpan={8} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:13 }}>Nenhum resultado para esta filial</td></tr>
              :rankingFiltrado.map((c,i)=>(
                <tr key={`${c.codigo_cliente}-${c.filial}`} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)",transition:"background 0.15s",cursor:"pointer" }} onClick={()=>setClienteSelecionado(c)} onMouseEnter={e=>e.currentTarget.style.background="rgba(167,139,250,0.06)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"13px 16px",color:"rgba(255,255,255,0.25)",fontWeight:600 }}>{i+1}</td>
                  <td style={{ padding:"13px 16px" }}><div style={{ fontWeight:600,color:"#a78bfa",display:"flex",alignItems:"center",gap:6 }}>{c.nome_cliente}<span style={{ fontSize:10,color:"rgba(167,139,250,0.5)" }}>↗</span></div><div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:"monospace" }}>{c.codigo_cliente}</div></td>
                  <td style={{ padding:"13px 16px",color:"rgba(255,255,255,0.5)" }}>{c.filial}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:"#a78bfa",fontSize:15 }}>{c.total_eventos}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",color:"rgba(255,255,255,0.55)" }}>{c.mensalidade?formatCurrency(c.mensalidade):<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",color:"#fb923c",fontWeight:600 }}>{formatCurrency(c.custo_operacional)}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:!c.mensalidade?"rgba(255,255,255,0.2)":c.saldo<0?"#f87171":"#34d399" }}>{c.mensalidade?formatCurrency(c.saldo):"—"}</td>
                  <td style={{ padding:"13px 16px",textAlign:"center" }}><StatusBadge status={c.status_financeiro} /></td>
                </tr>
              ))}
              {rankingFiltrado.length>0&&(()=>{
                const totalEvt=rankingFiltrado.reduce((s,c)=>s+c.total_eventos,0);
                const totalMens=rankingFiltrado.reduce((s,c)=>s+(c.mensalidade||0),0);
                const totalCusto=rankingFiltrado.reduce((s,c)=>s+c.custo_operacional,0);
                const totalSaldo=rankingFiltrado.reduce((s,c)=>s+(c.mensalidade?c.saldo:0),0);
                const temMens=rankingFiltrado.some(c=>c.mensalidade>0);
                return(
                  <tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}>
                    <td colSpan={3} style={{ padding:"13px 16px",fontWeight:700,color:"rgba(255,255,255,0.5)",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase" }}>Total ({rankingFiltrado.length} clientes)</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:800,color:"#a78bfa",fontSize:15 }}>{totalEvt}</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:"#34d399" }}>{temMens?formatCurrency(totalMens):<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:"#fb923c" }}>{formatCurrency(totalCusto)}</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:800,color:!temMens?"rgba(255,255,255,0.2)":totalSaldo>=0?"#34d399":"#f87171",fontSize:14 }}>{temMens?formatCurrency(totalSaldo):"—"}</td>
                    <td></td>
                  </tr>
                );
              })()}
            </tbody>
          </table>
        </div>
      </Card>
      </>)}
      {clienteSelecionado&&<ClienteModal cliente={clienteSelecionado} dispatches={dispatches} onClose={()=>setClienteSelecionado(null)} supabaseClient={supabaseClient} isPortaria={true} />}
    </>
  );
}

function ClienteModal({ cliente, dispatches, onClose, supabaseClient, isPortaria }) {
  if (!cliente) return null;
  const [obs,setObs]=useState("");
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [loadingObs,setLoadingObs]=useState(true); // MELHORIA 3

  const meusDeslocs=dispatches.filter(d=>d.codigo_cliente===cliente.codigo_cliente&&d.filial===cliente.filial&&(isPortaria?d.portaria_inteligente:!d.portaria_inteligente));

  useEffect(()=>{
    if(!supabaseClient)return;
    const cacheKey=`${cliente.codigo_cliente}||${cliente.filial}`;
    if(obsCache.has(cacheKey)){setObs(obsCache.get(cacheKey));setLoadingObs(false);return;}
    async function loadObs(){
      const{data}=await supabaseClient.from("clients").select("observacao").eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial).single();
      const valor=data?.observacao||"";
      obsCache.set(cacheKey,valor);
      setObs(valor);
      setLoadingObs(false);
    }
    loadObs();
  },[cliente.codigo_cliente,cliente.filial]);

  async function salvarObs(){
    if(!supabaseClient)return;
    setSaving(true);
    await supabaseClient.from("clients").update({observacao:obs}).eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial);
    const cacheKey=`${cliente.codigo_cliente}||${cliente.filial}`;
    obsCache.set(cacheKey,obs);
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  }

  const eventoMap={};
  for(const d of meusDeslocs)eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;
  const eventos=Object.entries(eventoMap).sort((a,b)=>b[1]-a[1]);
  const totalEvt=meusDeslocs.length;
  const custo=totalEvt*CUSTO_FISCAL;
  const mens=cliente.mensalidade||0;
  const mesesSet=new Set();
  for(const d of meusDeslocs){const dt=parseDataHora(d.data_hora);if(dt){const mk=getMonthKey(dt);if(mk)mesesSet.add(mk);}}
  const mesesComDesl=Array.from(mesesSet).sort();
  const qtdMeses=mesesComDesl.length||1;
  const mensAcumulada=mens*qtdMeses;
  const saldoAcumulado=mensAcumulada-custo;
  const sc=STATUS_CONFIG[cliente.status_financeiro||calcStatus(mens,custo/qtdMeses)]||STATUS_CONFIG["SEM DADOS"];

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }} onClick={onClose}>
      <div style={{ background:"#0f172a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",padding:28 }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20 }}>
          <div>
            <div style={{ fontSize:18,fontWeight:700,color:"#fff",marginBottom:4 }}>{cliente.nome_cliente}</div>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)" }}>Cód. {cliente.codigo_cliente} · {cliente.filial}</div>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:99,background:sc.bg,color:sc.text }}>{cliente.status_financeiro||calcStatus(mens,custo/qtdMeses)}</span>
            <button onClick={onClose} style={{ background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13 }}>✕</button>
          </div>
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:mens>0&&qtdMeses>0?12:20 }}>
          {[{label:"Deslocamentos",val:totalEvt,color:"#38bdf8",sub:qtdMeses>1?`em ${qtdMeses} meses`:"no período"},{label:"Custo Operacional",val:`R$ ${custo.toLocaleString("pt-BR")}`,color:"#f472b6",sub:`R$ ${(custo/qtdMeses).toLocaleString("pt-BR",{maximumFractionDigits:0})}/mês`},{label:"Mensalidade/mês",val:mens>0?`R$ ${mens.toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—",color:"#34d399",sub:mens>0?`× ${qtdMeses} ${qtdMeses===1?"mês":"meses"}`:"sem cadastro"}].map((k,i)=>(
            <div key={i} style={{ background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",textAlign:"center" }}>
              <div style={{ fontSize:20,fontWeight:800,color:k.color }}>{k.val}</div>
              <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4 }}>{k.label}</div>
              {k.sub&&<div style={{ fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2 }}>{k.sub}</div>}
            </div>
          ))}
        </div>
        {mens>0&&mesesComDesl.length>0&&(
          <div style={{ marginBottom:20,borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.02)",overflow:"hidden" }}>
            <div style={{ padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <span style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)" }}>Resultado Acumulado — {qtdMeses} {qtdMeses===1?"mês":"meses"}</span>
              <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>{mesesComDesl.map(mk=><span key={mk} style={{ fontSize:10,padding:"2px 8px",borderRadius:99,background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.2)",color:"#38bdf8",fontWeight:600 }}>{monthLabel(mk)}</span>)}</div>
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0 }}>
              {[{label:"Mensalidade acumulada",val:formatCurrency(mensAcumulada),color:"#34d399"},{label:"Custo acumulado",val:formatCurrency(custo),color:"#f472b6"},{label:"Saldo acumulado",val:formatCurrency(saldoAcumulado),color:saldoAcumulado>=0?"#34d399":"#f87171"}].map((k,i)=>(
