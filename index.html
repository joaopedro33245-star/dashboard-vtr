            <div style={{ display:"flex",flexDirection:"column",gap:8 }}>
              {eventos.map(([evt,cnt],i)=>{const pct=totalEvt>0?Math.round((cnt/totalEvt)*100):0;return(
                <div key={i}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                    <span style={{ fontSize:12,color:"rgba(255,255,255,0.75)" }}>{evt}</span>
                    <span style={{ fontSize:12,fontWeight:700,color:CHART_COLORS[i%CHART_COLORS.length] }}>{cnt}x · {pct}%</span>
                  </div>
                  <div style={{ height:5,borderRadius:999,background:"rgba(255,255,255,0.06)" }}><div style={{ height:"100%",width:`${pct}%`,borderRadius:999,background:CHART_COLORS[i%CHART_COLORS.length] }} /></div>
                </div>
              );})}
            </div>
          </div>
        )}
        {supabaseClient&&(
          <div style={{ marginBottom:20 }}>
            <div style={{ fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)",letterSpacing:1,marginBottom:8 }}>OBSERVAÇÃO / ACOMPANHAMENTO</div>
            {/* MELHORIA 3: skeleton enquanto carrega observação */}
            {loadingObs ? (
              <div style={{ marginBottom:8 }}>
                <div className="skeleton" style={{ height:90,borderRadius:10,width:"100%" }} />
              </div>
            ) : (
              <textarea value={obs} onChange={e=>setObs(e.target.value)} placeholder="Ex: Manutenção aberta em 03/2026, sensor com planta na frente, aguardando visita técnica..." style={{ width:"100%",minHeight:90,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,resize:"vertical",outline:"none",fontFamily:"inherit" }} />
            )}
            <div style={{ display:"flex",justifyContent:"flex-end",marginTop:8,gap:10,alignItems:"center" }}>
              {saved&&<span style={{ fontSize:12,color:"#34d399" }}>✅ Salvo!</span>}
              <button onClick={salvarObs} disabled={saving||loadingObs} style={{ background:"#38bdf8",border:"none",color:"#000",borderRadius:8,padding:"8px 20px",cursor:"pointer",fontWeight:700,fontSize:13,opacity:saving||loadingObs?0.6:1 }}>{saving?"Salvando...":"Salvar Observação"}</button>
            </div>
          </div>
        )}
        {meusDeslocs.length>0&&(
          <div>
            <div style={{ fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)",letterSpacing:1,marginBottom:12 }}>HISTÓRICO DE DESLOCAMENTOS ({meusDeslocs.length})</div>
            <div style={{ display:"flex",flexDirection:"column",gap:6,maxHeight:200,overflowY:"auto" }}>
              {meusDeslocs.map((d,i)=>(
                <div key={i} style={{ display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"rgba(255,255,255,0.03)",borderRadius:8,fontSize:12 }}>
                  <span style={{ color:"rgba(255,255,255,0.7)" }}>{d.evento}</span>
                  <div style={{ display:"flex",gap:16,color:"rgba(255,255,255,0.35)" }}><span>{d.viatura}</span><span>{d.data_hora}</span></div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MesesResumo({ dispatches, filialFiltro, cidadeFiltro, codigosFiltrados, tipo, clients }) {
  const isPi=tipo==="pi";
  const accent=isPi?"#a78bfa":"#38bdf8";
  const mesesData=useMemo(()=>{
    const base=dispatches.filter(d=>{
      if(isPi?!d.portaria_inteligente:d.portaria_inteligente)return false;
      if(filialFiltro&&filialFiltro!=="Todas"&&d.filial!==filialFiltro)return false;
      if(codigosFiltrados&&!codigosFiltrados.has(`${d.codigo_cliente}||${d.filial}`))return false;
      return true;
    });
    const mesMap={};
    for(const d of base){const dt=parseDataHora(d.data_hora);if(!dt)continue;const mk=getMonthKey(dt);if(!mk)continue;if(!mesMap[mk])mesMap[mk]={total:0,clientes:new Set(),custo:0};mesMap[mk].total++;mesMap[mk].clientes.add(`${d.codigo_cliente}||${d.filial}`);mesMap[mk].custo+=CUSTO_FISCAL;}
    const clienteMensMap={};
    if(clients){for(const c of clients)if(c.mensalidade>0)clienteMensMap[`${c.codigo_cliente}||${c.filial}`]=parseFloat(c.mensalidade)||0;}
    return Object.entries(mesMap).map(([mk,v])=>{const mensTotal=Array.from(v.clientes).reduce((s,k)=>s+(clienteMensMap[k]||0),0);return{mk,label:monthLabel(mk),total:v.total,clientes:v.clientes.size,custo:v.custo,mensTotal,saldo:mensTotal-v.custo};}).sort((a,b)=>a.mk.localeCompare(b.mk));
  },[dispatches,filialFiltro,tipo,clients]);

  if(mesesData.length===0)return null;
  const maxTotal=Math.max(...mesesData.map(m=>m.total));
  const totalGeral=mesesData.reduce((s,m)=>s+m.total,0);
  const temMens=mesesData.some(m=>m.mensTotal>0);

  return (
    <Card style={{ marginBottom:28 }}>
      <div style={{ padding:"16px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
        <div>
          <SectionLabel>{isPi?"🏢 Portaria Inteligente":"🚗 Deslocamentos Normais"} — Total por Mês</SectionLabel>
          <p style={{ fontSize:11,color:"rgba(255,255,255,0.25)",margin:"-8px 0 0" }}>{mesesData.length} {mesesData.length===1?"mês":"meses"} · {totalGeral.toLocaleString("pt-BR")} eventos no total{filialFiltro&&filialFiltro!=="Todas"&&<span style={{ marginLeft:8,color:accent }}>· {filialFiltro}</span>}</p>
        </div>
        <div style={{ textAlign:"right" }}><div style={{ fontSize:22,fontWeight:800,color:accent }}>{totalGeral.toLocaleString("pt-BR")}</div><div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>total geral</div></div>
      </div>
      <div style={{ padding:"16px 20px" }}>
        <div style={{ display:"flex",alignItems:"flex-end",gap:8,height:100,marginBottom:16 }}>
          {mesesData.map((m,i)=>{const pct=maxTotal>0?(m.total/maxTotal)*100:0;return(
            <div key={m.mk} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,height:"100%" }}>
              <div style={{ fontSize:10,color:accent,fontWeight:700 }}>{m.total}</div>
              <div style={{ flex:1,width:"100%",display:"flex",alignItems:"flex-end" }}><div style={{ width:"100%",height:`${pct}%`,minHeight:4,borderRadius:"6px 6px 0 0",background:`linear-gradient(180deg,${accent}cc,${accent}66)`,transition:"height 0.4s" }} /></div>
              <div style={{ fontSize:9,color:"rgba(255,255,255,0.4)",textAlign:"center",lineHeight:1.2 }}>{m.label}</div>
            </div>
          );})}
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                {["Mês","Eventos","Clientes Ativos","Custo Op.",...(temMens?["Mensalidade","Saldo"]:[])].map(h=>(
                  <th key={h} style={{ padding:"8px 14px",textAlign:h==="Mês"?"left":"right",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {mesesData.map((m,i)=>{
                const prev=mesesData[i-1];
                const trend=prev?(m.total>prev.total?"▲":m.total<prev.total?"▼":"─"):null;
                const trendColor=!trend?"transparent":m.total>(prev?.total||0)?"#f87171":m.total<(prev?.total||0)?"#34d399":"rgba(255,255,255,0.2)";
                return(
                  <tr key={m.mk} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }} onMouseEnter={e=>e.currentTarget.style.background=`${accent}08`} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{ padding:"10px 14px" }}><div style={{ display:"flex",alignItems:"center",gap:8 }}><div style={{ width:8,height:8,borderRadius:"50%",background:CHART_COLORS[i%CHART_COLORS.length],flexShrink:0 }} /><span style={{ fontWeight:700,color:"#fff" }}>{m.label}</span>{trend&&<span style={{ fontSize:9,color:trendColor }}>{trend}</span>}</div></td>
                    <td style={{ padding:"10px 14px",textAlign:"right",fontWeight:800,color:accent,fontSize:14 }}>{m.total.toLocaleString("pt-BR")}</td>
                    <td style={{ padding:"10px 14px",textAlign:"right",color:"rgba(255,255,255,0.5)" }}>{m.clientes}</td>
                    <td style={{ padding:"10px 14px",textAlign:"right",color:"#fb923c",fontWeight:600 }}>{formatCurrency(m.custo)}</td>
                    {temMens&&<><td style={{ padding:"10px 14px",textAlign:"right",color:"#34d399" }}>{m.mensTotal>0?formatCurrency(m.mensTotal):<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td><td style={{ padding:"10px 14px",textAlign:"right",fontWeight:700,color:m.mensTotal>0?(m.saldo>=0?"#34d399":"#f87171"):"rgba(255,255,255,0.2)" }}>{m.mensTotal>0?formatCurrency(m.saldo):"—"}</td></>}
                  </tr>
                );
              })}
              <tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}>
                <td style={{ padding:"10px 14px",fontWeight:700,color:"rgba(255,255,255,0.5)",fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em" }}>Total</td>
                <td style={{ padding:"10px 14px",textAlign:"right",fontWeight:800,color:accent,fontSize:15 }}>{totalGeral.toLocaleString("pt-BR")}</td>
                <td style={{ padding:"10px 14px",textAlign:"right",color:"rgba(255,255,255,0.4)",fontWeight:600 }}>{new Set(dispatches.filter(d=>(isPi?d.portaria_inteligente:!d.portaria_inteligente)&&(filialFiltro==="Todas"||d.filial===filialFiltro)).map(d=>`${d.codigo_cliente}||${d.filial}`)).size}</td>
                <td style={{ padding:"10px 14px",textAlign:"right",fontWeight:700,color:"#fb923c" }}>{formatCurrency(mesesData.reduce((s,m)=>s+m.custo,0))}</td>
                {temMens&&<><td style={{ padding:"10px 14px",textAlign:"right",fontWeight:700,color:"#34d399" }}>{formatCurrency(mesesData.reduce((s,m)=>s+m.mensTotal,0))}</td><td style={{ padding:"10px 14px",textAlign:"right",fontWeight:800,color:mesesData.reduce((s,m)=>s+m.saldo,0)>=0?"#34d399":"#f87171",fontSize:14 }}>{formatCurrency(mesesData.reduce((s,m)=>s+m.saldo,0))}</td></>}
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </Card>
  );
}

// ── MELHORIA 2: recebe mesFiltro/setMesFiltro/mesesTodos como props ──
function DashboardTab({ clients, dispatches, mesFiltro, setMesFiltro, mesesTodos }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [cidadeFiltro,setCidadeFiltro]=useState("Todas");
  const [clienteSelecionado,setClienteSelecionado]=useState(null);
  const [loadingTabela,setLoadingTabela]=useState(false); // MELHORIA 3
  const [pagina,setPagina]=useState(1);
  const PER_PAGE=15;
  useEffect(()=>{setCidadeFiltro("Todas");setPagina(1);},[filialFiltro]);
  useEffect(()=>{setPagina(1);},[cidadeFiltro]);
  useEffect(()=>{setPagina(1);},[mesFiltro]);

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches.filter(x=>!x.portaria_inteligente)){
      const dt=parseDataHora(d.data_hora);
      if(dt){const mk=getMonthKey(dt);if(mk)s.add(mk);}
    }
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  const mesFiltroEfetivo = mesesDisponiveis.includes(mesFiltro) ? mesFiltro : "Todos";

  const dispatchesMes=useMemo(()=>{
    if(mesFiltroEfetivo==="Todos")return dispatches;
    return dispatches.filter(d=>{
      const dt=parseDataHora(d.data_hora);
      return dt&&getMonthKey(dt)===mesFiltroEfetivo;
    });
  },[dispatches,mesFiltroEfetivo]);

  const cidadesDisponiveis=useMemo(()=>{
    if(filialFiltro==="Todas")return[];
    const cidades=new Set(clients.filter(c=>c.filial===filialFiltro&&c.cidade).map(c=>String(c.cidade).trim().toUpperCase()).filter(Boolean));
    if(cidades.size<=1)return[];
    return["Todas",...Array.from(cidades).sort()];
  },[clients,filialFiltro]);

  const{ranking,kpis,porFilial,eventoFrequente,filiais}=useMemo(()=>{
    if(clients.length===0&&dispatchesMes.filter(d=>!d.portaria_inteligente).length===0)return{ranking:[],kpis:null,porFilial:[],eventoFrequente:[],filiais:["Todas"]};
    const normalDispatches=dispatchesMes.filter(d=>!d.portaria_inteligente);
    const dispMap={},filialMap={},eventoMap={};
    for(const d of normalDispatches){const key=`${d.codigo_cliente}||${d.filial}`;dispMap[key]=(dispMap[key]||0)+1;if(d.filial)filialMap[d.filial]=(filialMap[d.filial]||0)+1;if(d.evento)eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;}
    const baseClients=clients.length>0?clients:Object.entries(dispMap).map(([key])=>{const[codigo_cliente,filial]=key.split("||");return{codigo_cliente,filial,nome_cliente:codigo_cliente,mensalidade:0,status:"ativo"};});
    const rankingAll=baseClients.map(c=>{const key=`${c.codigo_cliente}||${c.filial}`;const totalDesl=dispMap[key]||0;const custo=totalDesl*CUSTO_FISCAL;const mens=c.mensalidade||0;return{...c,total_deslocamentos:totalDesl,custo_operacional:custo,lucro_real:mens-custo,status_financeiro:calcStatus(mens,custo)};}).sort((a,b)=>b.total_deslocamentos-a.total_deslocamentos);
    const totalDesl=rankingAll.reduce((s,r)=>s+r.total_deslocamentos,0);
    const filiaisSet=["Todas",...new Set([...baseClients.map(c=>c.filial),...normalDispatches.map(d=>d.filial)].filter(Boolean))];
    return{ranking:rankingAll,kpis:{totalClientes:baseClients.length,totalDeslocamentos:totalDesl,custoOperacionalTotal:totalDesl*CUSTO_FISCAL,clientesEmPrejuizo:rankingAll.filter(r=>r.status_financeiro==="PREJUÍZO").length,clientesEmRisco:rankingAll.filter(r=>r.status_financeiro==="RISCO").length,clientesSemDados:rankingAll.filter(r=>r.status_financeiro==="SEM DADOS").length},filiais:filiaisSet,porFilial:Object.entries(filialMap).map(([filial,total])=>({filial,total})).sort((a,b)=>b.total-a.total),eventoFrequente:Object.entries(eventoMap).map(([evento,total])=>({evento,total})).sort((a,b)=>b.total-a.total).slice(0,7)};
  },[clients,dispatchesMes]);

  const rankingPorFilial=useMemo(()=>{let base=filialFiltro==="Todas"?ranking:ranking.filter(c=>c.filial===filialFiltro);if(cidadeFiltro!=="Todas")base=base.filter(c=>c.cidade&&String(c.cidade).trim().toUpperCase()===cidadeFiltro);return base;},[ranking,filialFiltro,cidadeFiltro]);
  const rankingFiltrado=useMemo(()=>{const start=(pagina-1)*PER_PAGE;return rankingPorFilial.slice(start,start+PER_PAGE);},[rankingPorFilial,pagina]);
  const kpisFiltrados=useMemo(()=>{const base=rankingPorFilial;const totalDesl=base.reduce((s,c)=>s+c.total_deslocamentos,0);return{totalClientes:base.length,totalDeslocamentos:totalDesl,custoOperacionalTotal:totalDesl*CUSTO_FISCAL,clientesEmPrejuizo:base.filter(r=>r.status_financeiro==="PREJUÍZO").length,clientesEmRisco:base.filter(r=>r.status_financeiro==="RISCO").length,clientesSemDados:base.filter(r=>r.status_financeiro==="SEM DADOS").length};},[rankingPorFilial]);
  const porFilialFiltrado=useMemo(()=>filialFiltro==="Todas"?porFilial:porFilial.filter(f=>f.filial===filialFiltro),[porFilial,filialFiltro]);
  const eventoFrequenteFiltrado=useMemo(()=>{
    const codigosFiltrados=cidadeFiltro!=="Todas"?new Set(rankingPorFilial.map(c=>`${c.codigo_cliente}||${c.filial}`)):null;
    const base=dispatchesMes.filter(d=>{if(d.portaria_inteligente)return false;if(filialFiltro!=="Todas"&&d.filial!==filialFiltro)return false;if(codigosFiltrados&&!codigosFiltrados.has(`${d.codigo_cliente}||${d.filial}`))return false;return true;});
    const eventoMap={};for(const d of base){if(d.evento)eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;}
    return Object.entries(eventoMap).map(([evento,total])=>({evento,total})).sort((a,b)=>b.total-a.total).slice(0,7);
  },[dispatches,filialFiltro,cidadeFiltro,rankingPorFilial]);

  if(!kpis)return <EmptyState icon="📊" title="Nenhum dado importado ainda" sub="Vá até a aba Importação, carregue sua planilha de clientes e deslocamentos para visualizar o dashboard." />;
  if(dispatches.filter(d=>!d.portaria_inteligente).length===0)return <EmptyState icon="🚗" title="Clientes importados! Agora importe os deslocamentos." sub="Vá até a aba Importação e carregue a planilha de deslocamentos para calcular os indicadores." />;

  return (
    <>
      <ClienteModal cliente={clienteSelecionado} dispatches={dispatches} onClose={()=>setClienteSelecionado(null)} supabaseClient={supabaseClient} />

      {/* MELHORIA 2: usa MesFiltroBar compartilhado */}
      <MesFiltroBar value={mesFiltroEfetivo} onChange={setMesFiltro} meses={mesesDisponiveis} accent="#38bdf8" />

      {(()=>{
        const totalMens=rankingPorFilial.reduce((s,c)=>s+(c.mensalidade||0),0);
        const totalSaldo=rankingPorFilial.reduce((s,c)=>s+(c.mensalidade?c.lucro_real:0),0);
        return(
          <>
            <div className="grid-4" style={{ marginBottom:12 }}>
              <KPICard label="Clientes" value={kpisFiltrados.totalClientes} sub={filialFiltro!=="Todas"?filialFiltro.slice(0,18):"total geral"} icon="👥" accent="#38bdf8" />
              <KPICard label="Deslocamentos" value={kpisFiltrados.totalDeslocamentos} sub={filialFiltro!=="Todas"?filialFiltro.slice(0,18):"total registrado"} icon="🚗" accent="#818cf8" />
              <KPICard label="Mensalidade Total" value={formatCurrency(totalMens)} sub={`${rankingPorFilial.filter(c=>c.mensalidade>0).length} clientes c/ mensalidade`} icon="💳" accent="#34d399" />
              <KPICard label="Saldo Total" value={formatCurrency(totalSaldo)} sub="mensalidade − custo op." icon={totalSaldo>=0?"✅":"❌"} accent={totalSaldo>=0?"#34d399":"#f87171"} />
            </div>
            <div className="grid-4" style={{ marginBottom:28 }}>
              <KPICard label="Custo Operacional" value={formatCurrency(kpisFiltrados.custoOperacionalTotal)} sub={`@ R$ ${CUSTO_FISCAL}/desl.`} icon="💰" accent="#fb923c" />
              <KPICard label="Em Prejuízo" value={kpisFiltrados.clientesEmPrejuizo} sub="com mensalidade" icon="🔴" accent="#f87171" />
              <KPICard label="Em Risco" value={kpisFiltrados.clientesEmRisco} sub="com mensalidade" icon="🟡" accent="#fbbf24" />
              <KPICard label="Sem Mensalidade" value={kpisFiltrados.clientesSemDados} sub="aguardando cadastro" icon="⚪" accent="#94a3b8" />
            </div>
          </>
        );
      })()}
      {filialFiltro!=="Todas"&&(()=>{
        const base=rankingPorFilial;const comMens=base.filter(c=>c.mensalidade>0);const semMens=base.filter(c=>!c.mensalidade||c.mensalidade===0);const lucrativos=comMens.filter(c=>c.lucro_real>0);const prejuizo=comMens.filter(c=>c.lucro_real<0);
        const totalMens=comMens.reduce((s,c)=>s+c.mensalidade,0);const totalCusto=base.reduce((s,c)=>s+c.custo_operacional,0);const totalSaldo=totalMens-totalCusto;
        const saudePct=comMens.length>0?Math.round((lucrativos.length/comMens.length)*100):0;
        const saudeLabel=saudePct>=70?"SAUDÁVEL":saudePct>=40?"ATENÇÃO":"CRÍTICO";
        const saudeColor=saudePct>=70?"#34d399":saudePct>=40?"#fbbf24":"#f87171";
        const saudeBg=saudePct>=70?"rgba(52,211,153,0.1)":saudePct>=40?"rgba(251,191,36,0.1)":"rgba(248,113,113,0.1)";
        const saudeBorder=saudePct>=70?"rgba(52,211,153,0.3)":saudePct>=40?"rgba(251,191,36,0.3)":"rgba(248,113,113,0.3)";
        const maioresPrejuizos=[...comMens].sort((a,b)=>a.lucro_real-b.lucro_real).slice(0,3);
        const maisLucrativos=[...comMens].sort((a,b)=>b.lucro_real-a.lucro_real).slice(0,3);
        return(
          <div style={{ borderRadius:16,border:`1px solid ${saudeBorder}`,background:saudeBg,padding:24,marginBottom:28 }}>
            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12 }}>
              <div>

function MensalidadesPadraoCard({ clients, supabaseClient, onRefresh }) {
  const [aplicando,setAplicando]=useState(false);const [msg,setMsg]=useState("");const [preview,setPreview]=useState(null);const [detalhes,setDetalhes]=useState("");
  const resumo=useMemo(()=>MENSALIDADES_PADRAO.map(({filialKey,valor})=>{const matchFn=c=>c.filial&&(c.filial.toUpperCase()===filialKey.toUpperCase()||c.filial.toUpperCase().includes(filialKey.toUpperCase().split(" ")[0]));const semMens=clients.filter(c=>matchFn(c)&&(!c.mensalidade||parseFloat(c.mensalidade)===0));const comMens=clients.filter(c=>matchFn(c)&&parseFloat(c.mensalidade)>0);return{filialKey,valor,semMens:semMens.length,comMens:comMens.length,clientes:semMens};}),[clients]);
  const totalAfetados=resumo.reduce((s,r)=>s+r.semMens,0);
  async function aplicarMensalidades(){
    if(totalAfetados===0)return;setAplicando(true);setMsg("Buscando clientes no banco...");setDetalhes("");let totalSalvo=0;let log=[];

      for(const{filialKey,valor,clientes}of resumo){if(clientes.length===0)continue;const registros=clientes.map(c=>({id:c.id,codigo_cliente:c.codigo_cliente,nome_cliente:c.nome_cliente||"",filial:c.filial,mensalidade:valor,status:c.status||"ativo"}));setMsg(`Atualizando ${filialKey} (${registros.length} clientes)...`);
        for(let i=0;i<registros.length;i+=100){const lote=registros.slice(i,i+100);const{data,error}=await supabaseClient.from("clients").upsert(lote,{onConflict:"codigo_cliente,filial"});if(error){log.push(`❌ ${filialKey}: ${error.message}`);}else{totalSalvo+=lote.length;log.push(`✅ ${filialKey}: ${lote.length} atualizados @ R$ ${valor.toFixed(2)}`);}}
      }

    }catch(e){setMsg("❌ Erro inesperado: "+e.message);}

        </div>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10 }}>
        {resumo.map(({filialKey,valor,semMens,comMens})=>(
          <div key={filialKey} style={{ borderRadius:10,border:semMens>0?"1px solid rgba(52,211,153,0.2)":"1px solid rgba(255,255,255,0.06)",background:semMens>0?"rgba(52,211,153,0.05)":"rgba(255,255,255,0.02)",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>

function ImportTab({ onImportClients, onImportDispatches, clients, dispatches, supabaseClient, onRefresh }) {
  const clientRef=useRef();const dispatchRef=useRef();
  const [clientPreview,setClientPreview]=useState(null);const [dispatchPreview,setDispatchPreview]=useState(null);

  const [clientFileName,setClientFileName]=useState("");const [dispatchFileName,setDispatchFileName]=useState("");
  const [filialForcada,setFilialForcada]=useState("");

  function readExcel(file,onSuccess,onError){
    const reader=new FileReader();
    reader.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"binary"});const sheetName=wb.SheetNames.find(n=>n.toLowerCase().includes("deslocamento")||n.toLowerCase().includes("viatura")||n.toLowerCase().includes("contas")||n.toLowerCase().includes("conta"))||wb.SheetNames[0];const ws=wb.Sheets[sheetName];const rows=XLSX.utils.sheet_to_json(ws,{defval:""});onSuccess(rows,wb.SheetNames);}catch(err){onError("Erro ao ler o arquivo: "+err.message);}};
    reader.readAsBinaryString(file);
  }

  function handleClientFile(e){
    const file=e.target.files[0];if(!file)return;
    setClientError("");setClientFileName(file.name);
    readExcel(file,rows=>{
      const mapped=rows.map(r=>{const empresaRaw=String(r["Empresa"]||r["empresa"]||r["Filial"]||r["filial"]||"");const cidadeRaw=String(r["Cidade"]||r["cidade"]||r["CIDADE"]||r["Município"]||r["Municipio"]||"");return{codigo_cliente:String(r["Conta"]||r["conta"]||r["CONTA"]||"").trim(),nome_cliente:limparFantasia(String(r["Fantasia (Razão Social)"]||r["Fantasia"]||r["Razão Social"]||r["fantasia"]||"")),filial:limparEmpresa(empresaRaw,cidadeRaw),cidade:cidadeRaw.trim(),mensalidade:parseFloat(String(r["Mensalidade"]||r["mensalidade"]||"0").replace(",","."))||0,status:"ativo"};}).filter(r=>r.codigo_cliente&&r.nome_cliente);
      if(mapped.length===0){setClientError('Nenhum cliente encontrado. Verifique as colunas: "Conta", "Fantasia (Razão Social)", "Empresa".');return;}
      setClientPreview(mapped);
    },setClientError);
  }

  function handleDispatchFile(e){
    const file=e.target.files[0];if(!file)return;
    setDispatchError("");setDispatchFileName(file.name);
    readExcel(file,rows=>{
      const total=rows.length;

        const viatura=String(r["Viatura"]||r["viatura"]||"").trim();
        const dataRaw=r["Data de recepção"]||r["Data de recepcao"]||r["Data/Hora"]||r["Data"]||r["data_hora"]||"";
        let data_hora="";
        if(dataRaw instanceof Date){data_hora=dataRaw.toLocaleString("pt-BR");}
        else if(typeof dataRaw==="number"&&dataRaw>1000){const excelEpoch=new Date(1899,11,30);const d=new Date(excelEpoch.getTime()+dataRaw*86400000);data_hora=d.toLocaleString("pt-BR");}
        else{data_hora=String(dataRaw).trim();}
        let filial=limparEmpresa(empresaRaw,cidadeRaw);

        }
        if(filialForcada)filial=filialForcada;
        const nome_cliente=limparFantasia(fantasiaRaw);
        const portaria_inteligente=fantasiaRaw.toUpperCase().includes("PORTARIA INTELIGENTE");
        return{codigo_cliente:codigo,filial,nome_cliente,data_hora,evento,viatura,portaria_inteligente};
      }).filter(r=>r.codigo_cliente&&r.evento);
      if(mapped.length===0){setDispatchError('Nenhum deslocamento encontrado. Verifique as colunas: "Código da conta", "Empresa", "Data de recepção", "Evento".');return;}
      const mesesNoArquivo={};
      for(const r of mapped){const dt=parseDataHora(r.data_hora);if(dt){const mk=getMonthKey(dt);if(mk)mesesNoArquivo[mk]=(mesesNoArquivo[mk]||0)+1;}}
      const semanasNoArquivo=new Set();
      for(const r of mapped){const dt=parseDataHora(r.data_hora);if(dt)semanasNoArquivo.add(getWeekKey(dt));}
      const semanasJaImportadas=new Set();
      for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt){const wk=getWeekKey(dt);if(semanasNoArquivo.has(wk))semanasJaImportadas.add(wk);}}
      const mesesJaImportados={};
      for(const wk of semanasJaImportadas){const[wy,wm]=wk.split("-");const mk=`${wy}-${wm}`;if(mesesNoArquivo[mk])mesesJaImportados[mk]=true;}
      const normais=mapped.filter(r=>!r.portaria_inteligente).length;
      const portaria=mapped.filter(r=>r.portaria_inteligente).length;
      setDispatchPreview({rows:mapped,normais,portaria,total,mesesNoArquivo,mesesJaImportados});
    },setDispatchError);
  }

  function confirmClients(){onImportClients(clientPreview);setClientPreview(null);setClientFileName("");if(clientRef.current)clientRef.current.value="";}
  function confirmDispatches(){onImportDispatches(dispatchPreview.rows);setDispatchPreview(null);setDispatchFileName("");if(dispatchRef.current)dispatchRef.current.value="";}
  const card={borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",padding:24,marginBottom:20};

  return(
    <div>
      {(clients.length>0||dispatches.length>0)&&(
        <div style={{ borderRadius:12,border:"1px solid rgba(56,189,248,0.2)",background:"rgba(56,189,248,0.05)",padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12 }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>

            <div><div style={{ fontSize:22,fontWeight:800,color:"#fff" }}>{value}</div><div style={{ fontSize:11,color:"rgba(255,255,255,0.35)" }}>{label}</div></div>

        ))}
      </div>
      <div style={card}>
        <SectionLabel>📋 Importar Clientes</SectionLabel>
        <div style={{ borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.03)",padding:"12px 16px",marginBottom:16 }}>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em" }}>Colunas da planilha</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,alignItems:"center" }}>
            <ColTag color="#38bdf8">Conta</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Código</span>

        </div>
        <DropZone color="#38bdf8" fileName={clientFileName} inputRef={clientRef} onChange={handleClientFile} label="Clique para selecionar a planilha de clientes" />
        {clientError&&<div style={{ marginTop:12,padding:"10px 14px",borderRadius:10,background:"#ef444420",border:"1px solid #ef444440",color:"#f87171",fontSize:12 }}>⚠️ {clientError}</div>}
        {clientPreview&&(
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:10 }}>✅ <strong style={{ color:"#34d399" }}>{clientPreview.length} clientes</strong> encontrados — prévia:</div>
            <div style={{ overflowX:"auto",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)" }}>
              <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
                <thead><tr style={{ background:"rgba(255,255,255,0.04)" }}>{["Código","Nome","Filial","Cidade","Mensalidade"].map(h=><th key={h} style={{ padding:"8px 12px",textAlign:"left",color:"rgba(255,255,255,0.3)",fontSize:10,textTransform:"uppercase" }}>{h}</th>)}</tr></thead>
                <tbody>{clientPreview.slice(0,5).map((r,i)=><tr key={i} style={{ borderTop:"1px solid rgba(255,255,255,0.05)" }}><td style={{ padding:"8px 12px",color:"#38bdf8",fontFamily:"monospace" }}>{r.codigo_cliente}</td><td style={{ padding:"8px 12px",color:"#fff" }}>{r.nome_cliente}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.filial}</td><td style={{ padding:"8px 12px",color:"#a78bfa" }}>{r.cidade||"—"}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.mensalidade?formatCurrency(r.mensalidade):"—"}</td></tr>)}</tbody>

            <div style={{ display:"flex",gap:10,marginTop:14 }}>

              <button onClick={()=>{setClientPreview(null);setClientFileName("");if(clientRef.current)clientRef.current.value="";}} style={{ padding:"10px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer" }}>Cancelar</button>

      <div style={card}>
        <SectionLabel>🚗 Importar Deslocamentos</SectionLabel>
        <div style={{ borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.03)",padding:"12px 16px",marginBottom:16 }}>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em" }}>Colunas da planilha</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,alignItems:"center" }}>
            <ColTag color="#818cf8">Código da conta</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Código</span>
            <ColTag color="#818cf8">Empresa</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Filial</span>
            <ColTag color="#818cf8">Data de recepção</ColTag><ColTag color="#818cf8">Evento</ColTag>
            <ColTag color="#ffffff50">Viatura</ColTag><ColTag color="#ffffff50">Fantasia (Razão social)</ColTag>
          </div>
          <div style={{ marginTop:10,fontSize:11,color:"rgba(255,255,255,0.2)",lineHeight:1.7 }}>🏢 Clientes com <strong style={{ color:"#a78bfa" }}>Portaria Inteligente</strong> são separados automaticamente e aparecem na aba dedicada</div>
        </div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:"rgba(255,255,255,0.35)",marginBottom:8 }}>📌 Filial desta importação <span style={{ color:"#f87171",fontWeight:400,textTransform:"none",letterSpacing:0 }}>(obrigatório)</span></div>
          <select value={filialForcada} onChange={e=>{setFilialForcada(e.target.value);setDispatchPreview(null);setDispatchFileName("");if(dispatchRef.current)dispatchRef.current.value="";}} style={{ width:"100%",padding:"10px 14px",borderRadius:10,border:filialForcada?"1px solid rgba(129,140,248,0.5)":"1px solid rgba(239,68,68,0.5)",background:filialForcada?"rgba(129,140,248,0.08)":"rgba(239,68,68,0.06)",color:filialForcada?"#818cf8":"#f87171",fontSize:13,fontWeight:700,outline:"none",cursor:"pointer" }}>
            <option value="">— Selecione a filial antes de importar —</option>
            <option value="SERVIS CEARÁ">SERVIS CEARÁ</option><option value="SERVIS AMAZONAS">SERVIS AMAZONAS</option><option value="SERVIS MARANHÃO">SERVIS MARANHÃO</option>
            <option value="SECOPI TERESINA">SECOPI TERESINA</option><option value="SECOPI PICOS">SECOPI PICOS</option><option value="SECOPI PARNAÍBA">SECOPI PARNAÍBA</option>
            <option value="1 P3 SOLUCOES">P3 SOLUÇÕES</option><option value="2 PROGUARD">PROGUARD</option><option value="Maver Monitoramento">MAVER MONITORAMENTO</option>
            <option value="SIDERALTECH">SIDERALTECH</option><option value="VISION SEGURANCA">VISION SEGURANÇA</option><option value="OVERTEC">OVERTEC</option>
            <option value="3 LUXUS SERVICOS E TECNOLOGIA LTDA">LUXUS</option><option value="4 PRIORIDADE SERVICOS TERCEIRIZADOS LTDA">PRIORIDADE</option><option value="PERES MONITORAMENTO">PERES MONITORAMENTO</option>
          </select>
          {filialForcada&&<div style={{ marginTop:6,fontSize:11,color:"#34d399" }}>✅ Todos os registros desta importação serão salvos como <strong>{filialForcada}</strong></div>}
        </div>
        <DropZone color={filialForcada?"#818cf8":"#ef4444"} fileName={dispatchFileName} inputRef={dispatchRef} onChange={filialForcada?handleDispatchFile:()=>alert("Selecione a filial antes de escolher o arquivo!")} label={filialForcada?"Clique para selecionar a planilha de deslocamentos":"⚠️ Selecione a filial acima primeiro"} />
        {dispatchError&&<div style={{ marginTop:12,padding:"10px 14px",borderRadius:10,background:"#ef444420",border:"1px solid #ef444440",color:"#f87171",fontSize:12 }}>⚠️ {dispatchError}</div>}
        {dispatchPreview&&(
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:10 }}>✅ <strong style={{ color:"#34d399" }}>{dispatchPreview.normais} deslocamentos normais</strong>{dispatchPreview.portaria>0&&<span style={{ marginLeft:8,color:"#a78bfa" }}>+ {dispatchPreview.portaria} Portaria Inteligente (separados automaticamente)</span>}</div>
            <div style={{ marginBottom:12,display:"flex",flexWrap:"wrap",gap:6 }}>
              {Object.entries(dispatchPreview.mesesNoArquivo||{}).map(([mk,qt])=>{const jaImportado=dispatchPreview.mesesJaImportados?.[mk];return(<div key={mk} style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:700,border:jaImportado?"1px solid rgba(251,146,60,0.5)":"1px solid rgba(52,211,153,0.4)",background:jaImportado?"rgba(251,146,60,0.1)":"rgba(52,211,153,0.08)",color:jaImportado?"#fb923c":"#34d399" }}>{jaImportado?"⚠️":"🆕"} {monthLabel(mk)} <span style={{ opacity:0.7 }}>({qt} registros)</span>{jaImportado&&<span style={{ fontSize:10,opacity:0.8 }}>— já importado!</span>}</div>);})}
            </div>
            {Object.keys(dispatchPreview.mesesJaImportados||{}).length>0&&<div style={{ marginBottom:12,padding:"10px 14px",borderRadius:10,background:"rgba(251,146,60,0.1)",border:"1px solid rgba(251,146,60,0.35)",color:"#fb923c",fontSize:12,lineHeight:1.6 }}>⚠️ <strong>Atenção:</strong> {Object.keys(dispatchPreview.mesesJaImportados).map(mk=>monthLabel(mk)).join(", ")} já {Object.keys(dispatchPreview.mesesJaImportados).length===1?"foi importado":"foram importados"} anteriormente. Importar novamente vai <strong>duplicar</strong> os registros desse período.</div>}
            <div style={{ overflowX:"auto",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)" }}>
              <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
                <thead><tr style={{ background:"rgba(255,255,255,0.04)" }}>{["Código","Filial","Data","Evento","Portaria?"].map(h=><th key={h} style={{ padding:"8px 12px",textAlign:"left",color:"rgba(255,255,255,0.3)",fontSize:10,textTransform:"uppercase" }}>{h}</th>)}</tr></thead>
                <tbody>{dispatchPreview.rows.slice(0,5).map((r,i)=><tr key={i} style={{ borderTop:"1px solid rgba(255,255,255,0.05)" }}><td style={{ padding:"8px 12px",color:"#818cf8",fontFamily:"monospace" }}>{r.codigo_cliente}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.filial}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.data_hora}</td><td style={{ padding:"8px 12px",color:"#fff" }}>{r.evento}</td><td style={{ padding:"8px 12px" }}>{r.portaria_inteligente?<span style={{ color:"#a78bfa",fontWeight:700 }}>🏢 Sim</span>:<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td></tr>)}</tbody>
              </table>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:14 }}>
              <button onClick={confirmDispatches} style={{ flex:1,padding:10,borderRadius:10,border:"none",background:Object.keys(dispatchPreview.mesesJaImportados||{}).length>0?"#fb923c":"#818cf8",color:"#0a0f1a",fontWeight:700,fontSize:13,cursor:"pointer" }}>{Object.keys(dispatchPreview.mesesJaImportados||{}).length>0?"⚠️ Importar mesmo assim":"✅ Adicionar"} — {dispatchPreview.rows.length} registros ao banco</button>
              <button onClick={()=>{setDispatchPreview(null);setDispatchFileName("");if(dispatchRef.current)dispatchRef.current.value="";}} style={{ padding:"10px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
      <MensalidadesPadraoCard clients={clients} supabaseClient={supabaseClient} onRefresh={onRefresh} />
      <div style={{ borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.02)",padding:"14px 18px" }}>
        <div style={{ fontSize:11,color:"rgba(255,255,255,0.25)",lineHeight:1.8 }}>💡 Importe primeiro os <strong style={{ color:"#38bdf8" }}>clientes</strong>, depois os <strong style={{ color:"#818cf8" }}>deslocamentos</strong>. O cruzamento é feito por <strong style={{ color:"rgba(255,255,255,0.4)" }}>Código + Filial</strong>. Clientes de <strong style={{ color:"#a78bfa" }}>Portaria Inteligente</strong> são separados automaticamente para a aba dedicada. <strong style={{ color:"#34d399" }}>📥 Cada importação de deslocamentos é acumulativa</strong> — os meses anteriores são mantidos.</div>
      </div>
    </div>
  );
}
</script>
<script type="text/babel" data-presets="react">
function ClientesTab({ clients, dispatches, supabaseClient, onRefresh, isAdmin }) {
  const [busca,setBusca]=useState("");const [filialFiltro,setFilialFiltro]=useState("Todas");const [cidadeFiltro,setCidadeFiltro]=useState("Todas");
  const [statusFiltro,setStatusFiltro]=useState("Todos");const [mesFiltro,setMesFiltro]=useState("Todos");
  const [modalNovoCliente,setModalNovoCliente]=useState(false);const [editando,setEditando]=useState(null);const [salvando,setSalvando]=useState(false);const [msgSalvo,setMsgSalvo]=useState("");
  const FILIAIS=["SERVIS CEARÁ","SERVIS AMAZONAS","SERVIS MARANHÃO","SECOPI PIAUÍ","SECOPI PICOS","SECOPI PARNAÍBA","1 P3 SOLUCOES","2 PROGUARD","Maver Monitoramento","SIDERALTECH","VISION SEGURANCA","OVERTEC","3 LUXUS SERVICOS E TECNOLOGIA LTDA","4 PRIORIDADE SERVICOS TERCEIRIZADOS LTDA","PERES MONITORAMENTO"];
  useEffect(()=>{setCidadeFiltro("Todas");},[filialFiltro]);
  const cidadesDisponiveis=useMemo(()=>{const base=filialFiltro==="Todas"?clients:clients.filter(c=>c.filial===filialFiltro);const cidades=new Set(base.map(c=>String(c.cidade||"").trim().toUpperCase()).filter(Boolean));if(cidades.size<=1)return[];return["Todas",...Array.from(cidades).sort()];},[clients,filialFiltro]);
  const mesesDisponiveis=useMemo(()=>{const s=new Set();for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];},[dispatches]);
  const dispMap=useMemo(()=>{const m={};for(const d of dispatches.filter(x=>!x.portaria_inteligente)){if(mesFiltro!=="Todos"){const dt=parseDataHora(d.data_hora);if(!dt||getMonthKey(dt)!==mesFiltro)continue;}const k=`${d.codigo_cliente}||${d.filial}`;m[k]=(m[k]||0)+1;}return m;},[dispatches,mesFiltro]);
  const filiais=useMemo(()=>{const s=new Set(clients.map(c=>c.filial).filter(Boolean));return["Todas",...Array.from(s).sort()];},[clients]);
  const filtrados=useMemo(()=>{const buscaNorm=busca.toLowerCase().replace(/\s|^0+/g,"");return clients.filter(c=>{if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;if(cidadeFiltro!=="Todas"&&String(c.cidade||"").trim().toUpperCase()!==cidadeFiltro)return false;if(statusFiltro==="Ativos"&&c.status!=="ativo")return false;if(statusFiltro==="Inativos"&&c.status!=="inativo")return false;if(busca){const nome=(c.nome_cliente||"").toLowerCase();const cod=String(c.codigo_cliente||"").replace(/^0+/,"");if(!nome.includes(busca.toLowerCase())&&!cod.includes(buscaNorm))return false;}return true;});},[clients,busca,filialFiltro,cidadeFiltro,statusFiltro]);
  async function toggleStatus(c){const novoStatus=c.status==="ativo"?"inativo":"ativo";await supabaseClient.from("clients").update({status:novoStatus}).eq("codigo_cliente",c.codigo_cliente);onRefresh();}
  async function salvarNovoCliente(dados){setSalvando(true);const{error}=await supabaseClient.from("clients").upsert([{codigo_cliente:dados.codigo,nome_cliente:dados.nome,filial:dados.filial,mensalidade:parseFloat(dados.mensalidade)||0,status:"ativo"}],{onConflict:"codigo_cliente,filial"});setSalvando(false);if(!error){setModalNovoCliente(false);setMsgSalvo("✅ Cliente salvo!");setTimeout(()=>setMsgSalvo(""),4000);onRefresh();}else{setMsgSalvo("❌ Erro ao salvar: "+(error.message||JSON.stringify(error)));}}
  async function salvarEdicao(dados){setSalvando(true);const mensVal=parseFloat(String(dados.mensalidade).replace(",","."))||0;const{error}=await supabaseClient.from("clients").update({nome_cliente:dados.nome,mensalidade:mensVal}).eq("codigo_cliente",editando.codigo_cliente);setSalvando(false);if(!error){setEditando(null);setMsgSalvo("✅ Cliente atualizado!");setTimeout(()=>setMsgSalvo(""),4000);onRefresh();}else{setMsgSalvo("❌ Erro ao salvar: "+(error.message||JSON.stringify(error)));}}
  function exportarCSV(){const header="Código,Nome,Filial,Mensalidade,Status,Deslocamentos";const rows=filtrados.map(c=>{const desl=dispMap[`${c.codigo_cliente}||${c.filial}`]||0;return`${c.codigo_cliente},"${(c.nome_cliente||"").replace(/"/g,'""')}","${c.filial}",${c.mensalidade||0},${c.status},${desl}`;});const csv=[header,...rows].join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="clientes.csv";a.click();URL.revokeObjectURL(url);}
  const iStyle={width:"100%",padding:"9px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:13,outline:"none"};
  return(
    <div>
      {msgSalvo&&<div style={{ position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:3000,padding:"10px 24px",borderRadius:12,background:msgSalvo.startsWith("✅")?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.15)",border:msgSalvo.startsWith("✅")?"1px solid #10b98150":"1px solid #ef444450",color:msgSalvo.startsWith("✅")?"#34d399":"#f87171",fontSize:14,fontWeight:600 }}>{msgSalvo}</div>}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12 }}>
        <div><div style={{ fontSize:20,fontWeight:700 }}>👥 Clientes</div><div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{filtrados.length} de {clients.length} clientes</div></div>
        <div style={{ display:"flex",gap:10 }}>
          <button onClick={exportarCSV} style={{ background:"rgba(52,211,153,0.15)",border:"1px solid rgba(52,211,153,0.3)",color:"#34d399",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600 }}>⬇ Exportar CSV</button>
          <button onClick={()=>setModalNovoCliente(true)} style={{ background:"#38bdf8",border:"none",color:"#000",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:700 }}>+ Novo Cliente</button>
        </div>
      </div>
      <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
        <input placeholder="Buscar por nome ou código..." value={busca} onChange={e=>setBusca(e.target.value)} style={{ ...iStyle,flex:1,minWidth:200 }} />

                  <td style={{ padding:"12px 16px" }}><div style={{ fontWeight:600,color:ativo?"#fff":"rgba(255,255,255,0.5)" }}>{c.nome_cliente||"—"}</div></td>

}

          <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>FILIAL</label><select value={filial} onChange={e=>setFilial(e.target.value)} disabled={bloqueaFilial} style={{ ...iStyle,opacity:bloqueaFilial?0.5:1 }}>{filiais.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
          <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>MENSALIDADE (R$)</label><input value={mens} onChange={e=>setMens(e.target.value)} style={iStyle} placeholder="Ex: 150.00" type="number" /></div>

function RelatoriosTab({ clients, dispatches, mesFiltro, setMesFiltro }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");const [statusFiltro,setStatusFiltro]=useState("Todos");const [busca,setBusca]=useState("");const [clienteSelecionado,setClienteSelecionado]=useState(null);

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  const mesFiltroEfetivo = mesesDisponiveis.includes(mesFiltro) ? mesFiltro : "Todos";

  const dispMap=useMemo(()=>{
    const m={};
    for(const d of dispatches.filter(x=>!x.portaria_inteligente)){
      if(mesFiltroEfetivo!=="Todos"){const dt=parseDataHora(d.data_hora);if(!dt||getMonthKey(dt)!==mesFiltroEfetivo)continue;}
      const k=`${d.codigo_cliente}||${d.filial}`;m[k]=(m[k]||0)+1;
    }
    return m;
  },[dispatches,mesFiltroEfetivo]);

  const filiais=useMemo(()=>{const s=new Set(clients.map(c=>c.filial).filter(Boolean));return["Todas",...Array.from(s).sort()];},[clients]);
  const relatorio=useMemo(()=>clients.map(c=>{const desl=dispMap[`${c.codigo_cliente}||${c.filial}`]||0;const custo=desl*CUSTO_FISCAL;const mens=parseFloat(c.mensalidade)||0;const resultado=mens-custo;const status=calcStatus(mens,custo);return{...c,desl,custo,mens,resultado,status};}),[clients,dispMap]);
  const filtrado=useMemo(()=>relatorio.filter(c=>{if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;if(statusFiltro==="Prejuízo"&&c.status!=="PREJUÍZO")return false;if(statusFiltro==="Risco"&&c.status!=="RISCO")return false;if(statusFiltro==="Saudável"&&c.status!=="SAUDÁVEL")return false;if(statusFiltro==="Sem dados"&&c.status!=="SEM DADOS")return false;if(busca){const b=busca.toLowerCase();if(!(c.nome_cliente||"").toLowerCase().includes(b)&&!String(c.codigo_cliente).includes(b))return false;}return true;}).sort((a,b)=>b.desl-a.desl),[relatorio,filialFiltro,statusFiltro,busca]);
  const totais=useMemo(()=>({clientes:filtrado.length,desl:filtrado.reduce((s,c)=>s+c.desl,0),custo:filtrado.reduce((s,c)=>s+c.custo,0),mensalidade:filtrado.reduce((s,c)=>s+c.mens,0),resultado:filtrado.reduce((s,c)=>s+(c.mens>0?c.resultado:0),0),prejuizo:filtrado.filter(c=>c.status==="PREJUÍZO").length,risco:filtrado.filter(c=>c.status==="RISCO").length}),[filtrado]);
  function exportarCSV(){const header="Código,Nome,Filial,Mensalidade,Deslocamentos,Custo,Resultado,Status";const rows=filtrado.map(c=>`${c.codigo_cliente},"${(c.nome_cliente||"").replace(/"/g,'""')}","${c.filial}",${c.mens},${c.desl},${c.custo},${c.resultado},${c.status}`);const csv=[header,...rows].join("\n");const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="relatorio.csv";a.click();URL.revokeObjectURL(url);}
  const iStyle={padding:"9px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:13,outline:"none"};
  return(
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>📋 Relatório de Rentabilidade</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{filtrado.length} clientes · {totais.desl} deslocamentos{mesFiltroEfetivo!=="Todos"&&<span style={{ marginLeft:8,color:"#fb923c",fontWeight:600 }}>· {monthLabel(mesFiltroEfetivo)}</span>}</div>
        </div>
        <button onClick={exportarCSV} style={{ background:"rgba(251,146,60,0.15)",border:"1px solid rgba(251,146,60,0.3)",color:"#fb923c",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600 }}>⬇ Exportar CSV</button>
      </div>

      {/* MELHORIA 2: filtro de mês compartilhado em Relatórios */}
      <MesFiltroBar value={mesFiltroEfetivo} onChange={setMesFiltro} meses={mesesDisponiveis} accent="#fb923c" />

      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:20 }}>
        {[{label:"Total Mensalidade",val:`R$ ${totais.mensalidade.toLocaleString("pt-BR",{minimumFractionDigits:2})}`,color:"#34d399"},{label:"Custo Operacional",val:`R$ ${totais.custo.toLocaleString("pt-BR")}`,color:"#f472b6"},{label:"Resultado Líquido",val:`R$ ${totais.resultado.toLocaleString("pt-BR")}`,color:totais.resultado>=0?"#34d399":"#f87171"},{label:"Em Prejuízo",val:totais.prejuizo,color:"#f87171"},{label:"Em Risco",val:totais.risco,color:"#fbbf24"}].map((k,i)=>(
          <div key={i} style={{ background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",textAlign:"center",border:"1px solid rgba(255,255,255,0.05)" }}>
            <div style={{ fontSize:18,fontWeight:800,color:k.color }}>{k.val}</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4 }}>{k.label}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
        <input placeholder="Buscar cliente..." value={busca} onChange={e=>setBusca(e.target.value)} style={{ ...iStyle,flex:1,minWidth:200 }} />
        <select value={filialFiltro} onChange={e=>setFilialFiltro(e.target.value)} style={iStyle}>{filiais.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={statusFiltro} onChange={e=>setStatusFiltro(e.target.value)} style={iStyle}>{["Todos","Prejuízo","Risco","Saudável","Sem dados"].map(s=><option key={s} value={s}>{s}</option>)}</select>
      </div>
      <Card style={{ overflow:"hidden" }}>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>{["Código","Nome do Cliente","Filial","Mensalidade","Deslocamentos","Custo","Resultado","Status"].map((h,i)=><th key={i} style={{ padding:"12px 16px",textAlign:i<=1?"left":"center",color:"rgba(255,255,255,0.4)",fontWeight:600,fontSize:11,letterSpacing:0.5,whiteSpace:"nowrap" }}>{h}</th>)}</tr></thead>
            <tbody>
              {filtrado.length===0&&<tr><td colSpan={8} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.3)" }}>Nenhum cliente encontrado</td></tr>}
              {filtrado.map((c,i)=>{const cfg=STATUS_CONFIG[c.status]||STATUS_CONFIG["SEM DADOS"];return(
                <tr key={i} onClick={()=>setClienteSelecionado(c)} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"12px 16px",color:"rgba(255,255,255,0.4)",fontFamily:"monospace",fontSize:12 }}>{c.codigo_cliente}</td>
                  <td style={{ padding:"12px 16px",fontWeight:600 }}>{c.nome_cliente||"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:"rgba(255,255,255,0.5)",fontSize:12 }}>{c.filial}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:c.mens>0?"#34d399":"rgba(255,255,255,0.3)" }}>{c.mens>0?`R$ ${c.mens.toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:c.desl>0?"#38bdf8":"rgba(255,255,255,0.3)" }}>{c.desl||"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:c.custo>0?"#f472b6":"rgba(255,255,255,0.3)" }}>{c.custo>0?`R$ ${c.custo.toLocaleString("pt-BR")}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:c.mens>0?(c.resultado>=0?"#34d399":"#f87171"):"rgba(255,255,255,0.3)" }}>{c.mens>0?`R$ ${c.resultado.toLocaleString("pt-BR")}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center" }}><span style={{ fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,background:cfg.bg,color:cfg.text }}>{c.status}</span></td>
                </tr>
              );})}
              {filtrado.length>0&&<tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}><td colSpan={3} style={{ padding:"12px 16px",fontWeight:700,color:"rgba(255,255,255,0.6)",fontSize:12 }}>TOTAL ({filtrado.length} clientes)</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#34d399" }}>R$ {totais.mensalidade.toLocaleString("pt-BR",{minimumFractionDigits:2})}</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#38bdf8" }}>{totais.desl}</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#f472b6" }}>R$ {totais.custo.toLocaleString("pt-BR")}</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:totais.resultado>=0?"#34d399":"#f87171" }}>R$ {totais.resultado.toLocaleString("pt-BR")}</td><td></td></tr>}
            </tbody>
          </table>
        </div>
      </Card>
      {clienteSelecionado&&<ClienteModal cliente={clienteSelecionado} dispatches={dispatches} onClose={()=>setClienteSelecionado(null)} supabaseClient={supabaseClient} />}
    </div>
  );
}

  async function handleLogin(){
    setErro("");if(!email||!senha){setErro("Preencha e-mail e senha.");return;}setLoading(true);

            {loading?<><div style={{ width:16,height:16,border:"2px solid #0a0f1a40",borderTopColor:"#0a0f1a",borderRadius:"50%",animation:"spin 0.7s linear infinite" }} />Entrando…</>:"Entrar →"}

}

  async function salvar(){

    await carregarUsuarios();setShowForm(false);setEditId(null);setForm({nome:"",email:"",senha:"",perfil:"viewer"});setSalvando(false);setTimeout(()=>setMsgSucesso(""),4000);

        <button onClick={()=>{setShowForm(true);setEditId(null);setForm({nome:"",email:"",senha:"",perfil:"viewer"});setFormErro("");}} style={{ padding:"9px 18px",borderRadius:10,border:"none",background:"#38bdf8",color:"#0a0f1a",fontWeight:700,fontSize:13,cursor:"pointer" }}>+ Novo Usuário</button>

              <div key={key}><label style={{ fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em",color:"rgba(255,255,255,0.4)",display:"block",marginBottom:6 }}>{label}</label><input type={type} value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))} placeholder={placeholder} disabled={disabled} style={{ width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:disabled?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.05)",color:disabled?"rgba(255,255,255,0.3)":"#fff",fontSize:13,outline:"none",boxSizing:"border-box" }} /></div>
            ))}

          <div style={{ display:"flex",gap:10 }}>
            <button onClick={salvar} disabled={salvando} style={{ padding:"9px 20px",borderRadius:8,border:"none",background:salvando?"rgba(56,189,248,0.4)":"#38bdf8",color:"#0a0f1a",fontWeight:700,fontSize:13,cursor:"pointer" }}>{salvando?"Salvando…":editId?"Salvar alterações":"Criar usuário"}</button>
            <button onClick={()=>{setShowForm(false);setEditId(null);setFormErro("");}} style={{ padding:"9px 20px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
          </div>
        </div>
      )}
      <div style={{ borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",overflow:"hidden" }}>
        {loading?<InlineSpinner label="Carregando usuários..." />:(
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead><tr style={{ borderBottom:"1px solid rgba(255,255,255,0.05)" }}>{["Usuário","Perfil","Criado em","Ações"].map(h=><th key={h} style={{ padding:"12px 16px",textAlign:h==="Ações"?"center":"left",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)" }}>{h}</th>)}</tr></thead>
            <tbody>
              {usuarios.map(u=>{const pl=perfilStyle[u.perfil]||perfilStyle.viewer;const isSelf=u.id===usuarioAtual.id;return(
                <tr key={u.id} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                  <td style={{ padding:"14px 16px" }}><div style={{ display:"flex",alignItems:"center",gap:10 }}><div style={{ width:34,height:34,borderRadius:10,background:isSelf?"rgba(56,189,248,0.15)":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14 }}>{u.perfil==="admin"?"👑":"👤"}</div><div><div style={{ fontWeight:600,color:"#fff" }}>{u.nome}{isSelf&&<span style={{ fontSize:10,color:"#38bdf8" }}> (você)</span>}</div></div></div></td>
                  <td style={{ padding:"14px 16px" }}><span style={{ display:"inline-flex",alignItems:"center",gap:5,borderRadius:999,border:`1px solid ${pl.border}`,background:pl.bg,color:pl.color,padding:"3px 10px",fontSize:11,fontWeight:700 }}>{pl.label}</span></td>
                  <td style={{ padding:"14px 16px",color:"rgba(255,255,255,0.35)",fontSize:12 }}>{u.created_at?new Date(u.created_at).toLocaleDateString("pt-BR"):"—"}</td>
                  <td style={{ padding:"14px 16px",textAlign:"center" }}>
                    <div style={{ display:"flex",gap:6,justifyContent:"center" }}>
                      <button onClick={()=>editar(u)} style={{ padding:"5px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.6)",fontSize:12,cursor:"pointer" }}>✏️ Editar</button>
                      {!isSelf&&(confirmarDel===u.id?<><button onClick={()=>excluir(u.id)} style={{ padding:"5px 12px",borderRadius:7,border:"none",background:"#ef4444",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer" }}>Confirmar</button><button onClick={()=>setConfirmarDel(null)} style={{ padding:"5px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:12,cursor:"pointer" }}>Cancelar</button></>:<button onClick={()=>setConfirmarDel(u.id)} style={{ padding:"5px 12px",borderRadius:7,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:12,cursor:"pointer" }}>🗑 Excluir</button>)}
                    </div>

function App() {
  const [usuario,setUsuario]=useState(null);const [checkingAuth,setCheckingAuth]=useState(true);const [aba,setAba]=useState("dashboard");
  const [clients,setClients]=useState([]);const [dispatches,setDispatches]=useState([]);const [lastUpdated,setLastUpdated]=useState("");
  const [loadingData,setLoadingData]=useState(false);const [importMsg,setImportMsg]=useState("");
  const [confirmLimparDesl,setConfirmLimparDesl]=useState(false);const [confirmLimparTudo,setConfirmLimparTudo]=useState(false);

  // ── MELHORIA 2: estado global do filtro de mês ──
  const [mesFiltroGlobal, setMesFiltroGlobal] = useState("Todos");

  // Computa todos os meses disponíveis (union de normais + PI)
  const mesesTodos = useMemo(()=>{
    const s=new Set();
    for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt){const mk=getMonthKey(dt);if(mk)s.add(mk);}}
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  // Indicador visual na barra de abas quando filtro ativo
  const mesBadge = mesFiltroGlobal!=="Todos"
    ? <span style={{ marginLeft:6,background:"rgba(56,189,248,0.2)",color:"#38bdf8",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{monthLabel(mesFiltroGlobal)}</span>
    : null;

  useEffect(()=>{
    supabaseClient.auth.getSession().then(async({data:{session}})=>{
      if(session?.user){const{data:profile}=await supabaseClient.from("profiles").select("*").eq("id",session.user.id).single();const u={...session.user,nome:profile?.nome||session.user.email,perfil:profile?.perfil||"viewer"};setUsuario(u);await carregarDados();}
      setCheckingAuth(false);
    });
    const{data:{subscription}}=supabaseClient.auth.onAuthStateChange(async(event,session)=>{if(event==="SIGNED_OUT"){setUsuario(null);setClients([]);setDispatches([]);}});
    return()=>subscription.unsubscribe();
  },[]);

  async function fetchAll(table,order,ascending=true){
    let all=[],from=0;const PAGE=1000;
    while(true){const{data,error}=await supabaseClient.from(table).select("*").order(order,{ascending}).range(from,from+PAGE-1);if(error||!data||data.length===0)break;all=all.concat(data);if(data.length<PAGE)break;from+=PAGE;}
    return all;
  }

  async function carregarDados(){
    setLoadingData(true);
    const[cls,dis]=await Promise.all([fetchAll("clients","nome_cliente",true),fetchAll("dispatches","data_hora",false)]);
    const clsNorm=(cls||[]).map(c=>({...c,filial:limparEmpresa(c.filial)}));
    const disNorm=(dis||[]).map(d=>({...d,filial:limparEmpresa(d.filial),portaria_inteligente:d.portaria_inteligente||(d.nome_cliente||"").toUpperCase().includes("PORTARIA INTELIGENTE")}));
    setClients(clsNorm);setDispatches(disNorm);if(cls.length>0)setAba("dashboard");setLoadingData(false);
  }

  async function handleLogin(user){setUsuario(user);await carregarDados();}
  async function handleLogout(){await supabaseClient.auth.signOut();setUsuario(null);setClients([]);setDispatches([]);}

  async function handleImportClients(data){
    setLoadingData(true);
    const deduped=Object.values(data.reduce((acc,c)=>{const key=`${c.codigo_cliente}||${c.filial}`;acc[key]=c;return acc;},{}));
    let erros=0;
    for(let i=0;i<deduped.length;i+=500){const{error}=await supabaseClient.from("clients").upsert(deduped.slice(i,i+500),{onConflict:"codigo_cliente,filial"});if(error){erros++;}}
    if(erros>0){setImportMsg("❌ Erro ao salvar clientes.");setLoadingData(false);return;}
    setLastUpdated(new Date().toLocaleString("pt-BR"));setImportMsg("✅ Clientes importados com sucesso!");setTimeout(()=>setImportMsg(""),5000);await carregarDados();setAba("dashboard");
  }

  async function handleImportDispatches(data){
    setLoadingData(true);
    try{
      const clientesExistentes=new Set(clients.map(c=>`${c.codigo_cliente}||${c.filial}`));
      const novosClientesMap={};
      for(const d of data){if(!d.portaria_inteligente&&d.codigo_cliente&&d.filial){const key=`${d.codigo_cliente}||${d.filial}`;if(!clientesExistentes.has(key)&&!novosClientesMap[key])novosClientesMap[key]={codigo_cliente:d.codigo_cliente,nome_cliente:d.nome_cliente||d.codigo_cliente,filial:d.filial,mensalidade:0,status:"ativo"};}}
      const novosClientes=Object.values(novosClientesMap);
      if(novosClientes.length>0){for(let i=0;i<novosClientes.length;i+=500)await supabaseClient.from("clients").upsert(novosClientes.slice(i,i+500),{onConflict:"codigo_cliente,filial"});}
      const existentesSet=new Set();let fromDesl=0;
      while(true){const{data:existentes}=await supabaseClient.from("dispatches").select("codigo_cliente,filial,data_hora,evento,viatura").range(fromDesl,fromDesl+999);if(!existentes||existentes.length===0)break;for(const e of existentes)existentesSet.add(`${e.codigo_cliente}||${e.filial}||${e.data_hora}||${e.evento}||${e.viatura}`);if(existentes.length<1000)break;fromDesl+=1000;}
      const novos=data.filter(d=>!existentesSet.has(`${d.codigo_cliente||""}||${d.filial||""}||${d.data_hora||""}||${d.evento||""}||${d.viatura||""}`));
      const duplicados=data.length-novos.length;
      let totalInserido=0;
      for(let i=0;i<novos.length;i+=200){const lote=novos.slice(i,i+200).map(d=>({codigo_cliente:d.codigo_cliente||"",filial:d.filial||"",nome_cliente:d.nome_cliente||"",data_hora:d.data_hora||"",evento:d.evento||"",viatura:d.viatura||"",portaria_inteligente:d.portaria_inteligente||false}));const{error:insError}=await supabaseClient.from("dispatches").insert(lote);if(insError){setImportMsg("❌ Erro Supabase: "+insError.message);setLoadingData(false);return;}totalInserido+=lote.length;}
      setLastUpdated(new Date().toLocaleString("pt-BR"));
      const msgNovos=novosClientes.length>0?` · ${novosClientes.length} clientes novos`:"";
      const msgDup=duplicados>0?` · ${duplicados} duplicados ignorados`:"";
      setImportMsg("✅ "+totalInserido+" deslocamentos adicionados!"+msgNovos+msgDup);
      setTimeout(()=>setImportMsg(""),7000);await carregarDados();setAba("dashboard");
    }catch(e){setImportMsg("❌ Erro ao importar: "+e.message);setLoadingData(false);}
  }

  async function handleLimpar(){
    setLoadingData(true);
    try{
      let dIds=[],cIds=[],from=0;
      while(true){const{data}=await supabaseClient.from("dispatches").select("id").range(from,from+999);if(!data||data.length===0)break;dIds=dIds.concat(data.map(r=>r.id));if(data.length<1000)break;from+=1000;}
      for(let i=0;i<dIds.length;i+=500)await supabaseClient.from("dispatches").delete().in("id",dIds.slice(i,i+500));
      from=0;
      while(true){const{data}=await supabaseClient.from("clients").select("id").range(from,from+999);if(!data||data.length===0)break;cIds=cIds.concat(data.map(r=>r.id));if(data.length<1000)break;from+=1000;}
      for(let i=0;i<cIds.length;i+=500)await supabaseClient.from("clients").delete().in("id",cIds.slice(i,i+500));
    }catch(e){console.error("handleLimpar error:",e);}
    setClients([]);setDispatches([]);setLastUpdated("");setAba("importacao");setLoadingData(false);
  }

  async function handleLimparDeslocamentos(){
    setLoadingData(true);
    try{
      let allIds=[],from=0;const PAGE=1000;
      while(true){const{data,error}=await supabaseClient.from("dispatches").select("id").range(from,from+PAGE-1);if(error||!data||data.length===0)break;allIds=allIds.concat(data.map(r=>r.id));if(data.length<PAGE)break;from+=PAGE;}
      if(allIds.length>0){for(let i=0;i<allIds.length;i+=500){const{error}=await supabaseClient.from("dispatches").delete().in("id",allIds.slice(i,i+500));if(error){setImportMsg("❌ Erro ao apagar: "+error.message);setLoadingData(false);return;}}}
      setConfirmLimparDesl(false);
      setImportMsg("✅ "+allIds.length+" deslocamentos apagados com sucesso!");
      setTimeout(()=>setImportMsg(""),5000);
      await carregarDados();
    }catch(e){
      setImportMsg("❌ Erro inesperado: "+e.message);
      await carregarDados();
    }
    setLoadingData(false);
  }

  if(checkingAuth)return(<div style={{ minHeight:"100vh",background:"#080c14",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16 }}><style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style><div style={{ width:36,height:36,borderRadius:"50%",border:"2px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",animation:"spin 0.8s linear infinite" }} /><div style={{ fontSize:13,color:"rgba(255,255,255,0.3)" }}>Verificando sessão…</div></div>);
  if(!usuario)return <LoginScreen onLogin={handleLogin} />;

  const isAdmin=usuario.perfil==="admin";
  const piCount=dispatches.filter(d=>d.portaria_inteligente).length;

  return(
    <div className="dash-wrap" style={{ fontFamily:"'DM Sans','Segoe UI',sans-serif",minHeight:"100vh",background:"#080c14",padding:"28px 24px",color:"#fff" }}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      {importMsg&&<div style={{ position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:3000,padding:"12px 24px",borderRadius:12,background:importMsg.startsWith("✅")?"#10b98120":"#ef444420",border:importMsg.startsWith("✅")?"1px solid #10b98150":"1px solid #ef444450",color:importMsg.startsWith("✅")?"#34d399":"#f87171",fontSize:14,fontWeight:600,boxShadow:"0 8px 32px rgba(0,0,0,0.4)",whiteSpace:"nowrap" }}>{importMsg}</div>}
      {loadingData&&<div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16 }}><div style={{ width:40,height:40,borderRadius:"50%",border:"3px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",animation:"spin 0.8s linear infinite" }} /><div style={{ fontSize:14,color:"rgba(255,255,255,0.5)" }}>Sincronizando com o banco de dados…</div></div>}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28 }}>
        <div>
          <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:6 }}><div style={{ width:28,height:28,borderRadius:8,background:"rgba(56,189,248,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14 }}>🚔</div><span style={{ fontSize:11,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:"#38bdf8" }}>Central de Monitoramento</span></div>
          <h1 style={{ fontSize:26,fontWeight:800,margin:0,letterSpacing:"-0.5px" }}>Dashboard Executivo</h1>
          <p style={{ fontSize:13,color:"rgba(255,255,255,0.3)",margin:"4px 0 0" }}>Gestão e análise de deslocamentos de VTR</p>
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:12 }}>
          {lastUpdated&&<div style={{ textAlign:"right" }}><div style={{ fontSize:10,color:"rgba(255,255,255,0.2)",textTransform:"uppercase",letterSpacing:"0.08em" }}>Última importação</div><div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:600 }}>{lastUpdated}</div></div>}
          <div style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ width:28,height:28,borderRadius:8,background:isAdmin?"rgba(248,113,113,0.15)":"rgba(56,189,248,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13 }}>{isAdmin?"👑":"👤"}</div>
            <div><div style={{ fontSize:12,fontWeight:600,color:"#fff" }}>{usuario.nome}</div><div style={{ fontSize:10,color:isAdmin?"#f87171":"#38bdf8" }}>{isAdmin?"Admin":"Visualizador"}</div></div>
            <button onClick={handleLogout} title="Sair" style={{ marginLeft:4,width:26,height:26,borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.4)",fontSize:12,cursor:"pointer" }}>↩</button>
          </div>
          {isAdmin&&dispatches.length>0&&(confirmLimparDesl?(
            <div style={{ display:"flex",alignItems:"center",gap:6,padding:"6px 10px",borderRadius:10,background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.35)" }}>
              <span style={{ fontSize:11,color:"#f87171" }}>Apagar {dispatches.length} desl.?</span>
              <button onClick={handleLimparDeslocamentos} style={{ border:"none",background:"#ef4444",color:"#fff",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11,fontWeight:700 }}>Confirmar</button>
              <button onClick={()=>setConfirmLimparDesl(false)} style={{ border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.4)",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:11 }}>Cancelar</button>
            </div>
          ):<button onClick={()=>setConfirmLimparDesl(true)} style={{ border:"1px solid rgba(251,146,60,0.35)",background:"rgba(251,146,60,0.08)",borderRadius:10,padding:"7px 12px",fontSize:12,color:"rgba(251,146,60,0.8)",cursor:"pointer" }}>🗑 Limpar deslocamentos</button>)}
          {isAdmin&&(clients.length>0||dispatches.length>0)&&(confirmLimparTudo?(
            <div style={{ display:"flex",alignItems:"center",gap:6,padding:"8px 12px",borderRadius:10,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)" }}>
              <div style={{ fontSize:11,color:"#f87171",lineHeight:1.4 }}><div style={{ fontWeight:700 }}>⚠️ Apagar TUDO?</div><div style={{ opacity:0.8 }}>{clients.length} clientes + {dispatches.length} desl.</div></div>
              <div style={{ display:"flex",flexDirection:"column",gap:4 }}>
                <button onClick={()=>{handleLimpar();setConfirmLimparTudo(false);}} style={{ border:"none",background:"#ef4444",color:"#fff",borderRadius:7,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap" }}>Sim, apagar tudo</button>
                <button onClick={()=>setConfirmLimparTudo(false)} style={{ border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.4)",borderRadius:7,padding:"4px 12px",cursor:"pointer",fontSize:11 }}>Cancelar</button>
              </div>
            </div>
          ):<button onClick={()=>setConfirmLimparTudo(true)} style={{ border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",borderRadius:10,padding:"7px 12px",fontSize:12,color:"rgba(239,68,68,0.7)",cursor:"pointer" }}>🗑 Limpar tudo</button>)}
        </div>
      </div>

      {/* MELHORIA 2: badge do mês ativo visível na barra de abas */}
      <div style={{ display:"flex",gap:8,marginBottom:24,flexWrap:"wrap",alignItems:"center" }}>
        <TabBtn active={aba==="dashboard"} onClick={()=>setAba("dashboard")}>📊 Dashboard{aba==="dashboard"&&mesBadge}</TabBtn>
        <TabBtn active={aba==="portaria"} onClick={()=>setAba("portaria")} accent="#a78bfa">🏢 Portaria Inteligente{piCount>0&&<span style={{ marginLeft:6,background:"rgba(167,139,250,0.2)",color:"#a78bfa",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{piCount}</span>}{aba==="portaria"&&mesBadge}</TabBtn>
        <TabBtn active={aba==="comparativos"} onClick={()=>setAba("comparativos")} accent="#34d399">📅 Comparativos</TabBtn>
        <TabBtn active={aba==="clientes"} onClick={()=>setAba("clientes")} accent="#34d399">👥 Clientes{clients.length>0&&<span style={{ marginLeft:6,background:"rgba(52,211,153,0.2)",color:"#34d399",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{clients.length}</span>}</TabBtn>
        <TabBtn active={aba==="relatorios"} onClick={()=>setAba("relatorios")} accent="#fb923c">📋 Relatórios{aba==="relatorios"&&mesBadge}</TabBtn>
        {isAdmin&&<TabBtn active={aba==="importacao"} onClick={()=>setAba("importacao")}>📥 Importação{clients.length>0&&<span style={{ marginLeft:6,background:"rgba(56,189,248,0.2)",color:"#38bdf8",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{clients.length}</span>}</TabBtn>}
        {isAdmin&&<TabBtn active={aba==="usuarios"} onClick={()=>setAba("usuarios")} accent="#f87171">👑 Usuários</TabBtn>}
        {/* MELHORIA 2: indicador global quando mês filtrado */}
        {mesFiltroGlobal!=="Todos"&&(
          <div style={{ marginLeft:"auto",display:"flex",alignItems:"center",gap:8,padding:"5px 12px",borderRadius:99,background:"rgba(56,189,248,0.08)",border:"1px solid rgba(56,189,248,0.2)",fontSize:11,color:"#38bdf8",fontWeight:600 }}>
            📅 Filtrando: {monthLabel(mesFiltroGlobal)}
            <button onClick={()=>setMesFiltroGlobal("Todos")} style={{ background:"none",border:"none",color:"rgba(56,189,248,0.6)",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1 }}>✕</button>
          </div>
        )}
      </div>

      {aba==="dashboard"&&<DashboardTab clients={clients} dispatches={dispatches} mesFiltro={mesFiltroGlobal} setMesFiltro={setMesFiltroGlobal} mesesTodos={mesesTodos} />}
      {aba==="clientes"&&<ClientesTab clients={clients} dispatches={dispatches} supabaseClient={supabaseClient} onRefresh={carregarDados} isAdmin={isAdmin} />}
      {aba==="relatorios"&&<RelatoriosTab clients={clients} dispatches={dispatches} mesFiltro={mesFiltroGlobal} setMesFiltro={setMesFiltroGlobal} />}
      {aba==="portaria"&&<PortariaTab dispatches={dispatches} clients={clients} supabaseClient={supabaseClient} mesFiltro={mesFiltroGlobal} setMesFiltro={setMesFiltroGlobal} mesesTodos={mesesTodos} />}
      {aba==="comparativos"&&<ComparativosTab dispatches={dispatches} />}
      {aba==="importacao"&&isAdmin&&<ImportTab onImportClients={handleImportClients} onImportDispatches={handleImportDispatches} clients={clients} dispatches={dispatches} supabaseClient={supabaseClient} onRefresh={carregarDados} />}
      {aba==="usuarios"&&isAdmin&&<UsuariosTab usuarioAtual={usuario} />}
      <div style={{ marginTop:24,textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.15)" }}>Custo por deslocamento: R$ {CUSTO_FISCAL} · Dados em nuvem · Portaria Inteligente separada automaticamente</div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
