// ── Busca Global (Ctrl+K) ──
function BuscaGlobal({ clients, dispatches, onSelectCliente, onClose }) {
  const [q,setQ]=useState("");
  const ref=useRef(null);
  useEffect(()=>{ ref.current?.focus(); },[]);
  useEffect(()=>{
    const h=(e)=>{ if(e.key==="Escape")onClose(); };
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[onClose]);

  const resultados=useMemo(()=>{
    if(!q||q.trim().length<2)return[];
    const qn=q.toLowerCase().replace(/^0+/,"");
    const vistos=new Set();
    return clients.filter(c=>{
      const k=`${c.codigo_cliente}||${c.filial}`;
      if(vistos.has(k))return false;
      const nome=(c.nome_cliente||"").toLowerCase();
      const cod=String(c.codigo_cliente||"").replace(/^0+/,"");
      if(nome.includes(q.toLowerCase())||cod.includes(qn)){vistos.add(k);return true;}
      return false;
    }).slice(0,8);
  },[clients,q]);

  return(
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:9000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"15vh" }} onClick={onClose}>
      <div style={{ width:"100%",maxWidth:580,background:"#0f172a",borderRadius:16,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 24px 64px rgba(0,0,0,0.6)",overflow:"hidden" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
          <span style={{ fontSize:16,opacity:0.5 }}>🔍</span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar cliente por nome ou código…"
            style={{ flex:1,background:"none",border:"none",outline:"none",color:"#fff",fontSize:15,fontFamily:"inherit" }} />
          <span style={{ fontSize:11,color:"rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.06)",padding:"2px 8px",borderRadius:6 }}>ESC</span>
        </div>
        {q.length>=2&&(
          <div>
            {resultados.length===0?(
              <div style={{ padding:"24px",textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:13 }}>Nenhum cliente encontrado para "{q}"</div>
            ):resultados.map((c,i)=>{
              const sc=STATUS_CONFIG[c.status_financeiro]||STATUS_CONFIG["SEM DADOS"];
              return(
                <div key={i} onClick={()=>{onSelectCliente(c);onClose();}}
                  style={{ padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"background 0.1s" }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div>
                    <div style={{ fontSize:13,fontWeight:600,color:"#fff" }}>{c.nome_cliente}</div>
                    <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>
                      {c.codigo_cliente} · {c.filial}
                      {c.area&&<span style={{ color:"#fb923c",marginLeft:6 }}>Área {c.area}</span>}
                    </div>
                  </div>
                  <span style={{ fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:sc.bg,color:sc.text }}>{c.status_financeiro||"SEM DADOS"}</span>
                </div>
              );
            })}
            <div style={{ padding:"8px 18px",fontSize:10,color:"rgba(255,255,255,0.2)",textAlign:"center" }}>
              {resultados.length} resultado{resultados.length!==1?"s":""} · clique para abrir o modal do cliente
            </div>
          </div>
        )}
        {q.length<2&&(
          <div style={{ padding:"20px 18px",color:"rgba(255,255,255,0.2)",fontSize:12 }}>
            Digite pelo menos 2 caracteres para buscar · <kbd style={{ background:"rgba(255,255,255,0.06)",padding:"1px 6px",borderRadius:4,fontSize:10 }}>Ctrl+K</kbd> para abrir a qualquer momento
          </div>
        )}
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error("Dashboard erro:",error,info);}
  render(){
    if(this.state.hasError){
      return(
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#080c14",flexDirection:"column",gap:16,padding:32}}>
          <div style={{fontSize:40}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:700,color:"#f87171"}}>Erro ao renderizar o dashboard</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",maxWidth:480,textAlign:"center"}}>{String(this.state.error?.message||"Erro desconhecido")}</div>
          <button onClick={()=>this.setState({hasError:false,error:null})} style={{marginTop:8,padding:"10px 24px",borderRadius:10,border:"1px solid rgba(56,189,248,0.4)",background:"rgba(56,189,248,0.1)",color:"#38bdf8",fontSize:14,cursor:"pointer",fontWeight:600}}>🔄 Tentar novamente</button>
          <button onClick={()=>window.location.reload()} style={{padding:"10px 24px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.5)",fontSize:13,cursor:"pointer"}}>↺ Recarregar página</button>
        </div>
      );
    }
    return this.props.children;
  }
}

            <canvas ref={chartRef} role="img" aria-label="Gráfico de distribuição de clientes por classificação"/>
          </div>
          {chartView==='donut'&&(
            <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:14}}>
              {[['Críticos','#f87171',t.c],['Atenção','#fbbf24',t.a],['Saudáveis','#34d399',t.s]].map(([l,c,v])=>(
                <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'rgba(255,255,255,0.5)'}}>
                  <span style={{width:8,height:8,borderRadius:2,background:c,display:'block'}}/>
                  {l} <span style={{color:'#fff',fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Comparativo */}
        <div style={{...card('rgba(255,255,255,0.02)','rgba(255,255,255,0.07)')}}>
          <div style={{fontSize:13,fontWeight:600,color:'#fff',marginBottom:16,display:'flex',alignItems:'center',gap:8}}>
            <span style={{background:'rgba(167,139,250,0.15)',border:'1px solid rgba(167,139,250,0.3)',borderRadius:6,padding:'2px 8px',fontSize:11,color:'#a78bfa'}}>Comparativo</span>
            {hp?<span style={{fontSize:11,color:'rgba(255,255,255,0.3)'}}>{weeks[cw-1].label} → {w.label}</span>:<span style={{fontSize:11,color:'rgba(255,255,255,0.25)'}}>Importe a próxima semana para ver a evolução</span>}
          </div>

          {!cmp&&(
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:160,gap:10}}>
              <div style={{fontSize:32,opacity:.15}}>📊</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.2)',textAlign:'center',lineHeight:1.6}}>
                Nenhuma semana anterior para comparar.<br/>Importe o arquivo da semana seguinte para ver<br/>a evolução cliente a cliente.
              </div>
            </div>
          )}

          {cmp&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
              {/* Totais */}
              <div style={{background:'rgba(255,255,255,0.03)',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:10,color:'rgba(255,255,255,0.3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Variação de totais</div>
                {[['Críticos',cmp.pp.c,cmp.cp.c,'#f87171'],['Atenção',cmp.pp.a,cmp.cp.a,'#fbbf24'],['Saudáveis',cmp.pp.s,cmp.cp.s,'#34d399'],['Total',cmp.pp.t,cmp.cp.t,'#a78bfa']].map(([l,p,c,cor])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <span style={{fontSize:11,color:'rgba(255,255,255,0.4)',display:'flex',alignItems:'center',gap:5}}>
                      <span style={{width:6,height:6,borderRadius:'50%',background:cor,display:'block'}}/>
                      {l}
                    </span>
                    <span style={{fontSize:11,fontWeight:600,color:'#fff'}}>{p} → {c} {dlt(c,p)}</span>
                  </div>
                ))}
              </div>
              {/* Negativos */}
              <div style={{background:'rgba(239,68,68,0.05)',borderRadius:12,padding:'12px 14px',border:'1px solid rgba(239,68,68,0.12)'}}>
                <div style={{fontSize:10,color:'#f87171',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Movimentos negativos</div>
                {[['Pioraram → crítico',cmp.mv.pc],['Pioraram → atenção',cmp.mv.pa],['Mantiveram crítico',cmp.mv.mc],['Mantiveram atenção',cmp.mv.ma]].map(([l,v])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>{l}</span>
                    <span style={{fontSize:13,fontWeight:700,color:v>0?'#f87171':'rgba(255,255,255,0.2)'}}>{v}</span>
                  </div>
                ))}
              </div>
              {/* Positivos */}
              <div style={{background:'rgba(52,211,153,0.05)',borderRadius:12,padding:'12px 14px',border:'1px solid rgba(52,211,153,0.12)'}}>
                <div style={{fontSize:10,color:'#34d399',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Movimentos positivos</div>
                {[['Melhoraram → saudável',cmp.mv.mels],['Melhoraram → atenção',cmp.mv.mela],['Mantiveram saudável',cmp.mv.ms],['Novos clientes',cmp.mv.novo]].map(([l,v])=>(
                  <div key={l} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                    <span style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>{l}</span>
                    <span style={{fontSize:13,fontWeight:700,color:v>0?'#34d399':'rgba(255,255,255,0.2)'}}>{v}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── Tabs crítico/atenção/saudável ── */}
      <div style={{display:'flex',gap:4,marginBottom:14,borderBottom:'1px solid rgba(255,255,255,0.07)',paddingBottom:0}}>
        {[['c','Críticos',t.c,'#f87171'],['a','Atenção',t.a,'#fbbf24'],['s','Saudáveis',t.s,'#34d399']].map(([k,l,n,c])=>(
          <button key={k} onClick={()=>{setTab(k);setPage(0);}}
            style={{background:'transparent',border:'none',padding:'8px 18px',fontSize:13,cursor:'pointer',
              color:tab===k?c:'rgba(255,255,255,0.35)',fontWeight:tab===k?700:400,
              borderBottom:'2px solid '+(tab===k?c:'transparent'),marginBottom:-1,transition:'all 0.15s'}}>
            {l} <span style={{background:tab===k?c.replace(')',',0.15)').replace('rgb','rgba'):'rgba(255,255,255,0.06)',borderRadius:99,padding:'1px 7px',fontSize:11,marginLeft:4,color:tab===k?c:'rgba(255,255,255,0.3)',border:'1px solid '+(tab===k?c.replace(')',',0.3)').replace('rgb','rgba'):'rgba(255,255,255,0.08)')}}>{n}</span>
          </button>
        ))}
      </div>

      {/* ── Filtros ── */}
      <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="🔍  Buscar cliente ou conta..." style={{...inp,flex:1,minWidth:220}}/>
        <select value={empFil} onChange={e=>{setEmpFil(e.target.value);setPage(0);}} style={inp}>
          <option value="">Todas as empresas</option>
          {empresas.map(em=><option key={em} value={em}>{em.replace(/^\d+\.\s/,'')}</option>)}
        </select>
        {hp&&(
          <select value={evof} onChange={e=>{setEvof(e.target.value);setPage(0);}} style={inp}>
            <option value="">Toda evolução</option>
            <option value="pc">Piorou → crítico</option>
            <option value="pa">Piorou → atenção</option>
            <option value="mc">Manteve crítico</option>
            <option value="ma">Manteve atenção</option>
            <option value="ms">Manteve saudável</option>
            <option value="mels">Melhorou → saudável</option>
            <option value="mela">Melhorou → atenção</option>
            <option value="novo">Novo cliente</option>
          </select>
        )}
      </div>

      {/* ── Tabela ── */}
      <div style={{background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:14,overflow:'hidden'}}>
        <div className="table-scroll">
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13,tableLayout:'fixed'}}>
            <colgroup>
              <col style={{width:100}}/><col/><col style={{width:140}}/><col style={{width:90}}/>
              {hp&&<col style={{width:85}}/>}
              {hp&&<col style={{width:165}}/>}
            </colgroup>
            <thead>
              <tr style={{borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
                {['Conta','Cliente','Empresa','Eventos',...(hp?['Ant.','Evolução']:[])].map(h=>(
                  <th key={h} style={{padding:'10px 14px',textAlign:h==='Eventos'||h==='Ant.'?'right':'left',fontSize:10,color:'rgba(255,255,255,0.3)',fontWeight:700,background:'rgba(255,255,255,0.02)',textTransform:'uppercase',letterSpacing:'.07em'}}>
                    {h}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {pageRows.length===0&&(
                <tr><td colSpan={hp?6:4} style={{padding:28,textAlign:'center',color:'rgba(255,255,255,0.15)',fontSize:13}}>Nenhum cliente encontrado</td></tr>
              )}
              {pageRows.map((r,i)=>{
                const ev=hp?getEvo(r.conta,cw):null;
                const pv=hp?prevRows.find(p=>p.conta.trim()===r.conta.trim()):null;
                const even=i%2===0;
                return(
                  <tr key={i} style={{borderBottom:'1px solid rgba(255,255,255,0.04)',background:even?'transparent':'rgba(255,255,255,0.015)',transition:'background 0.1s'}}>
                    <td style={{padding:'9px 14px',fontFamily:'monospace',fontSize:11,color:'rgba(255,255,255,0.35)'}}>{r.conta}</td>
                    <td style={{padding:'9px 14px',color:'rgba(255,255,255,0.85)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.cliente}>{r.cliente}</td>
                    <td style={{padding:'9px 14px',fontSize:11,color:'rgba(255,255,255,0.3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.empresa.replace(/^\d+\.\s/,'')}</td>
                    <td style={{padding:'9px 14px',textAlign:'right',fontWeight:700,color:'#fff'}}>{r.eventos.toLocaleString('pt-BR')}</td>
                    {hp&&<td style={{padding:'9px 14px',textAlign:'right',color:'rgba(255,255,255,0.25)'}}>{pv?pv.eventos.toLocaleString('pt-BR'):'—'}</td>}
                    {hp&&<td style={{padding:'9px 14px'}}>{ev&&<span style={evoBadgeStyle(ev.cls)}>{ev.label}</span>}</td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div className="pgn">
          <span className="pgn-info">{start+1}–{Math.min(start+PS,tabRows.length)} de {tabRows.length} clientes</span>
          <button className="pgn-btn" disabled={page===0} onClick={()=>setPage(p=>p-1)}>←</button>
          {[...Array(Math.min(5,Math.ceil(tabRows.length/PS)))].map((_,i)=>{
            const pg=Math.max(0,Math.min(page-2,Math.ceil(tabRows.length/PS)-5))+i;
            return<button key={pg} className={'pgn-btn'+(page===pg?' on':'')} onClick={()=>setPage(pg)}>{pg+1}</button>;
          })}
          <button className="pgn-btn" disabled={start+PS>=tabRows.length} onClick={()=>setPage(p=>p+1)}>→</button>
        </div>
      </div>

      {cw===0&&(
        <div style={{marginTop:16,padding:'12px 18px',borderRadius:12,background:'rgba(167,139,250,0.05)',border:'1px solid rgba(167,139,250,0.15)',fontSize:12,color:'rgba(167,139,250,0.6)',lineHeight:1.6}}>
          💡 <strong style={{color:'rgba(167,139,250,0.9)'}}>Semana base carregada</strong> (11/05–17/05 · {t.t.toLocaleString('pt-BR')} clientes). Importe o arquivo da próxima semana para ativar o comparativo e ver a evolução automática de cada cliente.<br/>
          <span style={{fontSize:11,color:'rgba(167,139,250,0.4)'}}>Colunas esperadas: Empresa · Conta · Fantasia · Quantidade de eventos</span>
        </div>
      )}
    </div>
  );
}


function App() {
  const [usuario,setUsuario]=useState(null);const [checkingAuth,setCheckingAuth]=useState(true);const [aba,setAba]=useState("dashboard");
  const [buscaGlobalAberta,setBuscaGlobalAberta]=useState(false);
  const [clienteGlobal,setClienteGlobal]=useState(null);
  const [clients,setClients]=useState([]);const [dispatches,setDispatches]=useState([]);const [lastUpdated,setLastUpdated]=useState("");
  const [loadingData,setLoadingData]=useState(false);const [loadingMsg,setLoadingMsg]=useState("Sincronizando…");
  const [importMsg,setImportMsg]=useState("");const [erroGlobal,setErroGlobal]=useState("");
  const [confirmLimparDesl,setConfirmLimparDesl]=useState(false);const [confirmLimparTudo,setConfirmLimparTudo]=useState(false);
  // -- SEGURANÇA: texto de confirmação para ações destrutivas --
  const [confirmTextDesl,setConfirmTextDesl]=useState("");const [confirmTextTudo,setConfirmTextTudo]=useState("");
  // -- SEGWARE: estados de sincronização automática --
  const [segSyncStatus,setSegSyncStatus]=useState("idle"); // idle | syncing | ok | erro
  const [segSyncMsg,setSegSyncMsg]=useState("");
  const [segUltimaSync,setSegUltimaSync]=useState(()=>getUltimaSyncSegware());
  const [segAutoMin,setSegAutoMin]=useState(15); // intervalo em minutos
  const [segFilial,setSegFilial]=useState("SEGWARE"); // filial padrão para novos registros
  const [segDiasAtras,setSegDiasAtras]=useState(2); // quantos dias atrás buscar

  // -- UX: título dinâmico da página conforme aba ativa --
  useEffect(()=>{
    const nomes={"dashboard":"Dashboard","portaria":"Portaria Inteligente","filiais":"Painel de Filiais","mapa":"Mapa de Calor","comparativos":"Comparativos","clientes":"Clientes","relatorios":"Relatórios","importacao":"Importação","usuarios":"Usuários","analise":"Análise de Bases"};
    document.title=`${nomes[aba]||"Dashboard"} — Central de Monitoramento VTR`;
  },[aba]);

  // ── MELHORIA 2: estado global do filtro de mês ──
  const [mesFiltroGlobal, setMesFiltroGlobal] = useState("Todos");

  // Computa todos os meses disponíveis (union de normais + PI)
  const mesesTodos = useMemo(()=>{
    const s=new Set();
    for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt){const mk=getMonthKey(dt);if(mk)s.add(mk);}}
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  // Indicador visual na barra de abas quando filtro ativo
  const mesBadge = mesFiltroGlobal!=="Todos"
    ? <span style={{ marginLeft:6,background:"rgba(56,189,248,0.2)",color:"#38bdf8",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{monthLabel(mesFiltroGlobal)}</span>
    : null;

  const segSyncRef = useRef(null);

  async function executarSyncSegware() {
    if (!getSegwareToken()) {
      setSegSyncStatus("erro");
      setSegSyncMsg("Token Segware não configurado no config.js");
      return;
    }
    setSegSyncStatus("syncing");
    setSegSyncMsg("Buscando deslocamentos na Segware…");
    window._segSyncSetMsg = setSegSyncMsg;
    const result = await sincronizarSegware(supabaseClient, segFilial, segDiasAtras);
    if (result.erro) {
      setSegSyncStatus("erro");
      setSegSyncMsg("Erro: " + result.erro);
    } else {
      setSegSyncStatus("ok");
      const ts = getUltimaSyncSegware();
      setSegUltimaSync(ts);
      const totalBruto = result.total || 0;
      const filtrados = result.filtrados || 0;
      const novos = result.novos || 0;
      if (novos > 0) {
        setSegSyncMsg("✅ " + novos + " novos deslocamentos IN_PLACE importados! ("+filtrados+" com status 4 de "+totalBruto+" eventos brutos)");
      } else if (filtrados === 0 && totalBruto > 0) {
        setSegSyncMsg("⚠️ "+totalBruto+" eventos recebidos mas nenhum com status IN_PLACE (4). Verifique os eventos no console (F12).");
      } else {
        setSegSyncMsg("✅ Sincronizado — nenhum dado novo ("+filtrados+" IN_PLACE de "+totalBruto+" eventos)");
      }
      if (novos > 0) {
        try { localStorage.removeItem("vtr_dados_cache"); } catch {}
        await carregarDados(true);
      }
    }
    setTimeout(() => setSegSyncStatus(s => s==="ok"?"idle":s), 8000);
  }

  // Sync automático desabilitado no frontend — o Vercel Cron cuida disso de 3 em 3 horas
  // useEffect removido intencionalmente

  useEffect(()=>{
    supabaseClient.auth.getSession().then(async({data:{session},error})=>{
      if(error){setErroGlobal("Erro ao verificar sessão. Verifique sua conexão.");setCheckingAuth(false);return;}
      if(session?.user){
        const{data:profile}=await supabaseClient.from("profiles").select("id,nome,perfil").eq("id",session.user.id).single();
        setUsuario({...session.user,nome:profile?.nome||session.user.email,perfil:profile?.perfil||"viewer"});
        await carregarDados();
      }
      setCheckingAuth(false);
    });
    const{data:{subscription}}=supabaseClient.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_OUT"||event==="TOKEN_REFRESHED"&&!session){
        setUsuario(null);setClients([]);setDispatches([]);
      }
      if(event==="USER_UPDATED"&&!session){setUsuario(null);setClients([]);setDispatches([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // -- UX: atalhos de teclado para navegar entre abas (Alt+1 a Alt+7) --
  useEffect(()=>{
    if(!usuario) return;
    const isAdminUser = usuario.perfil==="admin";
    const abasDisponiveis = ["dashboard","portaria","filiais","mapa","comparativos","clientes","relatorios","analise",...(isAdminUser?["importacao","usuarios"]:[])];
    const handler=(e)=>{
      // Não ativa se o foco está em input/textarea
      if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName)) return;
      if(e.altKey&&e.key>="1"&&e.key<="7"){
        const idx=parseInt(e.key)-1;
        if(idx<abasDisponiveis.length){ e.preventDefault(); setAba(abasDisponiveis[idx]); }
        if(e.key==="k"&&(e.ctrlKey||e.metaKey)){e.preventDefault();setBuscaGlobalAberta(a=>!a);}
      }
    };
    document.addEventListener("keydown",handler);
    return()=>document.removeEventListener("keydown",handler);
  },[usuario]);

  async function fetchAll(table,order,ascending=true){
    let all=[],from=0;const PAGE=1000;const MAX=5000;
    // Para dispatches: limita aos últimos 30 dias e máx 5000 registros
    const filtroData = table==="dispatches"
      ? new Date(Date.now() - 30*24*3600000).toISOString().slice(0,10)
      : null;
    while(true){
      let q = supabaseClient.from(table).select("*").range(from,from+PAGE-1);
      if(filtroData) {
        q = q.order("created_at",{ascending:false}).gte("created_at", filtroData);
      } else {
        q = q.order(order,{ascending});
      }
      const{data,error}=await q;
      if(error) throw new Error(`Erro ao carregar ${table}: ${error.message}`);
      if(!data||data.length===0)break;
      all=all.concat(data);
      if(data.length<PAGE)break;
      from+=PAGE;
      if(all.length>=MAX)break;
    }
    return all;
  }

  const CACHE_KEY="vtr_dados_cache";
  const CACHE_TTL=5*60*1000; // 5 minutos
  const LOG_KEY="vtr_import_log";

  function adicionarLog(tipo,qtd,usuario_nome){
    try{
      const raw=localStorage.getItem(LOG_KEY);
      const logs=raw?JSON.parse(raw):[];
      logs.unshift({tipo,qtd,usuario:usuario_nome||"sistema",data:new Date().toLocaleString("pt-BR")});
      localStorage.setItem(LOG_KEY,JSON.stringify(logs.slice(0,50)));
    }catch{}
  }

  function salvarCache(cls,dis){
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),cls,dis}));}catch{}
  }
  function lerCache(){
    try{
      const raw=localStorage.getItem(CACHE_KEY);
      if(!raw)return null;
      const{ts,cls,dis}=JSON.parse(raw);
      if(Date.now()-ts>CACHE_TTL)return null;
      return{cls,dis};
    }catch{return null;}
  }

  async function carregarDados(forcarReload=false){
    // -- PERF: tenta cache local primeiro (5 min TTL) --
    if(!forcarReload){
      const cache=lerCache();
      if(cache){
        setLoadingMsg("Carregando do cache…");
        const clsNorm=(cache.cls||[]).map(c=>({...c,filial_original:c.filial,filial:limparEmpresa(c.filial)}));
        const disNorm=(cache.dis||[]).map(d=>({...d,filial:limparEmpresa(d.filial),portaria_inteligente:Boolean(d.portaria_inteligente)}));
        setClients(clsNorm);setDispatches(disNorm);
        setLoadingData(false);setLoadingMsg("Sincronizando…");
        return;
      }
    }
    setLoadingData(true);setErroGlobal("");
    try{
      setLoadingMsg("Carregando clientes…");
      const cls=await fetchAll("clients","nome_cliente",true);
      setLoadingMsg("Carregando deslocamentos…");
      const dis=await fetchAll("dispatches","data_hora",false);
      setLoadingMsg("Processando dados…");
      salvarCache(cls,dis);
      const clsNorm=(cls||[]).map(c=>({...c,filial_original:c.filial,filial:limparEmpresa(c.filial)}));
      const disNorm=(dis||[]).map(d=>({...d,filial:limparEmpresa(d.filial),portaria_inteligente:Boolean(d.portaria_inteligente)}));
      setClients(clsNorm);setDispatches(disNorm);
    }catch(e){
      setErroGlobal(e.message||"Erro ao carregar dados. Verifique sua conexão e tente novamente.");
    }
    setLoadingData(false);setLoadingMsg("Sincronizando…");
  }

  async function handleLogin(user){setUsuario(user);await carregarDados();}
  async function handleLogout(){await supabaseClient.auth.signOut();setUsuario(null);setClients([]);setDispatches([]);}

  async function handleImportClients(data){
    setLoadingData(true);
    // -- SEGURANÇA: sanitizar todos os campos antes de persistir --
    const sanitized=data.map(c=>({
      codigo_cliente:sanitizeStr(c.codigo_cliente,50),
      nome_cliente:sanitizeStr(c.nome_cliente,200),
      filial:sanitizeStr(c.filial,100),
      cidade:sanitizeStr(c.cidade,100),
      bairro:sanitizeStr(c.bairro,100),
      area:sanitizeStr(c.area||"",10),
      mensalidade:isNaN(Number(c.mensalidade))?0:Math.max(0,Number(c.mensalidade)),
      custo_individual:c.custo_individual&&!isNaN(Number(c.custo_individual))?Math.max(0,Number(c.custo_individual)):null,
      meta_desl:c.meta_desl&&!isNaN(Number(c.meta_desl))?Math.max(0,parseInt(c.meta_desl)):0,
      status:["ativo","inativo"].includes(String(c.status||"").toLowerCase())?c.status:"ativo",
    })).filter(c=>c.codigo_cliente&&c.filial);
    const deduped=Object.values(sanitized.reduce((acc,c)=>{const key=`${c.codigo_cliente}||${c.filial}`;acc[key]=c;return acc;},{}));
    // -- Testa com 1 registro para identificar erro de coluna --
    const{error:testeError}=await supabaseClient.from("clients").upsert([deduped[0]],{onConflict:"codigo_cliente,filial"});
    if(testeError){
      setImportMsg("❌ Erro de coluna: "+testeError.message);
      setLoadingData(false);return;
    }
    let erros=0;let erroMsg="";
    for(let i=0;i<deduped.length;i+=500){
      const{error}=await supabaseClient.from("clients").upsert(deduped.slice(i,i+500),{onConflict:"codigo_cliente,filial"});
      if(error){erros++;erroMsg=error.message||JSON.stringify(error);}
    }
    if(erros>0){setImportMsg("❌ Erro: "+erroMsg);setLoadingData(false);return;}
    try{localStorage.removeItem('vtr_dados_cache');}catch{} adicionarLog("clientes",deduped.length,usuario?.nome); setLastUpdated(new Date().toLocaleString("pt-BR"));setImportMsg("✅ Clientes importados com sucesso!");setTimeout(()=>setImportMsg(""),5000);await carregarDados(true);
  }

  async function handleImportDispatches(data){
    setLoadingData(true);
    try{
      // -- SEGURANÇA: sanitizar deslocamentos antes de persistir --
      const sanitized=data.map(d=>({
        codigo_cliente:sanitizeStr(d.codigo_cliente,50),
        filial:sanitizeStr(d.filial,100),
        nome_cliente:sanitizeStr(d.nome_cliente,200),
        data_hora:sanitizeStr(d.data_hora,30),
        evento:sanitizeStr(d.evento,300),
        viatura:sanitizeStr(d.viatura,100),
        portaria_inteligente:Boolean(d.portaria_inteligente),
      })).filter(d=>d.codigo_cliente&&d.filial);
      const clientesExistentes=new Set(clients.map(c=>`${c.codigo_cliente}||${c.filial}`));
      const novosClientesMap={};
      for(const d of sanitized){if(!d.portaria_inteligente&&d.codigo_cliente&&d.filial){const key=`${d.codigo_cliente}||${d.filial}`;if(!clientesExistentes.has(key)&&!novosClientesMap[key]){const nomeFallback=(d.nome_cliente||"").replace(/\(PORTARIA INTELIGENTE\)\s*[-–]?\s*/i,"").trim()||d.codigo_cliente;novosClientesMap[key]={codigo_cliente:d.codigo_cliente,nome_cliente:nomeFallback,filial:d.filial,mensalidade:0,status:"ativo"};}}}
      const novosClientes=Object.values(novosClientesMap);
      if(novosClientes.length>0){for(let i=0;i<novosClientes.length;i+=500)await supabaseClient.from("clients").upsert(novosClientes.slice(i,i+500),{onConflict:"codigo_cliente,filial"});}
      const existentesSet=new Set();let fromDesl=0;
      while(true){const{data:existentes}=await supabaseClient.from("dispatches").select("codigo_cliente,filial,data_hora,evento,viatura").range(fromDesl,fromDesl+999);if(!existentes||existentes.length===0)break;for(const e of existentes)existentesSet.add(`${e.codigo_cliente}||${e.filial}||${e.data_hora}||${e.evento}||${e.viatura}`);if(existentes.length<1000)break;fromDesl+=1000;}
      const novos=sanitized.filter(d=>!existentesSet.has(`${d.codigo_cliente}||${d.filial}||${String(d.data_hora||"")}||${d.evento}||${d.viatura}`));
      const duplicados=sanitized.length-novos.length;
      let totalInserido=0;
      for(let i=0;i<novos.length;i+=200){const lote=novos.slice(i,i+200);const{error:insError}=await supabaseClient.from("dispatches").insert(lote);if(insError){setImportMsg("❌ Erro Supabase: "+insError.message);setLoadingData(false);return;}totalInserido+=lote.length;}
      setLastUpdated(new Date().toLocaleString("pt-BR"));
      const msgNovos=novosClientes.length>0?` · ${novosClientes.length} clientes novos`:"";
      const msgDup=duplicados>0?` · ${duplicados} duplicados ignorados`:"";
      setImportMsg("✅ "+totalInserido+" deslocamentos adicionados!"+msgNovos+msgDup);
      try{localStorage.removeItem('vtr_dados_cache');}catch{} adicionarLog("deslocamentos",sanitized.length,usuario?.nome); setTimeout(()=>setImportMsg(""),7000);await carregarDados(true);
    }catch(e){setImportMsg("❌ Erro ao importar: "+e.message);setLoadingData(false);}
  }

  async function handleLimpar(){
    setLoadingData(true);
    try{
      let dIds=[],cIds=[],from=0;
      while(true){const{data}=await supabaseClient.from("dispatches").select("id").range(from,from+999);if(!data||data.length===0)break;dIds=dIds.concat(data.map(r=>r.id));if(data.length<1000)break;from+=1000;}
      for(let i=0;i<dIds.length;i+=500)await supabaseClient.from("dispatches").delete().in("id",dIds.slice(i,i+500));
      from=0;
      while(true){const{data}=await supabaseClient.from("clients").select("id").range(from,from+999);if(!data||data.length===0)break;cIds=cIds.concat(data.map(r=>r.id));if(data.length<1000)break;from+=1000;}
      for(let i=0;i<cIds.length;i+=500)await supabaseClient.from("clients").delete().in("id",cIds.slice(i,i+500));
    }catch(e){console.error("handleLimpar error:",e);}
    try{localStorage.removeItem('vtr_dados_cache');}catch{} setClients([]);setDispatches([]);setLastUpdated("");setAba("importacao");setLoadingData(false);
  }

  async function handleLimparDeslocamentos(){
    setLoadingData(true);
    try{
      let allIds=[],from=0;const PAGE=1000;
      while(true){const{data,error}=await supabaseClient.from("dispatches").select("id").range(from,from+PAGE-1);if(error||!data||data.length===0)break;allIds=allIds.concat(data.map(r=>r.id));if(data.length<PAGE)break;from+=PAGE;}
      if(allIds.length>0){for(let i=0;i<allIds.length;i+=500){const{error}=await supabaseClient.from("dispatches").delete().in("id",allIds.slice(i,i+500));if(error){setImportMsg("❌ Erro ao apagar: "+error.message);setLoadingData(false);return;}}}
      setConfirmLimparDesl(false);
      setImportMsg("✅ "+allIds.length+" deslocamentos apagados com sucesso!");
      setTimeout(()=>setImportMsg(""),5000);
      await carregarDados();
    }catch(e){
      setImportMsg("❌ Erro inesperado: "+e.message);
      await carregarDados();
    }
    setLoadingData(false);
  }

        </div>

          <div style={{ fontSize:13,color:"rgba(255,255,255,0.3)" }}>Verificando sessão…</div>
        </>

          <button onClick={()=>setErroGlobal("")} style={{ background:"none",border:"none",color:"rgba(255,255,255,0.3)",fontSize:16,cursor:"pointer",lineHeight:1 }}>✕</button>
        </div>
      )}
      {loadingData&&<div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16 }}><div style={{ width:40,height:40,borderRadius:"50%",border:"3px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",animation:"spin 0.8s linear infinite" }} /><div style={{ fontSize:14,color:"rgba(255,255,255,0.5)" }}>{loadingMsg}</div></div>}
      <div className="dash-header" style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:28 }}>

          <button onClick={()=>carregarDados(true)} disabled={loadingData} title="Atualizar dados (forçar recarga)" style={{ width:34,height:34,borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:loadingData?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.45)",fontSize:15,cursor:loadingData?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",flexShrink:0 }} onMouseEnter={e=>{if(!loadingData){e.currentTarget.style.borderColor="rgba(56,189,248,0.5)";e.currentTarget.style.color="#38bdf8";}}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";e.currentTarget.style.color="rgba(255,255,255,0.45)";}}> ↺ </button>
          <div style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)" }}>

      {aba==="importacao"&&isAdmin&&<ImportTab onImportClients={handleImportClients} onImportDispatches={handleImportDispatches} clients={clients} dispatches={dispatches} supabaseClient={supabaseClient} onRefresh={carregarDados} />}
      {aba==="importacao"&&isAdmin&&(
        <div style={{ marginTop:20, background:"rgba(56,189,248,0.04)", border:"1px solid rgba(56,189,248,0.18)", borderRadius:16, padding:24 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:18 }}>
            <span style={{ fontSize:20 }}>🔗</span>
            <div>
              <div style={{ fontSize:15, fontWeight:700, color:"#38bdf8" }}>Integração Segware</div>
              <div style={{ fontSize:11, color:"rgba(255,255,255,0.4)" }}>Sincroniza deslocamentos (status 2,3,4,7) automaticamente</div>
            </div>
            {segSyncStatus==="syncing" && <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6, fontSize:11, color:"#fbbf24" }}><div style={{ width:10,height:10,borderRadius:"50%",background:"#fbbf24",animation:"pulse 1s infinite" }}/> Sincronizando…</div>}
            {segSyncStatus==="ok" && <div style={{ marginLeft:"auto", fontSize:11, color:"#34d399" }}>✅ OK</div>}
            {segSyncStatus==="erro" && <div style={{ marginLeft:"auto", fontSize:11, color:"#f87171" }}>⚠️ Erro</div>}
          </div>

          {/* Status / mensagem */}
          {segSyncMsg && (
            <div style={{ marginBottom:14, padding:"8px 14px", borderRadius:10, background: segSyncStatus==="erro" ? "rgba(239,68,68,0.1)" : "rgba(52,211,153,0.08)", border: "1px solid " + (segSyncStatus==="erro" ? "rgba(239,68,68,0.3)" : "rgba(52,211,153,0.2)"), fontSize:12, color: segSyncStatus==="erro" ? "#f87171" : "#34d399" }}>
              {segSyncMsg}
            </div>
          )}

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14, marginBottom:16 }}>
            {/* Filial padrão */}
            <div>
              <label style={{ display:"block", fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>Filial padrão para novos registros</label>
              <input
                value={segFilial}
                onChange={e=>setSegFilial(e.target.value)}
                placeholder="Ex: SERVIS CEARÁ"
                style={{ width:"100%", padding:"8px 12px", borderRadius:9, border:"1px solid rgba(255,255,255,0.12)", background:"rgba(255,255,255,0.05)", color:"#fff", fontSize:13, outline:"none", boxSizing:"border-box" }}
              />
            </div>
            {/* Intervalo automático */}
            <div>
              <label style={{ display:"block", fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>Atualizar automaticamente a cada</label>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <input
                  type="number" min="1" max="1440"
                  value={segAutoMin}
                  onChange={e=>setSegAutoMin(Math.max(1,parseInt(e.target.value)||15))}
                  style={{ width:80, padding:"8px 12px", borderRadius:9, border:"1px solid rgba(255,255,255,0.12)", background:"rgba(255,255,255,0.05)", color:"#fff", fontSize:13, outline:"none" }}
                />
                <span style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>minutos</span>
              </div>
            </div>
            {/* Dias atrás */}
            <div>
              <label style={{ display:"block", fontSize:11, color:"rgba(255,255,255,0.5)", marginBottom:4 }}>Buscar eventos dos últimos</label>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <input
                  type="number" min="1" max="30"
                  value={segDiasAtras}
                  onChange={e=>setSegDiasAtras(Math.max(1,Math.min(30,parseInt(e.target.value)||2)))}
                  style={{ width:80, padding:"8px 12px", borderRadius:9, border:"1px solid rgba(255,255,255,0.12)", background:"rgba(255,255,255,0.05)", color:"#fff", fontSize:13, outline:"none" }}
                />
                <span style={{ fontSize:13, color:"rgba(255,255,255,0.5)" }}>dias</span>
              </div>
            </div>
          </div>

          {/* Token status */}
          <div style={{ marginBottom:16, padding:"8px 14px", borderRadius:10, background: getSegwareToken() ? "rgba(52,211,153,0.06)" : "rgba(239,68,68,0.08)", border:"1px solid " + (getSegwareToken() ? "rgba(52,211,153,0.2)" : "rgba(239,68,68,0.25)"), fontSize:12, color: getSegwareToken() ? "#34d399" : "#f87171" }}>
            {getSegwareToken()
              ? "Token Segware configurado no config.js ✓"
              : "Token nao encontrado - adicione window._SEGWARE_TOKEN no config.js"}
          </div>

          {/* Última sincronização */}
          {segUltimaSync && (
            <div style={{ marginBottom:16, fontSize:11, color:"rgba(255,255,255,0.35)" }}>
              Última sincronização: {segUltimaSync.toLocaleString("pt-BR")}
            </div>
          )}

          {/* Botões */}
          <div style={{ display:"flex", gap:10 }}>
            <button
              onClick={executarSyncSegware}
              disabled={segSyncStatus==="syncing" || !getSegwareToken()}
              style={{ flex:1, padding:"10px 0", borderRadius:10, border:"1px solid rgba(56,189,248,0.4)", background: segSyncStatus==="syncing"||!getSegwareToken() ? "rgba(56,189,248,0.05)" : "rgba(56,189,248,0.12)", color: segSyncStatus==="syncing"||!getSegwareToken() ? "rgba(56,189,248,0.4)" : "#38bdf8", fontSize:13, fontWeight:600, cursor: segSyncStatus==="syncing"||!getSegwareToken() ? "not-allowed" : "pointer" }}
            >
              {segSyncStatus==="syncing" ? "Sincronizando..." : "Sincronizar Agora"}
            </button>
          </div>
          <div style={{ marginTop:10, fontSize:10, color:"rgba(255,255,255,0.2)", lineHeight:1.5 }}>
            Filtra apenas IN_PLACE (status 4) — VTR saiu e chegou no local · Evita duplicatas automaticamente · Máx. 90 dias no dashboard
          </div>
        </div>
      )}
      {aba==="usuarios"&&isAdmin&&<UsuariosTab usuarioAtual={usuario} />}
      {aba==="analise"&&<AnaliseBases />}
      <div style={{ marginTop:24,textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",gap:10 }}>
        <img src={LOGO_LARANJA} alt="Servis" style={{ height:18,width:"auto",opacity:0.3 }} />
        Custo por deslocamento: R$ {CUSTO_FISCAL} · Dados em nuvem · Portaria Inteligente separada automaticamente
      </div>
      {buscaGlobalAberta&&<BuscaGlobal clients={clients} dispatches={dispatches} onSelectCliente={c=>{setClienteGlobal(c);}} onClose={()=>setBuscaGlobalAberta(false)} />}
      {clienteGlobal&&<ClienteModal cliente={clienteGlobal} dispatches={dispatches} onClose={()=>setClienteGlobal(null)} supabaseClient={supabaseClient} />}
      </div>{/* fim do wrapper relativo */}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
