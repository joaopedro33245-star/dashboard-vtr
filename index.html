                      {!isSelf&&(confirmarDel===u.id?<><button onClick={()=>excluir(u.id)} style={{ padding:"5px 12px",borderRadius:7,border:"none",background:"#ef4444",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer" }}>Confirmar</button><button onClick={()=>setConfirmarDel(null)} style={{ padding:"5px 12px",borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:12,cursor:"pointer" }}>Cancelar</button></>:<button onClick={()=>setConfirmarDel(u.id)} style={{ padding:"5px 12px",borderRadius:7,border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:12,cursor:"pointer" }}>🗑 Excluir</button>)}
                    </div>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}


// ── Busca Global (Ctrl+K) ──
function BuscaGlobal({ clients, dispatches, onSelectCliente, onClose }) {
  const [q,setQ]=useState("");
  const ref=useRef(null);
  useEffect(()=>{ ref.current?.focus(); },[]);
  useEffect(()=>{
    const h=(e)=>{ if(e.key==="Escape")onClose(); };
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[onClose]);

  const resultados=useMemo(()=>{
    if(!q||q.trim().length<2)return[];
    const qn=q.toLowerCase().replace(/^0+/,"");
    const vistos=new Set();
    return clients.filter(c=>{
      const k=`${c.codigo_cliente}||${c.filial}`;
      if(vistos.has(k))return false;
      const nome=(c.nome_cliente||"").toLowerCase();
      const cod=String(c.codigo_cliente||"").replace(/^0+/,"");
      if(nome.includes(q.toLowerCase())||cod.includes(qn)){vistos.add(k);return true;}
      return false;
    }).slice(0,8);
  },[clients,q]);

  return(
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:9000,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:"15vh" }} onClick={onClose}>
      <div style={{ width:"100%",maxWidth:580,background:"#0f172a",borderRadius:16,border:"1px solid rgba(255,255,255,0.12)",boxShadow:"0 24px 64px rgba(0,0,0,0.6)",overflow:"hidden" }} onClick={e=>e.stopPropagation()}>
        <div style={{ display:"flex",alignItems:"center",gap:12,padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
          <span style={{ fontSize:16,opacity:0.5 }}>🔍</span>
          <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar cliente por nome ou código…"
            style={{ flex:1,background:"none",border:"none",outline:"none",color:"#fff",fontSize:15,fontFamily:"inherit" }} />
          <span style={{ fontSize:11,color:"rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.06)",padding:"2px 8px",borderRadius:6 }}>ESC</span>
        </div>
        {q.length>=2&&(
          <div>
            {resultados.length===0?(
              <div style={{ padding:"24px",textAlign:"center",color:"rgba(255,255,255,0.3)",fontSize:13 }}>Nenhum cliente encontrado para "{q}"</div>
            ):resultados.map((c,i)=>{
              const sc=STATUS_CONFIG[c.status_financeiro]||STATUS_CONFIG["SEM DADOS"];
              return(
                <div key={i} onClick={()=>{onSelectCliente(c);onClose();}}
                  style={{ padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",transition:"background 0.1s" }}
                  onMouseEnter={e=>e.currentTarget.style.background="rgba(56,189,248,0.08)"}
                  onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <div>
                    <div style={{ fontSize:13,fontWeight:600,color:"#fff" }}>{c.nome_cliente}</div>
                    <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>
                      {c.codigo_cliente} · {c.filial}
                      {c.area&&<span style={{ color:"#fb923c",marginLeft:6 }}>Área {c.area}</span>}
                    </div>
                  </div>
                  <span style={{ fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:sc.bg,color:sc.text }}>{c.status_financeiro||"SEM DADOS"}</span>
                </div>
              );
            })}
            <div style={{ padding:"8px 18px",fontSize:10,color:"rgba(255,255,255,0.2)",textAlign:"center" }}>
              {resultados.length} resultado{resultados.length!==1?"s":""} · clique para abrir o modal do cliente
            </div>
          </div>
        )}
        {q.length<2&&(
          <div style={{ padding:"20px 18px",color:"rgba(255,255,255,0.2)",fontSize:12 }}>
            Digite pelo menos 2 caracteres para buscar · <kbd style={{ background:"rgba(255,255,255,0.06)",padding:"1px 6px",borderRadius:4,fontSize:10 }}>Ctrl+K</kbd> para abrir a qualquer momento
          </div>
        )}
      </div>
    </div>
  );
}

function App() {

  const [clients,setClients]=useState([]);const [dispatches,setDispatches]=useState([]);const [lastUpdated,setLastUpdated]=useState("");

  const [confirmLimparDesl,setConfirmLimparDesl]=useState(false);const [confirmLimparTudo,setConfirmLimparTudo]=useState(false);

  useEffect(()=>{
    supabaseClient.auth.getSession().then(async({data:{session},error})=>{
      if(error){setErroGlobal("Erro ao verificar sessão. Verifique sua conexão.");setCheckingAuth(false);return;}
      if(session?.user){
        const{data:profile}=await supabaseClient.from("profiles").select("id,nome,perfil").eq("id",session.user.id).single();
        setUsuario({...session.user,nome:profile?.nome||session.user.email,perfil:profile?.perfil||"viewer"});
        await carregarDados();
      }
      setCheckingAuth(false);
    });
    const{data:{subscription}}=supabaseClient.auth.onAuthStateChange(async(event,session)=>{
      if(event==="SIGNED_OUT"||event==="TOKEN_REFRESHED"&&!session){
        setUsuario(null);setClients([]);setDispatches([]);
      }
      // Sessão expirada detectada pelo Supabase
      if(event==="USER_UPDATED"&&!session){setUsuario(null);setClients([]);setDispatches([]);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  // -- UX: atalhos de teclado para navegar entre abas (Alt+1 a Alt+7) --
  useEffect(()=>{
    if(!usuario) return;
    const isAdminUser = usuario.perfil==="admin";
    const abasDisponiveis = ["dashboard","portaria","filiais","mapa","comparativos","clientes","relatorios",...(isAdminUser?["importacao","usuarios"]:[])];
    const handler=(e)=>{
      // Não ativa se o foco está em input/textarea
      if(["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName)) return;
      if(e.altKey&&e.key>="1"&&e.key<="7"){
        const idx=parseInt(e.key)-1;
        if(idx<abasDisponiveis.length){ e.preventDefault(); setAba(abasDisponiveis[idx]); }

      }

  },[usuario]);

  async function fetchAll(table,order,ascending=true){
    let all=[],from=0;const PAGE=1000;
    while(true){
      const{data,error}=await supabaseClient.from(table).select("*").order(order,{ascending}).range(from,from+PAGE-1);
      if(error) throw new Error(`Erro ao carregar ${table}: ${error.message}`);
      if(!data||data.length===0)break;
      all=all.concat(data);
      if(data.length<PAGE)break;
      from+=PAGE;
    }
    return all;
  }

  const CACHE_KEY="vtr_dados_cache";
  const CACHE_TTL=5*60*1000; // 5 minutos
  const LOG_KEY="vtr_import_log";

  function adicionarLog(tipo,qtd,usuario_nome){
    try{
      const raw=localStorage.getItem(LOG_KEY);
      const logs=raw?JSON.parse(raw):[];
      logs.unshift({tipo,qtd,usuario:usuario_nome||"sistema",data:new Date().toLocaleString("pt-BR")});
      localStorage.setItem(LOG_KEY,JSON.stringify(logs.slice(0,50)));
    }catch{}
  }

  function salvarCache(cls,dis){
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),cls,dis}));}catch{}
  }
  function lerCache(){
    try{
      const raw=localStorage.getItem(CACHE_KEY);
      if(!raw)return null;
      const{ts,cls,dis}=JSON.parse(raw);
      if(Date.now()-ts>CACHE_TTL)return null;
      return{cls,dis};
    }catch{return null;}
  }

  async function carregarDados(forcarReload=false){
    // -- PERF: tenta cache local primeiro (5 min TTL) --
    if(!forcarReload){
      const cache=lerCache();
      if(cache){
        setLoadingMsg("Carregando do cache…");
        const clsNorm=(cache.cls||[]).map(c=>({...c,filial:limparEmpresa(c.filial)}));
        const disNorm=(cache.dis||[]).map(d=>({...d,filial:limparEmpresa(d.filial),portaria_inteligente:d.portaria_inteligente||(d.nome_cliente||"").toUpperCase().includes("PORTARIA INTELIGENTE")}));
        setClients(clsNorm);setDispatches(disNorm);if(cache.cls.length>0)setAba("dashboard");
        setLoadingData(false);setLoadingMsg("Sincronizando…");
        return;
      }
    }
    setLoadingData(true);setErroGlobal("");
    try{
      setLoadingMsg("Carregando clientes…");
      const cls=await fetchAll("clients","nome_cliente",true);
      setLoadingMsg("Carregando deslocamentos…");
      const dis=await fetchAll("dispatches","data_hora",false);
      setLoadingMsg("Processando dados…");
      salvarCache(cls,dis);
      const clsNorm=(cls||[]).map(c=>({...c,filial:limparEmpresa(c.filial)}));
      const disNorm=(dis||[]).map(d=>({...d,filial:limparEmpresa(d.filial),portaria_inteligente:d.portaria_inteligente||(d.nome_cliente||"").toUpperCase().includes("PORTARIA INTELIGENTE")}));
      setClients(clsNorm);setDispatches(disNorm);if(cls.length>0)setAba("dashboard");
    }catch(e){
      setErroGlobal(e.message||"Erro ao carregar dados. Verifique sua conexão e tente novamente.");
    }
    setLoadingData(false);setLoadingMsg("Sincronizando…");
  }

  async function handleLogin(user){setUsuario(user);await carregarDados();}

  async function handleImportClients(data){
    setLoadingData(true);

    const sanitized=data.map(c=>({

      mensalidade:isNaN(Number(c.mensalidade))?0:Math.max(0,Number(c.mensalidade)),
      custo_individual:c.custo_individual&&!isNaN(Number(c.custo_individual))?Math.max(0,Number(c.custo_individual)):null,
      meta_desl:c.meta_desl&&!isNaN(Number(c.meta_desl))?Math.max(0,parseInt(c.meta_desl)):0,
      status:["ativo","inativo"].includes(String(c.status||"").toLowerCase())?c.status:"ativo",
    })).filter(c=>c.codigo_cliente&&c.filial);
    const deduped=Object.values(sanitized.reduce((acc,c)=>{const key=`${c.codigo_cliente}||${c.filial}`;acc[key]=c;return acc;},{}));
    let erros=0;

      setLastUpdated(new Date().toLocaleString("pt-BR"));

      setImportMsg("✅ "+totalInserido+" deslocamentos adicionados!"+msgNovos+msgDup);
      try{localStorage.removeItem('vtr_dados_cache');}catch{} adicionarLog("deslocamentos",sanitizedD.length,usuario?.nome); setTimeout(()=>setImportMsg(""),7000);await carregarDados(true);setAba("dashboard");
    }catch(e){setImportMsg("❌ Erro ao importar: "+e.message);setLoadingData(false);}
  }

  async function handleLimpar(){
    setLoadingData(true);
    try{
      let dIds=[],cIds=[],from=0;
      while(true){const{data}=await supabaseClient.from("dispatches").select("id").range(from,from+999);if(!data||data.length===0)break;dIds=dIds.concat(data.map(r=>r.id));if(data.length<1000)break;from+=1000;}

        </div>
      )}
      {loadingData&&<div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:2000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16 }}><div style={{ width:40,height:40,borderRadius:"50%",border:"3px solid rgba(56,189,248,0.2)",borderTopColor:"#38bdf8",animation:"spin 0.8s linear infinite" }} /><div style={{ fontSize:14,color:"rgba(255,255,255,0.5)" }}>{loadingMsg}</div></div>}

          <button onClick={()=>window.print()} title="Imprimir / Exportar PDF" className="no-print" style={{ width:34,height:34,borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.45)",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s" }} onMouseEnter={e=>{e.currentTarget.style.borderColor="rgba(251,146,60,0.5)";e.currentTarget.style.color="#fb923c";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";e.currentTarget.style.color="rgba(255,255,255,0.45)";}}>🖨</button>
          <button onClick={()=>carregarDados(true)} disabled={loadingData} title="Atualizar dados (forçar recarga)" style={{ width:34,height:34,borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:loadingData?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.45)",fontSize:15,cursor:loadingData?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",flexShrink:0 }} onMouseEnter={e=>{if(!loadingData){e.currentTarget.style.borderColor="rgba(56,189,248,0.5)";e.currentTarget.style.color="#38bdf8";}}} onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,0.1)";e.currentTarget.style.color="rgba(255,255,255,0.45)";}}> ↺ </button>
          <div style={{ display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:10,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)" }}>
            <div style={{ width:28,height:28,borderRadius:8,background:isAdmin?"rgba(248,113,113,0.15)":"rgba(56,189,248,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13 }}>{isAdmin?"👑":"👤"}</div>
            <div><div style={{ fontSize:12,fontWeight:600,color:"#fff" }}>{usuario.nome}</div><div style={{ fontSize:10,color:isAdmin?"#f87171":"#38bdf8" }}>{isAdmin?"Admin":"Visualizador"}</div></div>
            <button onClick={handleLogout} title="Sair" style={{ marginLeft:4,width:26,height:26,borderRadius:7,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"rgba(255,255,255,0.4)",fontSize:12,cursor:"pointer" }}>↩</button>
          </div>
          {isAdmin&&dispatches.length>0&&(confirmLimparDesl?(
            <div style={{ display:"flex",flexDirection:"column",gap:6,padding:"8px 12px",borderRadius:10,background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.35)",minWidth:220 }}>
              <span style={{ fontSize:11,color:"#f87171",fontWeight:700 }}>⚠️ Apagar {dispatches.length} deslocamentos?</span>
              <input value={confirmTextDesl} onChange={e=>setConfirmTextDesl(e.target.value)} placeholder='Digite "CONFIRMAR" para prosseguir' style={{ padding:"5px 8px",borderRadius:7,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:11,outline:"none",width:"100%" }} />
              <div style={{ display:"flex",gap:6 }}>
                <button onClick={handleLimparDeslocamentos} disabled={confirmTextDesl!=="CONFIRMAR"} style={{ flex:1,border:"none",background:confirmTextDesl==="CONFIRMAR"?"#ef4444":"rgba(239,68,68,0.3)",color:"#fff",borderRadius:7,padding:"5px 8px",cursor:confirmTextDesl==="CONFIRMAR"?"pointer":"not-allowed",fontSize:11,fontWeight:700 }}>Apagar</button>
                <button onClick={()=>{setConfirmLimparDesl(false);setConfirmTextDesl("");}} style={{ flex:1,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.4)",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:11 }}>Cancelar</button>
              </div>
            </div>
          ):<button onClick={()=>{setConfirmLimparDesl(true);setConfirmTextDesl("");}} style={{ border:"1px solid rgba(251,146,60,0.35)",background:"rgba(251,146,60,0.08)",borderRadius:10,padding:"7px 12px",fontSize:12,color:"rgba(251,146,60,0.8)",cursor:"pointer" }}>🗑 Limpar deslocamentos</button>)}
          {isAdmin&&(clients.length>0||dispatches.length>0)&&(confirmLimparTudo?(
            <div style={{ display:"flex",flexDirection:"column",gap:6,padding:"8px 12px",borderRadius:10,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.4)",minWidth:240 }}>
              <div style={{ fontSize:11,color:"#f87171",lineHeight:1.4 }}><div style={{ fontWeight:700 }}>⚠️ APAGAR TUDO PERMANENTEMENTE?</div><div style={{ opacity:0.8 }}>{clients.length} clientes + {dispatches.length} desl.</div></div>
              <input value={confirmTextTudo} onChange={e=>setConfirmTextTudo(e.target.value)} placeholder='Digite "CONFIRMAR" para prosseguir' style={{ padding:"5px 8px",borderRadius:7,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.08)",color:"#f87171",fontSize:11,outline:"none",width:"100%" }} />
              <div style={{ display:"flex",gap:6 }}>
                <button onClick={()=>{if(confirmTextTudo==="CONFIRMAR"){handleLimpar();setConfirmLimparTudo(false);setConfirmTextTudo("");}}} disabled={confirmTextTudo!=="CONFIRMAR"} style={{ flex:1,border:"none",background:confirmTextTudo==="CONFIRMAR"?"#ef4444":"rgba(239,68,68,0.3)",color:"#fff",borderRadius:7,padding:"5px 8px",cursor:confirmTextTudo==="CONFIRMAR"?"pointer":"not-allowed",fontSize:11,fontWeight:700,whiteSpace:"nowrap" }}>Apagar tudo</button>
                <button onClick={()=>{setConfirmLimparTudo(false);setConfirmTextTudo("");}} style={{ flex:1,border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.4)",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:11 }}>Cancelar</button>
              </div>
            </div>
          ):<button onClick={()=>{setConfirmLimparTudo(true);setConfirmTextTudo("");}} style={{ border:"1px solid rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.08)",borderRadius:10,padding:"7px 12px",fontSize:12,color:"rgba(239,68,68,0.7)",cursor:"pointer" }}>🗑 Limpar tudo</button>)}
        </div>
      </div>

      {/* Abas com dicas de atalho Alt+N */}
      <div className="tab-bar" style={{ display:"flex",gap:8,marginBottom:24,flexWrap:"wrap",alignItems:"center" }}>
        <TabBtn active={aba==="dashboard"} onClick={()=>setAba("dashboard")}>📊 Dashboard{aba==="dashboard"&&mesBadge}</TabBtn>
        <TabBtn active={aba==="portaria"} onClick={()=>setAba("portaria")} accent="#a78bfa">🏢 Portaria{piCount>0&&<span style={{ marginLeft:6,background:"rgba(167,139,250,0.2)",color:"#a78bfa",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{piCount}</span>}{aba==="portaria"&&mesBadge}</TabBtn>
        <TabBtn active={aba==="filiais"} onClick={()=>setAba("filiais")} accent="#06b6d4">🏢 Filiais</TabBtn>
        <TabBtn active={aba==="mapa"} onClick={()=>setAba("mapa")} accent="#f472b6">🔥 Mapa de Calor</TabBtn>
        <TabBtn active={aba==="comparativos"} onClick={()=>setAba("comparativos")} accent="#34d399">📅 Comparativos</TabBtn>
        <TabBtn active={aba==="clientes"} onClick={()=>setAba("clientes")} accent="#34d399">👥 Clientes{clients.length>0&&<span style={{ marginLeft:6,background:"rgba(52,211,153,0.2)",color:"#34d399",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{clients.length}</span>}</TabBtn>
        <TabBtn active={aba==="relatorios"} onClick={()=>setAba("relatorios")} accent="#fb923c">📋 Relatórios{aba==="relatorios"&&mesBadge}</TabBtn>
        {isAdmin&&<TabBtn active={aba==="importacao"} onClick={()=>setAba("importacao")}>📥 Importação{clients.length>0&&<span style={{ marginLeft:6,background:"rgba(56,189,248,0.2)",color:"#38bdf8",borderRadius:999,padding:"1px 7px",fontSize:10 }}>{clients.length}</span>}</TabBtn>}
        {isAdmin&&<TabBtn active={aba==="usuarios"} onClick={()=>setAba("usuarios")} accent="#f87171">👑 Usuários</TabBtn>}
        {/* indicador global quando mês filtrado */}
        {mesFiltroGlobal!=="Todos"&&(
          <div style={{ marginLeft:"auto",display:"flex",alignItems:"center",gap:8,padding:"5px 12px",borderRadius:99,background:"rgba(56,189,248,0.08)",border:"1px solid rgba(56,189,248,0.2)",fontSize:11,color:"#38bdf8",fontWeight:600 }}>
            📅 {monthLabel(mesFiltroGlobal)}
            <button onClick={()=>setMesFiltroGlobal("Todos")} style={{ background:"none",border:"none",color:"rgba(56,189,248,0.6)",cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1 }}>✕</button>
          </div>
        )}
        {/* dica de atalho sutil */}
        <div title="Use Alt+1 a Alt+7 para navegar entre abas" style={{ marginLeft:"auto",fontSize:10,color:"rgba(255,255,255,0.12)",whiteSpace:"nowrap",cursor:"default",userSelect:"none" }}>Alt+1…7</div>
      </div>

      {aba==="dashboard"&&<DashboardTab clients={clients} dispatches={dispatches} mesFiltro={mesFiltroGlobal} setMesFiltro={setMesFiltroGlobal} mesesTodos={mesesTodos} />}
      {aba==="clientes"&&<ClientesTab clients={clients} dispatches={dispatches} supabaseClient={supabaseClient} onRefresh={carregarDados} isAdmin={isAdmin} />}
      {aba==="relatorios"&&<RelatoriosTab clients={clients} dispatches={dispatches} mesFiltro={mesFiltroGlobal} setMesFiltro={setMesFiltroGlobal} />}
      {aba==="portaria"&&<PortariaTab dispatches={dispatches} clients={clients} supabaseClient={supabaseClient} mesFiltro={mesFiltroGlobal} setMesFiltro={setMesFiltroGlobal} mesesTodos={mesesTodos} />}
      {aba==="filiais"&&<FiliaisTab clients={clients} dispatches={dispatches} />}
      {aba==="mapa"&&<MapaCalorTab clients={clients} dispatches={dispatches} />}
      {aba==="comparativos"&&<ComparativosTab dispatches={dispatches} clients={clients} />}
      {aba==="importacao"&&isAdmin&&<ImportTab onImportClients={handleImportClients} onImportDispatches={handleImportDispatches} clients={clients} dispatches={dispatches} supabaseClient={supabaseClient} onRefresh={carregarDados} />}
      {aba==="usuarios"&&isAdmin&&<UsuariosTab usuarioAtual={usuario} />}
      <div style={{ marginTop:24,textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",gap:10 }}>
        <img src={LOGO_LARANJA} alt="Servis" style={{ height:18,width:"auto",opacity:0.3 }} />
        Custo por deslocamento: R$ {CUSTO_FISCAL} · Dados em nuvem · Portaria Inteligente separada automaticamente
      </div>
      {buscaGlobalAberta&&<BuscaGlobal clients={clients} dispatches={dispatches} onSelectCliente={c=>{setClienteGlobal(c);}} onClose={()=>setBuscaGlobalAberta(false)} />}
      {clienteGlobal&&<ClienteModal cliente={clienteGlobal} dispatches={dispatches} onClose={()=>setClienteGlobal(null)} supabaseClient={supabaseClient} />}
      </div>{/* fim do wrapper relativo */}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
