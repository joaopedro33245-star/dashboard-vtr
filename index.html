// MAPA DE CALOR — por Bairro
// ══════════════════════════════════════════════
function MapaCalorTab({ clients, dispatches }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [mesFiltro,setMesFiltro]=useState("Todos");
  const [metrica,setMetrica]=useState("deslocamentos"); // deslocamentos | clientes | prejuizo
  const [bairroSelecionado,setBairroSelecionado]=useState(null);
  const [busca,setBusca]=useState("");

  const filiais=useMemo(()=>{
    const s=new Set(clients.map(c=>c.filial).filter(Boolean));
    return["Todas",...Array.from(s).sort()];
  },[clients]);

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  const dispMap=useMemo(()=>{
    const m={};
    for(const d of dispatches.filter(x=>!x.portaria_inteligente)){
      if(mesFiltro!=="Todos"){const dt=parseDataHora(d.data_hora);if(!dt||getMonthKey(dt)!==mesFiltro)continue;}
      const k=`${d.codigo_cliente}||${d.filial}`;
      m[k]=(m[k]||0)+1;
    }
    return m;
  },[dispatches,mesFiltro]);

  // Agrega dados por bairro
  const dadosBairro=useMemo(()=>{
    const bairroMap={};
    const clientesFiltrados=clients.filter(c=>{
      if(!c.bairro||!c.bairro.trim())return false;
      if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;
      return true;
    });

    for(const c of clientesFiltrados){
      const b=c.bairro.trim();
      if(!bairroMap[b])bairroMap[b]={
        bairro:b,clientes:[],totalDesl:0,totalMens:0,totalCusto:0,
        saudavel:0,risco:0,prejuizo:0,semDados:0
      };
      const key=`${c.codigo_cliente}||${c.filial}`;
      const desl=dispMap[key]||0;
      const mens=parseFloat(c.mensalidade)||0;
      const custoUnit=c.custo_individual||CUSTO_FISCAL;
      const custo=desl*custoUnit;
      const status=calcStatus(mens,custo);
      bairroMap[b].clientes.push({...c,desl,custo,resultado:mens-custo,status});
      bairroMap[b].totalDesl+=desl;
      bairroMap[b].totalMens+=mens;
      bairroMap[b].totalCusto+=custo;
      if(status==="SAUDÁVEL")bairroMap[b].saudavel++;
      else if(status==="RISCO")bairroMap[b].risco++;
      else if(status==="PREJUÍZO")bairroMap[b].prejuizo++;
      else bairroMap[b].semDados++;
    }
    return Object.values(bairroMap).sort((a,b)=>b.totalDesl-a.totalDesl);
  },[clients,dispMap,filialFiltro]);

  const dadosFiltrados=useMemo(()=>{
    if(!busca.trim())return dadosBairro;
    return dadosBairro.filter(d=>d.bairro.toLowerCase().includes(busca.toLowerCase()));
  },[dadosBairro,busca]);

  // Escala de calor baseada na métrica
  const maxValor=useMemo(()=>{
    if(dadosFiltrados.length===0)return 1;
    if(metrica==="deslocamentos")return Math.max(...dadosFiltrados.map(d=>d.totalDesl))||1;
    if(metrica==="clientes")return Math.max(...dadosFiltrados.map(d=>d.clientes.length))||1;
    if(metrica==="prejuizo")return Math.max(...dadosFiltrados.map(d=>d.prejuizo))||1;
    return 1;
  },[dadosFiltrados,metrica]);

  function getValor(d){
    if(metrica==="deslocamentos")return d.totalDesl;
    if(metrica==="clientes")return d.clientes.length;
    if(metrica==="prejuizo")return d.prejuizo;
    return 0;
  }

  function getHeatColor(valor,max){
    if(max===0||valor===0)return{bg:"rgba(255,255,255,0.04)",border:"rgba(255,255,255,0.08)",text:"rgba(255,255,255,0.3)"};
    const intensity=valor/max;
    if(metrica==="prejuizo"){
      // Vermelho para prejuízo
      const r=Math.round(248*intensity+50*(1-intensity));
      const g=Math.round(30*(1-intensity));
      const b=Math.round(30*(1-intensity));
      return{bg:`rgba(${r},${g},${b},${0.15+intensity*0.5})`,border:`rgba(${r},${g},${b},${0.3+intensity*0.4})`,text:intensity>0.4?"#fff":"#f87171"};
    }
    // Azul→roxo→laranja para volume
    if(intensity<0.25)return{bg:"rgba(56,189,248,0.12)",border:"rgba(56,189,248,0.25)",text:"#38bdf8"};
    if(intensity<0.5)return{bg:"rgba(129,140,248,0.2)",border:"rgba(129,140,248,0.4)",text:"#818cf8"};
    if(intensity<0.75)return{bg:"rgba(251,146,60,0.25)",border:"rgba(251,146,60,0.5)",text:"#fb923c"};
    return{bg:"rgba(248,113,113,0.3)",border:"rgba(248,113,113,0.6)",text:"#f87171"};
  }

  const selStyle={padding:"8px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:12,outline:"none",cursor:"pointer"};
  const bairroSel=bairroSelecionado?dadosBairro.find(d=>d.bairro===bairroSelecionado):null;

  const temBairros=dadosBairro.length>0;

  return(
    <div>
      {/* Header */}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>🔥 Mapa de Calor — por Bairro</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>
            {temBairros?`${dadosBairro.length} bairros com clientes cadastrados`:"Nenhum bairro encontrado — importe clientes com a coluna Bairro preenchida"}
          </div>
        </div>
        <div style={{ display:"flex",gap:8,flexWrap:"wrap",alignItems:"center" }}>
          <select value={filialFiltro} onChange={e=>setFilialFiltro(e.target.value)} style={selStyle}>
            {filiais.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          <select value={mesFiltro} onChange={e=>setMesFiltro(e.target.value)} style={selStyle}>
            {mesesDisponiveis.map(m=><option key={m} value={m}>{m==="Todos"?"Todos os meses":monthLabel(m)}</option>)}
          </select>
        </div>
      </div>

      {!temBairros?(
        <EmptyState icon="🗺️" title="Nenhum bairro cadastrado ainda"
          sub="Reimporte a planilha de clientes com a coluna Bairro preenchida. Após a importação, o mapa de calor será gerado automaticamente." />
      ):(
        <>
          {/* KPIs */}
          <div className="grid-4" style={{ marginBottom:20 }}>
            <KPICard label="Bairros com dados" value={dadosBairro.length} sub={`${dadosBairro.filter(d=>d.totalDesl>0).length} com deslocamentos`} icon="📍" accent="#f472b6" />
            <KPICard label="Total Deslocamentos" value={dadosBairro.reduce((s,d)=>s+d.totalDesl,0)} sub="todos os bairros" icon="🚗" accent="#38bdf8" />
            <KPICard label="Bairro mais ativo" value={dadosBairro[0]?.bairro.slice(0,16)||"—"} sub={`${dadosBairro[0]?.totalDesl||0} deslocamentos`} icon="🔥" accent="#fb923c" />
            <KPICard label="Clientes mapeados" value={dadosBairro.reduce((s,d)=>s+d.clientes.length,0)} sub="com bairro preenchido" icon="👥" accent="#34d399" />
          </div>

          {/* Controles de métrica + busca */}
          <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center" }}>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:600 }}>Colorir por:</div>
            {[["deslocamentos","🚗 Deslocamentos"],["clientes","👥 Clientes"],["prejuizo","🔴 Em Prejuízo"]].map(([v,l])=>(
              <FilterBtn key={v} active={metrica===v} onClick={()=>setMetrica(v)}>{l}</FilterBtn>
            ))}
            <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Filtrar bairro…"
              style={{ marginLeft:"auto",padding:"7px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:12,outline:"none",width:180 }} />
          </div>

          {/* Legenda */}
          <div style={{ display:"flex",gap:6,marginBottom:16,alignItems:"center",flexWrap:"wrap" }}>
            <span style={{ fontSize:11,color:"rgba(255,255,255,0.35)" }}>Intensidade:</span>
            {metrica==="prejuizo"?
              [["Baixo","rgba(248,113,113,0.15)"],["Médio","rgba(248,80,80,0.35)"],["Alto","rgba(248,50,50,0.55)"],["Crítico","rgba(248,20,20,0.7)"]].map(([l,bg])=>(
                <div key={l} style={{ display:"flex",alignItems:"center",gap:4 }}>
                  <div style={{ width:14,height:14,borderRadius:3,background:bg }} />
                  <span style={{ fontSize:10,color:"rgba(255,255,255,0.4)" }}>{l}</span>
                </div>
              ))
            :[["Baixo","rgba(56,189,248,0.15)"],["Médio-baixo","rgba(129,140,248,0.2)"],["Médio-alto","rgba(251,146,60,0.25)"],["Alto","rgba(248,113,113,0.3)"]].map(([l,bg])=>(
                <div key={l} style={{ display:"flex",alignItems:"center",gap:4 }}>
                  <div style={{ width:14,height:14,borderRadius:3,background:bg }} />
                  <span style={{ fontSize:10,color:"rgba(255,255,255,0.4)" }}>{l}</span>
                </div>
              ))
            }
          </div>

          <div style={{ display:"grid",gridTemplateColumns:"1fr 320px",gap:16,alignItems:"start" }}>
            {/* Grade de calor */}
            <div>
              <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8 }}>
                {dadosFiltrados.map(d=>{
                  const val=getValor(d);
                  const heat=getHeatColor(val,maxValor);
                  const ativo=bairroSelecionado===d.bairro;
                  const saudePct=d.clientes.filter(c=>c.status==="SAUDÁVEL").length/Math.max(d.clientes.filter(c=>c.status!=="SEM DADOS").length,1)*100;
                  const bgAtivo=heat.bg.replace(/rgba\((\d+),(\d+),(\d+),[^)]+\)/,"rgba($1,$2,$3,0.35)");
                  return(
                    <div key={d.bairro} onClick={()=>setBairroSelecionado(ativo?null:d.bairro)}
                      style={{ borderRadius:12,border:ativo?`2px solid ${heat.text}`:`1px solid ${heat.border}`,background:ativo?bgAtivo:heat.bg,padding:"12px 14px",cursor:"pointer",transition:"all 0.2s",transform:ativo?"scale(1.02)":"scale(1)" }}
                      onMouseEnter={e=>e.currentTarget.style.transform="scale(1.03)"}
                      onMouseLeave={e=>e.currentTarget.style.transform=ativo?"scale(1.02)":"scale(1)"}>
                      <div style={{ fontSize:12,fontWeight:700,color:heat.text,marginBottom:6,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap" }}>
                        📍 {d.bairro}
                      </div>
                      <div style={{ fontSize:20,fontWeight:800,color:heat.text,marginBottom:4 }}>{val}</div>
                      <div style={{ fontSize:10,color:"rgba(255,255,255,0.4)",marginBottom:6 }}>
                        {metrica==="deslocamentos"?"deslocamentos":metrica==="clientes"?"clientes":"em prejuízo"}
                      </div>
                      {/* Mini barra de saúde */}
                      <div style={{ height:3,borderRadius:99,background:"rgba(255,255,255,0.08)",overflow:"hidden" }}>
                        <div style={{ height:"100%",width:`${Math.min(saudePct,100)}%`,borderRadius:99,background:"#34d399",opacity:0.8 }} />
                      </div>
                      <div style={{ display:"flex",justifyContent:"space-between",marginTop:4 }}>
                        <span style={{ fontSize:9,color:"rgba(255,255,255,0.3)" }}>{d.clientes.length} clientes</span>
                        <span style={{ fontSize:9,color:d.prejuizo>0?"#f87171":"rgba(255,255,255,0.3)" }}>{d.prejuizo>0?`${d.prejuizo} prej.`:""}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
              {dadosFiltrados.length===0&&(
                <div style={{ textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.25)" }}>
                  Nenhum bairro encontrado para "{busca}"
                </div>
              )}
            </div>

            {/* Painel lateral — detalhe do bairro ou ranking */}
            <div style={{ position:"sticky",top:20 }}>
              {bairroSel?(
                <Card>
                  <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:14,fontWeight:700,color:"#f472b6" }}>📍 {bairroSel.bairro}</div>
                        <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{bairroSel.clientes.length} clientes</div>
                      </div>
                      <button onClick={()=>setBairroSelecionado(null)} style={{ background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",borderRadius:7,padding:"4px 10px",cursor:"pointer",fontSize:12 }}>✕</button>
                    </div>
                  </div>
                  <div style={{ padding:"14px 18px" }}>
                    {/* Mini KPIs do bairro */}
                    <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14 }}>
                      {[
                        {label:"Deslocamentos",val:bairroSel.totalDesl,color:"#38bdf8"},
                        {label:"Mensalidade",val:formatCurrency(bairroSel.totalMens),color:"#34d399"},
                        {label:"Custo Total",val:formatCurrency(bairroSel.totalCusto),color:"#fb923c"},
                        {label:"Resultado",val:formatCurrency(bairroSel.totalMens-bairroSel.totalCusto),color:(bairroSel.totalMens-bairroSel.totalCusto)>=0?"#34d399":"#f87171"},
                      ].map(k=>(
                        <div key={k.label} style={{ background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"8px 10px",textAlign:"center" }}>
                          <div style={{ fontSize:13,fontWeight:800,color:k.color }}>{k.val}</div>
                          <div style={{ fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2,textTransform:"uppercase" }}>{k.label}</div>
                        </div>
                      ))}
                    </div>
                    {/* Status dos clientes */}
                    <div style={{ display:"flex",gap:6,marginBottom:12,flexWrap:"wrap" }}>
                      {[["SAUDÁVEL","#34d399",bairroSel.saudavel],["RISCO","#fbbf24",bairroSel.risco],["PREJUÍZO","#f87171",bairroSel.prejuizo],["SEM DADOS","#94a3b8",bairroSel.semDados]].filter(([,, v])=>v>0).map(([l,c,v])=>(
                        <span key={l} style={{ fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:99,background:`${c}20`,color:c,border:`1px solid ${c}40` }}>{v} {l}</span>
                      ))}
                    </div>
                    {/* Lista de clientes */}
                    <div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",marginBottom:8 }}>Clientes</div>
                    <div style={{ maxHeight:260,overflowY:"auto",display:"flex",flexDirection:"column",gap:4 }}>
                      {bairroSel.clientes.sort((a,b)=>b.desl-a.desl).map((c,i)=>{
                        const statusCfg=STATUS_CONFIG[c.status]||STATUS_CONFIG["SEM DADOS"];
                        return(
                          <div key={i} style={{ padding:"7px 10px",borderRadius:8,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                            <div style={{ minWidth:0 }}>
                              <div style={{ fontSize:11,fontWeight:600,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:140 }}>{c.nome_cliente}</div>
                              <div style={{ fontSize:10,color:"rgba(255,255,255,0.35)" }}>{c.filial}</div>
                            </div>
                            <div style={{ textAlign:"right",flexShrink:0,marginLeft:8 }}>
                              <div style={{ fontSize:12,fontWeight:700,color:"#38bdf8" }}>{c.desl}</div>
                              <span style={{ fontSize:9,fontWeight:700,padding:"1px 6px",borderRadius:99,background:statusCfg.bg,color:statusCfg.text }}>{c.status}</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </Card>
              ):(
                <Card>
                  <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                    <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>🏆 Ranking de Bairros</div>
                    <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>por {metrica==="deslocamentos"?"deslocamentos":metrica==="clientes"?"clientes":"em prejuízo"} · clique num bairro para detalhes</div>
                  </div>
                  <div style={{ maxHeight:480,overflowY:"auto" }}>
                    {dadosBairro.slice(0,15).map((d,i)=>{
                      const val=getValor(d);
                      const heat=getHeatColor(val,maxValor);
                      const pct=maxValor>0?Math.round((val/maxValor)*100):0;
                      return(
                        <div key={d.bairro} onClick={()=>setBairroSelecionado(d.bairro)}
                          style={{ padding:"10px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background 0.15s" }}
                          onMouseEnter={e=>e.currentTarget.style.background="rgba(244,114,182,0.06)"}
                          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:5 }}>
                            <div style={{ display:"flex",alignItems:"center",gap:8 }}>
                              <span style={{ fontSize:10,fontWeight:800,color:"rgba(255,255,255,0.2)",minWidth:18 }}>#{i+1}</span>
                              <div>
                                <div style={{ fontSize:12,fontWeight:600,color:heat.text }}>{d.bairro}</div>
                                <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>{d.clientes.length} clientes</div>
                              </div>
                            </div>
                            <span style={{ fontSize:15,fontWeight:800,color:heat.text }}>{val}</span>
                          </div>
                          <div style={{ height:3,borderRadius:99,background:"rgba(255,255,255,0.06)" }}>
                            <div style={{ height:"100%",width:`${pct}%`,borderRadius:99,background:heat.text,opacity:0.7,transition:"width 0.4s" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </Card>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function FiliaisTab({ clients, dispatches }) {
  const [mesFiltro,setMesFiltro]=useState("Todos");
  const mesesDisponiveis=useMemo(()=>{const s=new Set();for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];},[dispatches]);

  const filiaisData=useMemo(()=>{
    const base=mesFiltro==="Todos"?dispatches:dispatches.filter(d=>{const dt=parseDataHora(d.data_hora);return dt&&getMonthKey(dt)===mesFiltro;});
    const normais=base.filter(d=>!d.portaria_inteligente);
    const pi=base.filter(d=>d.portaria_inteligente);
    const filiais=new Set([...clients.map(c=>c.filial),...base.map(d=>d.filial)].filter(Boolean));
    return Array.from(filiais).map(f=>{
      const clientesFil=clients.filter(c=>c.filial===f);
      const desl=normais.filter(d=>d.filial===f).length;
      const piEvt=pi.filter(d=>d.filial===f).length;
      const totalMens=clientesFil.reduce((s,c)=>s+(parseFloat(c.mensalidade)||0),0);
      const custoTotal=desl*(clientesFil[0]?.custo_individual||CUSTO_FISCAL);
      const saldo=totalMens-custoTotal;
      const comMens=clientesFil.filter(c=>c.mensalidade>0);
      const saudavel=comMens.filter(c=>calcStatus(c.mensalidade,desl/(comMens.length||1)*(c.custo_individual||CUSTO_FISCAL))==="SAUDÁVEL").length;
      const saude=comMens.length>0?Math.round((saudavel/comMens.length)*100):null;
      // Último deslocamento
      const deslFil=[...normais,...pi].filter(d=>d.filial===f);
      const datas=deslFil.map(d=>parseDataHora(d.data_hora)).filter(Boolean).sort((a,b)=>b-a);
      const ultimaData=datas[0]?datas[0].toLocaleDateString("pt-BR"):"—";
      const diasSemDados=datas[0]?Math.floor((Date.now()-datas[0].getTime())/(1000*60*60*24)):null;
      return{filial:f,clientes:clientesFil.length,desl,piEvt,totalMens,custoTotal,saldo,saude,ultimaData,diasSemDados};
    }).sort((a,b)=>b.desl-a.desl);
  },[clients,dispatches,mesFiltro]);

  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};

  if(filiaisData.length===0)return<EmptyState icon="🏢" title="Nenhuma filial encontrada" sub="Importe clientes e deslocamentos para ver o painel de filiais." />;

  return(
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>🏢 Painel de Filiais</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{filiaisData.length} filiais · visão executiva consolidada</div>
        </div>
        <select value={mesFiltro} onChange={e=>setMesFiltro(e.target.value)} style={selStyle}>
          {mesesDisponiveis.map(m=><option key={m} value={m}>{m==="Todos"?"Todos os meses":monthLabel(m)}</option>)}
        </select>
      </div>

      {/* Cards de filial */}
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:16,marginBottom:28 }}>
        {filiaisData.map(f=>{
          const saudeColor=f.saude===null?"#94a3b8":f.saude>=70?"#34d399":f.saude>=40?"#fbbf24":"#f87171";
          const saudeLabel=f.saude===null?"SEM DADOS":f.saude>=70?"SAUDÁVEL":f.saude>=40?"ATENÇÃO":"CRÍTICO";
          const alertaDias=f.diasSemDados!==null&&f.diasSemDados>7;
          return(
            <Card key={f.filial}>
              <div style={{ padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"flex-start" }}>
                <div>
                  <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>{f.filial}</div>
                  <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{f.clientes} clientes</div>
                </div>
                <div style={{ display:"flex",gap:6,alignItems:"center" }}>
                  <span style={{ fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,background:saudeColor+"20",color:saudeColor,border:`1px solid ${saudeColor}40` }}>{saudeLabel}</span>
                </div>
              </div>
              <div style={{ padding:"14px 18px" }}>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14 }}>
                  {[{label:"Deslocamentos",val:f.desl,color:"#38bdf8"},{label:"Portaria Int.",val:f.piEvt,color:"#a78bfa"},{label:"Mensalidade",val:formatCurrency(f.totalMens),color:"#34d399"}].map(k=>(
                    <div key={k.label} style={{ textAlign:"center",background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 6px" }}>
                      <div style={{ fontSize:16,fontWeight:800,color:k.color }}>{k.val}</div>
                      <div style={{ fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em" }}>{k.label}</div>
                    </div>
                  ))}
                </div>
                {f.totalMens>0&&(
                  <div style={{ display:"flex",justifyContent:"space-between",padding:"8px 12px",borderRadius:8,background:f.saldo>=0?"rgba(52,211,153,0.08)":"rgba(248,113,113,0.08)",border:`1px solid ${f.saldo>=0?"rgba(52,211,153,0.2)":"rgba(248,113,113,0.2)"}`,marginBottom:10 }}>
                    <span style={{ fontSize:11,color:"rgba(255,255,255,0.5)" }}>Resultado</span>
                    <span style={{ fontSize:13,fontWeight:800,color:f.saldo>=0?"#34d399":"#f87171" }}>{formatCurrency(f.saldo)}</span>
                  </div>
                )}
                {/* Barra de saúde */}
                {f.saude!==null&&(
                  <div style={{ marginBottom:10 }}>
                    <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                      <span style={{ fontSize:10,color:"rgba(255,255,255,0.4)" }}>Saúde da carteira</span>
                      <span style={{ fontSize:10,fontWeight:700,color:saudeColor }}>{f.saude}%</span>
                    </div>
                    <div style={{ height:6,borderRadius:99,background:"rgba(255,255,255,0.07)",overflow:"hidden" }}>
                      <div style={{ height:"100%",width:`${f.saude}%`,borderRadius:99,background:saudeColor,transition:"width 0.6s" }} />
                    </div>
                  </div>
                )}
                {/* Última atualização */}
                <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <span style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>Último desl.:</span>
                  <span style={{ fontSize:11,fontWeight:600,color:alertaDias?"#f87171":"rgba(255,255,255,0.5)",display:"flex",alignItems:"center",gap:4 }}>
                    {alertaDias&&<span style={{ fontSize:13 }}>⚠️</span>}
                    {f.ultimaData}
                    {f.diasSemDados!==null&&<span style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>({f.diasSemDados}d)</span>}
                  </span>
                </div>
              </div>
            </Card>
          );
        })}
      </div>

      {/* Tabela resumo */}
      <SectionLabel>Resumo Consolidado</SectionLabel>
      <Card>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                {["Filial","Clientes","Desl.","Port. Int.","Mensalidade","Custo Op.","Resultado","Saúde","Último Desl."].map(h=>(
                  <th key={h} style={{ padding:"10px 14px",textAlign:h==="Filial"?"left":"center",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",whiteSpace:"nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filiaisData.map((f,i)=>{
                const saudeColor=f.saude===null?"#94a3b8":f.saude>=70?"#34d399":f.saude>=40?"#fbbf24":"#f87171";
                const alertaDias=f.diasSemDados!==null&&f.diasSemDados>7;
                return(
                  <tr key={f.filial} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <td style={{ padding:"10px 14px",fontWeight:600,color:"#fff" }}>{f.filial}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"rgba(255,255,255,0.5)" }}>{f.clientes}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#38bdf8" }}>{f.desl}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"#a78bfa" }}>{f.piEvt||"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"#34d399" }}>{f.totalMens>0?formatCurrency(f.totalMens):"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:"#fb923c" }}>{f.custoTotal>0?formatCurrency(f.custoTotal):"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:f.totalMens>0?(f.saldo>=0?"#34d399":"#f87171"):"rgba(255,255,255,0.2)" }}>{f.totalMens>0?formatCurrency(f.saldo):"—"}</td>
                    <td style={{ padding:"10px 14px",textAlign:"center" }}>
                      {f.saude!==null?<span style={{ fontSize:11,fontWeight:700,color:saudeColor }}>{f.saude}%</span>:<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}
                    </td>
                    <td style={{ padding:"10px 14px",textAlign:"center",color:alertaDias?"#f87171":"rgba(255,255,255,0.4)",fontWeight:alertaDias?700:400,fontSize:11 }}>
                      {alertaDias&&"⚠️ "}{f.ultimaData}{f.diasSemDados!==null&&<span style={{ fontSize:10,marginLeft:4,color:"rgba(255,255,255,0.25)" }}>({f.diasSemDados}d)</span>}
                    </td>
                  </tr>
                );
              })}
              <tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}>
                <td style={{ padding:"10px 14px",fontWeight:700,color:"rgba(255,255,255,0.5)",fontSize:11,textTransform:"uppercase" }}>Total</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#fff" }}>{filiaisData.reduce((s,f)=>s+f.clientes,0)}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:800,color:"#38bdf8",fontSize:14 }}>{filiaisData.reduce((s,f)=>s+f.desl,0)}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#a78bfa" }}>{filiaisData.reduce((s,f)=>s+f.piEvt,0)}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#34d399" }}>{formatCurrency(filiaisData.reduce((s,f)=>s+f.totalMens,0))}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:700,color:"#fb923c" }}>{formatCurrency(filiaisData.reduce((s,f)=>s+f.custoTotal,0))}</td>
                <td style={{ padding:"10px 14px",textAlign:"center",fontWeight:800,fontSize:14,color:filiaisData.reduce((s,f)=>s+f.saldo,0)>=0?"#34d399":"#f87171" }}>{formatCurrency(filiaisData.reduce((s,f)=>s+f.saldo,0))}</td>
                <td colSpan={2}></td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

function ComparativosTab({ dispatches, clients }) {
  const [subAba,setSubAba]=useState("semanas");
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [areaFiltro,setAreaFiltro]=useState("Todas");
  const [tipoVisao,setTipoVisao]=useState("normal");

  const filiais=useMemo(()=>{const s=new Set(dispatches.map(d=>d.filial).filter(Boolean));return["Todas",...Array.from(s).sort()];},[dispatches]);

  // Áreas disponíveis — apenas para filial SERVIS CEARÁ (ou quando filial filtrada tem áreas)
  const areasDisponiveis=useMemo(()=>{
    const base=filialFiltro==="Todas"?clients:clients.filter(c=>c.filial===filialFiltro);
    const areas=new Set(base.map(c=>String(c.area||"").trim()).filter(Boolean));
    if(areas.size===0)return[];
    return[...areas].sort().map(a=>{
      return{area:a,label:a};
    });
  },[clients,filialFiltro]);

  // Códigos dos clientes da área selecionada
  const codigosArea=useMemo(()=>{
    if(areaFiltro==="Todas")return null;
    const set=new Set(clients.filter(c=>c.area===areaFiltro).map(c=>`${c.codigo_cliente}||${c.filial}`));
    return set.size>0?set:null;
  },[clients,areaFiltro]);

  const dispatchesFiltrados=useMemo(()=>{
    let base=filialFiltro==="Todas"?dispatches:dispatches.filter(d=>d.filial===filialFiltro);
    if(codigosArea)base=base.filter(d=>codigosArea.has(`${d.codigo_cliente}||${d.filial}`));
    return base;
  },[dispatches,filialFiltro,codigosArea]);

  if(dispatches.length===0)return<EmptyState icon="📅" title="Nenhum dado para comparar" sub="Importe deslocamentos com data para visualizar os comparativos." />;
  const selStyle={padding:"9px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:13,outline:"none",cursor:"pointer"};
  return (
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>📅 Comparativos</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>
            Análise comparativa por semana e por mês
            {areaFiltro!=="Todas"&&<span style={{ marginLeft:8,color:"#fb923c",fontWeight:600 }}>· Área {areaFiltro}</span>}
          </div>
        </div>
        <div style={{ display:"flex",gap:10,flexWrap:"wrap",alignItems:"center" }}>
          <select value={filialFiltro} onChange={e=>{setFilialFiltro(e.target.value);setAreaFiltro("Todas");}} style={selStyle}>
            {filiais.map(f=><option key={f} value={f}>{f}</option>)}
          </select>
          {areasDisponiveis.length>0&&(
            <select value={areaFiltro} onChange={e=>setAreaFiltro(e.target.value)} style={{ ...selStyle,borderColor:areaFiltro!=="Todas"?"rgba(251,146,60,0.5)":"rgba(255,255,255,0.12)",color:areaFiltro!=="Todas"?"#fb923c":"#fff" }}>
              <option value="Todas">🗂 Todas as áreas</option>
              {areasDisponiveis.map(a=><option key={a.area} value={a.area}>🗂 {a.label}</option>)}
            </select>
          )}
          <div style={{ display:"flex",gap:6 }}>
            {[["normal","🚗 Normal"],["pi","🏢 Port. Int."],["ambos","🔀 Ambos"]].map(([v,l])=>(
              <FilterBtn key={v} active={tipoVisao===v} onClick={()=>setTipoVisao(v)}>{l}</FilterBtn>
            ))}
          </div>
        </div>
      </div>
      <div style={{ display:"flex",gap:6,marginBottom:24,borderBottom:"1px solid rgba(255,255,255,0.07)",paddingBottom:16 }}>
        <button onClick={()=>setSubAba("semanas")} style={{ padding:"8px 20px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:subAba==="semanas"?"1px solid #38bdf8":"1px solid rgba(255,255,255,0.08)",background:subAba==="semanas"?"rgba(56,189,248,0.12)":"rgba(255,255,255,0.03)",color:subAba==="semanas"?"#38bdf8":"rgba(255,255,255,0.4)",transition:"all 0.15s" }}>🗓 Semanas</button>
        <button onClick={()=>setSubAba("meses")} style={{ padding:"8px 20px",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer",border:subAba==="meses"?"1px solid #fb923c":"1px solid rgba(255,255,255,0.08)",background:subAba==="meses"?"rgba(251,146,60,0.12)":"rgba(255,255,255,0.03)",color:subAba==="meses"?"#fb923c":"rgba(255,255,255,0.4)",transition:"all 0.15s" }}>📆 Meses</button>
      </div>
      {subAba==="semanas"&&<ComparativosSemanas dispatches={dispatches} filiais={filiais} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} clients={clients} />}
      {subAba==="meses"&&<ComparativosMeses dispatches={dispatches} dispatchesFiltrados={dispatchesFiltrados} tipoVisao={tipoVisao} clients={clients} />}
    </div>
  );
}

// ── MELHORIA 2: recebe mesFiltro/setMesFiltro/mesesTodos como props ──
function PortariaTab({ dispatches, clients, supabaseClient, mesFiltro, setMesFiltro, mesesTodos }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");
  const [clienteSelecionado,setClienteSelecionado]=useState(null);

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches.filter(x=>x.portaria_inteligente)){
      const dt=parseDataHora(d.data_hora);
      if(dt){const mk=getMonthKey(dt);if(mk)s.add(mk);}
    }
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  const mesFiltroEfetivo = mesesDisponiveis.includes(mesFiltro) ? mesFiltro : "Todos";

  const dispatchesMes=useMemo(()=>{
    if(mesFiltroEfetivo==="Todos")return dispatches;
    return dispatches.filter(d=>{
      const dt=parseDataHora(d.data_hora);
      return dt&&getMonthKey(dt)===mesFiltroEfetivo;
    });
  },[dispatches,mesFiltroEfetivo]);

  const { ranking,porFilial,eventos,filiais,totalEventos }=useMemo(()=>{
    const piDispatches=dispatchesMes.filter(d=>d.portaria_inteligente);
    if(piDispatches.length===0)return{ranking:[],porFilial:[],eventos:[],filiais:["Todas"],totalEventos:0};
    const clienteMap={},filialMap={},eventoMap={},mensMap={},nomeMap={};
    // Monta mapa de nome e mensalidade a partir da tabela clients
    // Chave: codigo_cliente||filial para evitar colisão entre filiais
    for(const c of clients){
      const chave=`${c.codigo_cliente}||${c.filial}`;
      mensMap[chave]=parseFloat(c.mensalidade)||0;
      const nomeClean=(c.nome_cliente||"").replace(/\(PORTARIA INTELIGENTE\)\s*[-–]?\s*/i,"").replace(/PORTARIA INTELIGENTE\s*[-–]?\s*/i,"").trim();
      if(nomeClean)nomeMap[chave]=nomeClean;
    }
    for(const d of piDispatches){
      const key=`${d.codigo_cliente}||${d.filial}`;
      // Usa nome da mesma filial do dispatch
      const nome=nomeMap[key]||d.nome_cliente||d.codigo_cliente;
      if(!clienteMap[key])clienteMap[key]={codigo_cliente:d.codigo_cliente,nome_cliente:nome,filial:d.filial,total_eventos:0};
      clienteMap[key].total_eventos++;
      if(d.filial)filialMap[d.filial]=(filialMap[d.filial]||0)+1;
      if(d.evento)eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;
    }
    const ranking=Object.values(clienteMap).map(c=>{const mens=mensMap[`${c.codigo_cliente}||${c.filial}`]||0;const custo=c.total_eventos*CUSTO_FISCAL;const saldo=mens-custo;return{...c,mensalidade:mens,custo_operacional:custo,saldo,status_financeiro:calcStatus(mens,custo)};}).sort((a,b)=>b.total_eventos-a.total_eventos);
    const filiais=["Todas",...new Set(piDispatches.map(d=>d.filial).filter(Boolean))];
    const porFilial=Object.entries(filialMap).map(([filial,total])=>({filial,total})).sort((a,b)=>b.total-a.total);
    const eventos=Object.entries(eventoMap).map(([evento,total])=>({evento,total})).sort((a,b)=>b.total-a.total).slice(0,7);
    return{ranking,porFilial,eventos,filiais,totalEventos:piDispatches.length};
  },[dispatchesMes,clients]);

  // -- Tendência mensal PI --
  const tendenciaPi=useMemo(()=>{
    const base=filialFiltro==="Todas"?dispatches.filter(d=>d.portaria_inteligente):dispatches.filter(d=>d.portaria_inteligente&&d.filial===filialFiltro);
    const mesMap={};
    for(const d of base){const dt=parseDataHora(d.data_hora);if(!dt)continue;const mk=getMonthKey(dt);mesMap[mk]=(mesMap[mk]||0)+1;}
    return Object.entries(mesMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12).map(([mk,total])=>({label:monthLabel(mk),total,mk}));
  },[dispatches,filialFiltro]);

  // -- Alertas PI: clientes com aumento ≥ 50% --
  const alertasPi=useMemo(()=>{
    const base=filialFiltro==="Todas"?ranking:ranking.filter(r=>r.filial===filialFiltro);
    const mesesDisp=[...new Set(dispatches.filter(d=>d.portaria_inteligente).map(d=>{const dt=parseDataHora(d.data_hora);return dt?getMonthKey(dt):null;}).filter(Boolean))].sort();
    if(mesesDisp.length<2)return[];
    const mesAtual=mesesDisp[mesesDisp.length-1];
    const mesAnterior=mesesDisp[mesesDisp.length-2];
    const mapAtual={},mapAnterior={};
    for(const d of dispatches.filter(d=>d.portaria_inteligente)){
      const dt=parseDataHora(d.data_hora);if(!dt)continue;
      const mk=getMonthKey(dt);const k=`${d.codigo_cliente}||${d.filial}`;
      if(mk===mesAtual)mapAtual[k]=(mapAtual[k]||0)+1;
      if(mk===mesAnterior)mapAnterior[k]=(mapAnterior[k]||0)+1;
    }
    return base.filter(c=>{
      const k=`${c.codigo_cliente}||${c.filial}`;
      const atual=mapAtual[k]||0;const ant=mapAnterior[k]||0;
      return atual>0&&ant>0&&((atual-ant)/ant)>=0.5;
    }).map(c=>{
      const k=`${c.codigo_cliente}||${c.filial}`;
      const atual=mapAtual[k]||0;const ant=mapAnterior[k]||0;
      return{...c,atual,ant,pct:Math.round(((atual-ant)/ant)*100)};
    }).sort((a,b)=>b.pct-a.pct).slice(0,5);
  },[ranking,dispatches,filialFiltro]);

  const [paginaPI,setPaginaPI]=useState(1);
  const PER_PAGE_PI=15;
  const rankingBase=useMemo(()=>filialFiltro==="Todas"?ranking:ranking.filter(r=>r.filial===filialFiltro),[ranking,filialFiltro]);
  useEffect(()=>setPaginaPI(1),[filialFiltro,mesFiltroEfetivo]);
  const rankingFiltrado=useMemo(()=>rankingBase.slice((paginaPI-1)*PER_PAGE_PI,paginaPI*PER_PAGE_PI),[rankingBase,paginaPI]);
  if(totalEventos===0&&mesFiltroEfetivo==="Todos")return <EmptyState icon="🏢" title="Nenhum evento de Portaria Inteligente" sub="Os eventos de Portaria Inteligente são detectados automaticamente na importação da planilha de deslocamentos." />;

  return (
    <>
      <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap" }}>
        <div style={{ flex:1 }}>
          <MesFiltroBar value={mesFiltroEfetivo} onChange={setMesFiltro} meses={mesesDisponiveis} accent="#a78bfa" />
        </div>
        <select value={filialFiltro} onChange={e=>setFilialFiltro(e.target.value)} style={{ padding:"8px 14px",borderRadius:10,border:filialFiltro!=="Todas"?"1px solid rgba(167,139,250,0.5)":"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.06)",color:filialFiltro!=="Todas"?"#a78bfa":"#fff",fontSize:13,outline:"none",cursor:"pointer",flexShrink:0 }}>
          {filiais.map(f=><option key={f} value={f}>{f}</option>)}
        </select>
      </div>

      {totalEventos===0&&mesFiltroEfetivo!=="Todos"?(
        <EmptyState icon="🏢" title={`Nenhum evento de PI em ${monthLabel(mesFiltroEfetivo)}`} sub="Tente selecionar outro mês ou 'Todos os meses'." />
      ):(
      <>
      {/* ── KPIs ── */}
      {(()=>{
        const base=filialFiltro==="Todas"?ranking:ranking.filter(r=>r.filial===filialFiltro);
        const totalEvtFil=base.reduce((s,c)=>s+c.total_eventos,0);
        const totalMensPi=base.reduce((s,c)=>s+(c.mensalidade||0),0);
        const totalCustoPi=base.reduce((s,c)=>s+c.custo_operacional,0);
        const totalSaldoPi=base.reduce((s,c)=>s+(c.mensalidade?c.saldo:0),0);
        return(
          <>
            <div className="grid-4" style={{ marginBottom:12 }}>
              <KPICard label="Total de Eventos" value={totalEvtFil} sub={filialFiltro!=="Todas"?filialFiltro.slice(0,18):"portaria inteligente"} icon="🏢" accent="#a78bfa" />
              <KPICard label="Clientes Ativos" value={base.length} sub="com eventos registrados" icon="👥" accent="#38bdf8" />
              <KPICard label="Mensalidade Total" value={formatCurrency(totalMensPi)} sub={`${base.filter(c=>c.mensalidade>0).length} clientes c/ mensalidade`} icon="💳" accent="#34d399" />
              <KPICard label="Saldo Total" value={formatCurrency(totalSaldoPi)} sub="mensalidade − custo op." icon={totalSaldoPi>=0?"✅":"❌"} accent={totalSaldoPi>=0?"#34d399":"#f87171"} />
            </div>
            <div className="grid-4" style={{ marginBottom:20 }}>
              <KPICard label="Média por Cliente" value={(totalEvtFil/(base.length||1)).toFixed(1)} sub="eventos/cliente" icon="📊" accent="#34d399" />
              <KPICard label="Custo Operacional" value={formatCurrency(totalCustoPi)} sub={`@ R$ ${CUSTO_FISCAL}/evento`} icon="💰" accent="#fb923c" />
              <KPICard label="Em Prejuízo" value={base.filter(c=>c.status_financeiro==="PREJUÍZO").length} sub="com mensalidade" icon="🔴" accent="#f87171" />
              <KPICard label="Em Risco" value={base.filter(c=>c.status_financeiro==="RISCO").length} sub="com mensalidade" icon="🟡" accent="#fbbf24" />
            </div>
          </>
        );
      })()}

      {/* ── Tendência + Top Eventos ── */}
      <div style={{ display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:20 }}>
        <Card>
          <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div>
              <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>📈 Evolução — Portaria Inteligente</div>
              <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>Últimos {tendenciaPi.length} meses{filialFiltro!=="Todas"&&<span style={{ color:"#a78bfa",marginLeft:6 }}>· {filialFiltro}</span>}</div>
            </div>
            {tendenciaPi.length>=2&&(()=>{
              const ult=tendenciaPi[tendenciaPi.length-1];const pen=tendenciaPi[tendenciaPi.length-2];
              const diff=ult.total-pen.total;const pct=pen.total>0?Math.round((diff/pen.total)*100):null;
              return<div style={{ textAlign:"right" }}>
                <div style={{ fontSize:18,fontWeight:800,color:diff>0?"#f87171":"#34d399" }}>{diff>0?"+":""}{diff}</div>
                {pct!==null&&<div style={{ fontSize:11,color:diff>0?"#f87171":"#34d399",fontWeight:600 }}>{pct>0?"+":""}{pct}% vs mês ant.</div>}
              </div>;
            })()}
          </div>
          <div style={{ padding:20 }}>
            <LineChart data={tendenciaPi.map(d=>({label:d.label,value:d.total}))} label="Eventos PI" color="#a78bfa" height={200} />
          </div>
        </Card>
        <Card>
          <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
            <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>🔥 Top Eventos PI</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>motivos mais frequentes</div>
          </div>
          <div style={{ padding:"14px 20px" }}>
            {eventos.length===0?<div style={{ textAlign:"center",padding:"20px 0",color:"rgba(255,255,255,0.2)",fontSize:12 }}>Sem dados</div>
            :eventos.map((e,i)=>{
              const maxVal=eventos[0]?.total||1;
              const pct=Math.round((e.total/maxVal)*100);
              return(
                <div key={i} style={{ marginBottom:10 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                    <span style={{ fontSize:11,color:"rgba(255,255,255,0.7)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"75%" }}>{e.evento}</span>
                    <span style={{ fontSize:11,fontWeight:700,color:CHART_COLORS[i%CHART_COLORS.length],flexShrink:0,marginLeft:8 }}>{e.total}</span>
                  </div>
                  <div style={{ height:6,borderRadius:99,background:"rgba(255,255,255,0.06)" }}>
                    <div style={{ height:"100%",width:`${pct}%`,borderRadius:99,background:CHART_COLORS[i%CHART_COLORS.length],opacity:0.85,transition:"width 0.5s" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      </div>

      {/* ── Saúde PI + Alertas ── */}
      {(()=>{
        const base=filialFiltro==="Todas"?ranking:ranking.filter(r=>r.filial===filialFiltro);
        const comMens=base.filter(c=>c.mensalidade>0);
        const saudavel=comMens.filter(c=>c.status_financeiro==="SAUDÁVEL").length;
        const risco=comMens.filter(c=>c.status_financeiro==="RISCO").length;
        const prejuizo=comMens.filter(c=>c.status_financeiro==="PREJUÍZO").length;
        const total=comMens.length;
        if(total===0&&alertasPi.length===0)return null;
        const pctS=total>0?Math.round((saudavel/total)*100):0;
        const pctR=total>0?Math.round((risco/total)*100):0;
        const pctP=total>0?Math.round((prejuizo/total)*100):0;
        return(
          <div style={{ display:"grid",gridTemplateColumns:alertasPi.length>0?"1fr 1fr":"1fr",gap:16,marginBottom:20 }}>
            {total>0&&<Card>
              <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>🏥 Saúde Financeira — PI</div>
                <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>{total} clientes com mensalidade</div>
              </div>
              <div style={{ padding:20 }}>
                <div style={{ height:16,borderRadius:99,overflow:"hidden",display:"flex",marginBottom:16,gap:2 }}>
                  {pctS>0&&<div style={{ flex:pctS,background:"#34d399",borderRadius:"99px 0 0 99px",minWidth:4 }} />}
                  {pctR>0&&<div style={{ flex:pctR,background:"#fbbf24",minWidth:4 }} />}
                  {pctP>0&&<div style={{ flex:pctP,background:"#f87171",borderRadius:"0 99px 99px 0",minWidth:4 }} />}
                </div>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12 }}>
                  {[{label:"Saudável",val:saudavel,pct:pctS,color:"#34d399",bg:"rgba(52,211,153,0.1)"},{label:"Risco",val:risco,pct:pctR,color:"#fbbf24",bg:"rgba(251,191,36,0.1)"},{label:"Prejuízo",val:prejuizo,pct:pctP,color:"#f87171",bg:"rgba(248,113,113,0.1)"}].map(k=>(
                    <div key={k.label} style={{ background:k.bg,borderRadius:10,padding:"12px 14px",textAlign:"center" }}>
                      <div style={{ fontSize:20,fontWeight:800,color:k.color }}>{k.val}</div>
                      <div style={{ fontSize:10,color:"rgba(255,255,255,0.5)",marginTop:2 }}>{k.label}</div>
                      <div style={{ fontSize:11,fontWeight:700,color:k.color,marginTop:2 }}>{k.pct}%</div>
                    </div>
                  ))}
                </div>
              </div>
            </Card>}
            {alertasPi.length>0&&<Card>
              <div style={{ padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,0.07)",display:"flex",alignItems:"center",gap:10 }}>
                <div>
                  <div style={{ fontSize:13,fontWeight:700,color:"#fff" }}>⚠️ Alertas — Aumento Brusco PI</div>
                  <div style={{ fontSize:11,color:"rgba(255,255,255,0.35)",marginTop:2 }}>Clientes com ≥ 50% de aumento no último mês</div>
                </div>
                <span style={{ marginLeft:"auto",fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,background:"rgba(167,139,250,0.15)",color:"#a78bfa",border:"1px solid rgba(167,139,250,0.3)" }}>{alertasPi.length}</span>
              </div>
              <div style={{ padding:"8px 0" }}>
                {alertasPi.map((c,i)=>(
                  <div key={i} onClick={()=>setClienteSelecionado(c)} style={{ padding:"10px 20px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(167,139,250,0.06)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div>
                      <div style={{ fontSize:12,fontWeight:600,color:"#fff" }}>{c.nome_cliente}<span style={{ fontSize:9,color:"rgba(255,255,255,0.3)",marginLeft:4 }}>↗</span></div>
                      <div style={{ fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2 }}>{c.filial} · {c.ant} → {c.atual} eventos</div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:14,fontWeight:800,color:"#f87171" }}>+{c.pct}%</div>
                      <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>vs mês ant.</div>
                    </div>
                  </div>
                ))}
              </div>
            </Card>}
          </div>
        );
      })()}

      <MesesResumo dispatches={mesFiltroEfetivo==="Todos"?dispatches:dispatchesMes} filialFiltro={filialFiltro} tipo="pi" clients={clients} />

      {/* ── Gráficos por filial ── */}
      <div className="grid-2" style={{ marginBottom:0 }}>
        <Card><div style={{ padding:20 }}><SectionLabel>📊 Eventos por Filial</SectionLabel><BarChart data={porFilial.map(d=>({label:d.filial.slice(0,14),value:d.total}))} label="Eventos" height={220} /></div></Card>
        <Card><div style={{ padding:20 }}><SectionLabel>🍩 Distribuição por Filial</SectionLabel><DonutChart data={porFilial.slice(0,8).map(d=>({label:d.filial.slice(0,18),value:d.total}))} height={220} /></div></Card>
      </div>

      {/* ── Ranking ── */}
      <Card>
        <div style={{ borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"16px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12 }}>
          <div><SectionLabel>Ranking — Portaria Inteligente</SectionLabel><p style={{ fontSize:11,color:"rgba(255,255,255,0.25)",margin:"-8px 0 0" }}>Ordenado por quantidade de eventos · {rankingBase.length} clientes</p></div>
          <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>{filiais.map(f=><FilterBtn key={f} active={filialFiltro===f} onClick={()=>setFilialFiltro(f)}>{f}</FilterBtn>)}</div>
        </div>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
                {["#","Cliente","Filial","Eventos","Mensalidade","Custo Op.","Saldo","Status"].map(h=>(
                  <th key={h} style={{ padding:"12px 16px",textAlign:["Eventos","Mensalidade","Custo Op.","Saldo"].includes(h)?"right":h==="Status"?"center":"left",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.25)" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rankingFiltrado.length===0?<tr><td colSpan={8} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:13 }}>Nenhum resultado para esta filial</td></tr>
              :rankingFiltrado.map((c,i)=>(
                <tr key={`${c.codigo_cliente}-${c.filial}`} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)",transition:"background 0.15s",cursor:"pointer" }} onClick={()=>setClienteSelecionado(c)} onMouseEnter={e=>e.currentTarget.style.background="rgba(167,139,250,0.06)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"13px 16px",color:"rgba(255,255,255,0.25)",fontWeight:600 }}>{i+1}</td>
                  <td style={{ padding:"13px 16px" }}><div style={{ fontWeight:600,color:"#a78bfa",display:"flex",alignItems:"center",gap:6 }}>{c.nome_cliente}<span style={{ fontSize:10,color:"rgba(167,139,250,0.5)" }}>↗</span></div><div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",fontFamily:"monospace" }}>{c.codigo_cliente}</div></td>
                  <td style={{ padding:"13px 16px",color:"rgba(255,255,255,0.5)" }}>{c.filial}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:"#a78bfa",fontSize:15 }}>{c.total_eventos}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",color:"rgba(255,255,255,0.55)" }}>{c.mensalidade?formatCurrency(c.mensalidade):<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",color:"#fb923c",fontWeight:600 }}>{formatCurrency(c.custo_operacional)}</td>
                  <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:!c.mensalidade?"rgba(255,255,255,0.2)":c.saldo<0?"#f87171":"#34d399" }}>{c.mensalidade?formatCurrency(c.saldo):"—"}</td>
                  <td style={{ padding:"13px 16px",textAlign:"center" }}><StatusBadge status={c.status_financeiro} /></td>
                </tr>
              ))}
              {rankingFiltrado.length>0&&(()=>{
                const totalEvt=rankingFiltrado.reduce((s,c)=>s+c.total_eventos,0);
                const totalMens=rankingFiltrado.reduce((s,c)=>s+(c.mensalidade||0),0);
                const totalCusto=rankingFiltrado.reduce((s,c)=>s+c.custo_operacional,0);
                const totalSaldo=rankingFiltrado.reduce((s,c)=>s+(c.mensalidade?c.saldo:0),0);
                const temMens=rankingFiltrado.some(c=>c.mensalidade>0);
                return(
                  <tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}>
                    <td colSpan={3} style={{ padding:"13px 16px",fontWeight:700,color:"rgba(255,255,255,0.5)",fontSize:11,letterSpacing:"0.08em",textTransform:"uppercase" }}>Total ({rankingFiltrado.length} clientes)</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:800,color:"#a78bfa",fontSize:15 }}>{totalEvt}</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:"#34d399" }}>{temMens?formatCurrency(totalMens):<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:700,color:"#fb923c" }}>{formatCurrency(totalCusto)}</td>
                    <td style={{ padding:"13px 16px",textAlign:"right",fontWeight:800,color:!temMens?"rgba(255,255,255,0.2)":totalSaldo>=0?"#34d399":"#f87171",fontSize:14 }}>{temMens?formatCurrency(totalSaldo):"—"}</td>
                    <td></td>
                  </tr>
                );
              })()}
            </tbody>
          </table>
        </div>
      </Card>
      <Pagination total={rankingBase.length} page={paginaPI} perPage={PER_PAGE_PI} onChange={setPaginaPI} />
      </>)}
      {clienteSelecionado&&<ClienteModal cliente={clienteSelecionado} dispatches={dispatches} onClose={()=>setClienteSelecionado(null)} supabaseClient={supabaseClient} isPortaria={true} />}
    </>
  );
}

function ClienteModal({ cliente, dispatches, onClose, supabaseClient, isPortaria }) {
  const [obs,setObs]=useState("");
  const [obsHistorico,setObsHistorico]=useState([]);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [loadingObs,setLoadingObs]=useState(true);

  useEffect(()=>{
    const handler=(e)=>{ if(e.key==="Escape") onClose(); };
    document.addEventListener("keydown",handler);
    return()=>document.removeEventListener("keydown",handler);
  },[onClose]);

  const meusDeslocs=useMemo(()=>{
    if(!cliente)return[];
    return dispatches.filter(d=>d.codigo_cliente===cliente.codigo_cliente&&d.filial===cliente.filial&&(isPortaria?d.portaria_inteligente:!d.portaria_inteligente));
  },[dispatches,cliente,isPortaria]);

  // -- Dados mês a mês para o gráfico de tendência --
  const tendenciaMeses=useMemo(()=>{
    const mesMap={};
    for(const d of meusDeslocs){
      const dt=parseDataHora(d.data_hora);
      if(!dt)continue;
      const mk=getMonthKey(dt);
      if(mk)mesMap[mk]=(mesMap[mk]||0)+1;
    }
    return Object.entries(mesMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([mk,total])=>({label:monthLabel(mk),total,mk}));
  },[meusDeslocs]);

  // -- Alerta de variação brusca --
  const alerta=useMemo(()=>{
    if(tendenciaMeses.length<2)return null;
    const ult=tendenciaMeses[tendenciaMeses.length-1];
    const pen=tendenciaMeses[tendenciaMeses.length-2];
    if(!pen.total)return null;
    const variacao=Math.round(((ult.total-pen.total)/pen.total)*100);
    if(Math.abs(variacao)>=30)return{variacao,label:ult.label,labelPrev:pen.label};
    return null;
  },[tendenciaMeses]);

  useEffect(()=>{
    if(!supabaseClient||!cliente)return;
    const cacheKey=`${cliente.codigo_cliente}||${cliente.filial}`;
    if(obsCache.has(cacheKey)){
      const cached=obsCache.get(cacheKey);
      setObs(typeof cached==="object"?cached.texto||"":cached);
      setObsHistorico(typeof cached==="object"?cached.historico||[]:[]);
      setLoadingObs(false);return;
    }
    async function loadObs(){
      const{data}=await supabaseClient.from("clients").select("observacao").eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial).single();
      let texto="",historico=[];
      if(data?.observacao){
        try{const parsed=JSON.parse(data.observacao);texto=parsed.texto||"";historico=parsed.historico||[];}
        catch{texto=data.observacao||"";}
      }
      obsCache.set(cacheKey,{texto,historico});
      setObs(texto);setObsHistorico(historico);setLoadingObs(false);
    }
    loadObs();
  },[cliente?.codigo_cliente,cliente?.filial]);

  if(!cliente)return null;

  async function salvarObs(){
    if(!supabaseClient)return;
    setSaving(true);
    const cacheKey=`${cliente.codigo_cliente}||${cliente.filial}`;
    const novaEntrada={texto:obs,data:new Date().toLocaleString("pt-BR"),usuario:"sistema"};
    const novoHistorico=[novaEntrada,...obsHistorico].slice(0,10);
    const payload=JSON.stringify({texto:obs,historico:novoHistorico});
    await supabaseClient.from("clients").update({observacao:payload}).eq("codigo_cliente",cliente.codigo_cliente).eq("filial",cliente.filial);
    obsCache.set(cacheKey,{texto:obs,historico:novoHistorico});
    setObsHistorico(novoHistorico);
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  }

  const eventoMap={};
  for(const d of meusDeslocs)eventoMap[d.evento]=(eventoMap[d.evento]||0)+1;
  const eventos=Object.entries(eventoMap).sort((a,b)=>b[1]-a[1]);
  const totalEvt=meusDeslocs.length;
  const custo=totalEvt*CUSTO_FISCAL;
  const mens=cliente.mensalidade||0;
  const mesesSet=new Set();
  for(const d of meusDeslocs){const dt=parseDataHora(d.data_hora);if(dt){const mk=getMonthKey(dt);if(mk)mesesSet.add(mk);}}
  const mesesComDesl=Array.from(mesesSet).sort();
  const qtdMeses=mesesComDesl.length||1;
  const mensAcumulada=mens*qtdMeses;
  const saldoAcumulado=mensAcumulada-custo;
  const sc=STATUS_CONFIG[cliente.status_financeiro||calcStatus(mens,custo/qtdMeses)]||STATUS_CONFIG["SEM DADOS"];

  return (
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }} onClick={onClose}>
      <div style={{ background:"#0f172a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,width:"100%",maxWidth:760,maxHeight:"92vh",overflowY:"auto",padding:28 }} onClick={e=>e.stopPropagation()}>
        
        {/* Header */}
        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16 }}>
          <div>
            <div style={{ fontSize:18,fontWeight:700,color:"#fff",marginBottom:4 }}>{cliente.nome_cliente}</div>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)" }}>
              Cód. {cliente.codigo_cliente} · {cliente.filial}
              {cliente.cidade&&<span> · {cliente.cidade}</span>}
              {cliente.bairro&&<span style={{ color:"#a78bfa" }}> · 📍 {cliente.bairro}</span>}
              {cliente.area&&<span style={{ color:"#fb923c",fontWeight:700 }}> · 🗂 Área {cliente.area}</span>}
            </div>
          </div>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:11,fontWeight:700,padding:"4px 12px",borderRadius:99,background:sc.bg,color:sc.text }}>{cliente.status_financeiro||calcStatus(mens,custo/qtdMeses)}</span>
            <button onClick={onClose} style={{ background:"rgba(255,255,255,0.08)",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:13 }}>✕</button>
          </div>
        </div>

        {/* Alerta de variação brusca */}
        {alerta&&(
          <div style={{ marginBottom:16,padding:"10px 16px",borderRadius:12,background:alerta.variacao>0?"rgba(248,113,113,0.12)":"rgba(52,211,153,0.12)",border:alerta.variacao>0?"1px solid rgba(248,113,113,0.3)":"1px solid rgba(52,211,153,0.3)",display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:20 }}>{alerta.variacao>0?"⚠️":"✅"}</span>
            <div>
              <div style={{ fontSize:13,fontWeight:700,color:alerta.variacao>0?"#f87171":"#34d399" }}>
                {alerta.variacao>0?`⚠️ Aumento de ${alerta.variacao}% em ${alerta.label}`:`✅ Redução de ${Math.abs(alerta.variacao)}% em ${alerta.label}`}
              </div>
              <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)" }}>Comparado com {alerta.labelPrev} — variação acima de 30%</div>
            </div>
          </div>
        )}

        {/* KPIs */}
        <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:mens>0&&qtdMeses>0?12:20 }}>
          {[{label:"Deslocamentos",val:totalEvt,color:"#38bdf8",sub:qtdMeses>1?`em ${qtdMeses} meses`:"no período"},{label:"Custo Operacional",val:`R$ ${custo.toLocaleString("pt-BR")}`,color:"#f472b6",sub:`R$ ${(custo/qtdMeses).toLocaleString("pt-BR",{maximumFractionDigits:0})}/mês`},{label:"Mensalidade/mês",val:mens>0?`R$ ${mens.toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—",color:"#34d399",sub:mens>0?`× ${qtdMeses} ${qtdMeses===1?"mês":"meses"}`:"sem cadastro"}].map((k,i)=>(
            <div key={i} style={{ background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",textAlign:"center" }}>
              <div style={{ fontSize:20,fontWeight:800,color:k.color }}>{k.val}</div>
              <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4 }}>{k.label}</div>
              {k.sub&&<div style={{ fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2 }}>{k.sub}</div>}
            </div>
          ))}
        </div>

        {/* Resultado acumulado */}
        {mens>0&&mesesComDesl.length>0&&(
          <div style={{ marginBottom:16,borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.02)",overflow:"hidden" }}>
            <div style={{ padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <span style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)" }}>Resultado Acumulado — {qtdMeses} {qtdMeses===1?"mês":"meses"}</span>
              <div style={{ display:"flex",gap:6,flexWrap:"wrap" }}>{mesesComDesl.map(mk=><span key={mk} style={{ fontSize:10,padding:"2px 8px",borderRadius:99,background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.2)",color:"#38bdf8",fontWeight:600 }}>{monthLabel(mk)}</span>)}</div>
            </div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0 }}>
              {[{label:"Mensalidade acumulada",val:formatCurrency(mensAcumulada),color:"#34d399"},{label:"Custo acumulado",val:formatCurrency(custo),color:"#f472b6"},{label:"Saldo acumulado",val:formatCurrency(saldoAcumulado),color:saldoAcumulado>=0?"#34d399":"#f87171"}].map((k,i)=>(
                <div key={i} style={{ padding:"12px 16px",textAlign:"center",borderRight:i<2?"1px solid rgba(255,255,255,0.06)":"none" }}>
                  <div style={{ fontSize:16,fontWeight:800,color:k.color }}>{k.val}</div>
                  <div style={{ fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:3 }}>{k.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── Progresso da meta mensal ── */}
        {(()=>{
          const meta=cliente.meta_desl||0;
          if(meta<=0||tendenciaMeses.length===0)return null;
          const mesAtual=tendenciaMeses[tendenciaMeses.length-1];
          if(!mesAtual)return null;
          const usado=mesAtual.total;
          const pct=Math.min(Math.round((usado/meta)*100),100);
          const cor=pct>=100?"#f87171":pct>=80?"#fbbf24":"#34d399";
          return(
            <div style={{ marginBottom:16,borderRadius:12,border:`1px solid ${cor}30`,background:`${cor}08`,padding:"14px 18px" }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8 }}>
                <div>
                  <div style={{ fontSize:12,fontWeight:700,color:cor }}>🎯 Meta de Deslocamentos — {mesAtual.label}</div>
                  <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2 }}>Limite: {meta} deslocamentos/mês</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:20,fontWeight:800,color:cor }}>{usado}<span style={{ fontSize:12,color:"rgba(255,255,255,0.4)",fontWeight:400 }}>/{meta}</span></div>
                  <div style={{ fontSize:11,fontWeight:700,color:cor }}>{pct}%{pct>=100?" — META ATINGIDA":pct>=80?" — ATENÇÃO":""}</div>
                </div>
              </div>
              <div style={{ height:10,borderRadius:99,background:"rgba(255,255,255,0.08)",overflow:"hidden" }}>
                <div style={{ height:"100%",width:`${pct}%`,borderRadius:99,background:cor,transition:"width 0.6s" }} />
              </div>
            </div>
          );
        })()}

        {/* Gráfico de tendência mês a mês */}
        {tendenciaMeses.length>=2&&(
          <div style={{ marginBottom:16,borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.02)",overflow:"hidden" }}>
            <div style={{ padding:"10px 16px",borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
              <span style={{ fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)" }}>📈 Evolução Mês a Mês</span>
            </div>
            <div style={{ padding:"16px 20px" }}>
              <ClienteTrendChart dados={tendenciaMeses} />
            </div>
          </div>
        )}

        {/* Motivos */}
        {eventos.length>0&&(
          <div style={{ marginBottom:16 }}>
            <div style={{ fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)",letterSpacing:1,marginBottom:12 }}>MOTIVOS DOS DESLOCAMENTOS</div>
            <div style={{ display:"grid",gridTemplateColumns:eventos.length>=3?"1fr 1fr":"1fr",gap:16,alignItems:"center" }}>
