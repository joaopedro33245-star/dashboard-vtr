function MensalidadesPadraoCard({ clients, supabaseClient, onRefresh }) {
  const [aplicando,setAplicando]=useState(false);const [msg,setMsg]=useState("");const [preview,setPreview]=useState(null);const [detalhes,setDetalhes]=useState("");
  const resumo=useMemo(()=>MENSALIDADES_PADRAO.map(({filialKey,valor})=>{const matchFn=c=>c.filial&&(c.filial.toUpperCase()===filialKey.toUpperCase()||c.filial.toUpperCase().includes(filialKey.toUpperCase().split(" ")[0]));const semMens=clients.filter(c=>matchFn(c)&&(!c.mensalidade||parseFloat(c.mensalidade)===0));const comMens=clients.filter(c=>matchFn(c)&&parseFloat(c.mensalidade)>0);return{filialKey,valor,semMens:semMens.length,comMens:comMens.length,clientes:semMens};}),[clients]);
  const totalAfetados=resumo.reduce((s,r)=>s+r.semMens,0);
  async function aplicarMensalidades(){
    if(totalAfetados===0)return;setAplicando(true);setMsg("Buscando clientes no banco...");setDetalhes("");let totalSalvo=0;let log=[];
    try{
      for(const{filialKey,valor,clientes}of resumo){if(clientes.length===0)continue;const registros=clientes.map(c=>({id:c.id,codigo_cliente:c.codigo_cliente,nome_cliente:c.nome_cliente||"",filial:c.filial,mensalidade:valor,status:c.status||"ativo"}));setMsg(`Atualizando ${filialKey} (${registros.length} clientes)...`);
        for(let i=0;i<registros.length;i+=100){const lote=registros.slice(i,i+100);const{data,error}=await supabaseClient.from("clients").upsert(lote,{onConflict:"codigo_cliente,filial"});if(error){log.push(`❌ ${filialKey}: ${error.message}`);}else{totalSalvo+=lote.length;log.push(`✅ ${filialKey}: ${lote.length} atualizados @ R$ ${valor.toFixed(2)}`);}}
      }
      setDetalhes(log.join("\n"));
      if(totalSalvo>0){setMsg(`✅ ${totalSalvo} clientes com mensalidade atualizada!`);setTimeout(()=>setMsg(""),8000);await onRefresh();}else{setMsg("❌ Nenhum cliente atualizado.");}
    }catch(e){setMsg("❌ Erro inesperado: "+e.message);}
    setAplicando(false);setPreview(null);
  }
  if(clients.length===0)return null;
  return(
    <div style={{ borderRadius:16,border:"1px solid rgba(52,211,153,0.2)",background:"rgba(52,211,153,0.03)",padding:24,marginBottom:20 }}>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:12 }}>
        <div><div style={{ fontSize:13,fontWeight:700,color:"#34d399",marginBottom:4 }}>💳 Mensalidades Padrão por Filial</div><div style={{ fontSize:11,color:"rgba(255,255,255,0.4)" }}>Aplica valores fixos nos clientes <strong style={{ color:"#fff" }}>sem mensalidade cadastrada</strong> · {totalAfetados} clientes serão afetados</div></div>
        <div style={{ display:"flex",gap:8,alignItems:"center" }}>
          {msg&&<span style={{ fontSize:12,color:msg.startsWith("✅")?"#34d399":"#f87171",fontWeight:600 }}>{msg}</span>}
          <button onClick={()=>setPreview(p=>p?null:true)} style={{ padding:"7px 14px",borderRadius:8,border:"1px solid rgba(52,211,153,0.3)",background:"rgba(52,211,153,0.08)",color:"#34d399",cursor:"pointer",fontSize:12,fontWeight:600 }}>{preview?"Ocultar":"👁 Ver prévia"}</button>
          <button onClick={aplicarMensalidades} disabled={aplicando||totalAfetados===0} style={{ padding:"7px 16px",borderRadius:8,border:"none",background:totalAfetados===0?"rgba(52,211,153,0.2)":"#34d399",color:"#0a0f1a",cursor:totalAfetados===0?"not-allowed":"pointer",fontSize:12,fontWeight:700,opacity:aplicando?0.6:1 }}>{aplicando?"Aplicando…":`✅ Aplicar (${totalAfetados} clientes)`}</button>
        </div>
      </div>
      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:10 }}>
        {resumo.map(({filialKey,valor,semMens,comMens})=>(
          <div key={filialKey} style={{ borderRadius:10,border:semMens>0?"1px solid rgba(52,211,153,0.2)":"1px solid rgba(255,255,255,0.06)",background:semMens>0?"rgba(52,211,153,0.05)":"rgba(255,255,255,0.02)",padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div><div style={{ fontSize:12,fontWeight:700,color:semMens>0?"#fff":"rgba(255,255,255,0.4)" }}>{filialKey.length>30?filialKey.slice(0,30)+"…":filialKey}</div><div style={{ fontSize:10,color:"rgba(255,255,255,0.35)",marginTop:2 }}>{semMens>0?<span style={{ color:"#34d399" }}>{semMens} sem mens.</span>:<span>✅ todos cadastrados</span>}{comMens>0&&<span style={{ marginLeft:6,color:"rgba(255,255,255,0.25)" }}>· {comMens} já têm</span>}</div></div>
            <div style={{ textAlign:"right" }}><div style={{ fontSize:14,fontWeight:800,color:semMens>0?"#34d399":"rgba(255,255,255,0.3)" }}>R$ {valor.toFixed(2).replace(".",",")}</div><div style={{ fontSize:9,color:"rgba(255,255,255,0.25)" }}>por cliente</div></div>
          </div>
        ))}
      </div>
      {detalhes&&<div style={{ marginTop:14,borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(0,0,0,0.3)",padding:"12px 16px" }}><div style={{ fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",marginBottom:8 }}>Log de execução</div>{detalhes.split("\n").map((linha,i)=><div key={i} style={{ fontSize:11,color:linha.startsWith("✅")?"#34d399":"#f87171",fontFamily:"monospace",marginBottom:2 }}>{linha}</div>)}</div>}
    </div>
  );
}

function ImportTab({ onImportClients, onImportDispatches, clients, dispatches, supabaseClient, onRefresh }) {
  const clientRef=useRef();const dispatchRef=useRef();
  const [clientPreview,setClientPreview]=useState(null);const [dispatchPreview,setDispatchPreview]=useState(null);
  const [clientError,setClientError]=useState("");const [dispatchError,setDispatchError]=useState("");
  const [clientFileName,setClientFileName]=useState("");const [dispatchFileName,setDispatchFileName]=useState("");
  const [filialForcada,setFilialForcada]=useState("");

  function readExcel(file,onSuccess,onError){
    const reader=new FileReader();
    reader.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:"binary"});const sheetName=wb.SheetNames.find(n=>n.toLowerCase().includes("deslocamento")||n.toLowerCase().includes("viatura")||n.toLowerCase().includes("contas")||n.toLowerCase().includes("conta"))||wb.SheetNames[0];const ws=wb.Sheets[sheetName];const rows=XLSX.utils.sheet_to_json(ws,{defval:""});onSuccess(rows,wb.SheetNames);}catch(err){onError("Erro ao ler o arquivo: "+err.message);}};
    reader.readAsBinaryString(file);
  }

  function handleClientFile(e){
    const file=e.target.files[0];if(!file)return;
    setClientError("");setClientFileName(file.name);
    readExcel(file,rows=>{
      // -- Detecta linhas de área (ex: "F - NOME", "G - NOME", "H - NOME") na coluna A --
      let areaAtual="";let coordAtual="";
      const mapped=[];
      for(const r of rows){
        const colA=String(r["Conta"]||r["conta"]||r["CONTA"]||Object.values(r)[0]||"").trim();
        // Linha de área: começa com letra única + " - " + nome
        const areaMatch=colA.match(/^([A-Z])\s*[-–]\s*(.+)$/);
        if(areaMatch&&!colA.match(/^\d/)){
          areaAtual=areaMatch[1].toUpperCase();
          coordAtual=areaMatch[2].trim();
          continue;
        }
        const empresaRaw=String(r["Empresa"]||r["empresa"]||r["Filial"]||r["filial"]||"");
        const cidadeRaw=String(r["Cidade"]||r["cidade"]||r["CIDADE"]||r["Município"]||r["Municipio"]||"");
        const bairroRaw=String(r["Bairro"]||r["bairro"]||r["BAIRRO"]||r["Bairro/Distrito"]||r["bairro_distrito"]||"");
        const codigo=String(r["Conta"]||r["conta"]||r["CONTA"]||"").trim();
        const nome=limparFantasia(String(r["Fantasia (Razão Social)"]||r["Fantasia"]||r["Razão Social"]||r["fantasia"]||""));
        if(!codigo||!nome)continue;
        mapped.push({
          codigo_cliente:codigo,
          nome_cliente:nome,
          filial:limparEmpresa(empresaRaw,cidadeRaw),
          cidade:cidadeRaw.trim(),
          bairro:bairroRaw.trim(),
          area:areaAtual,
          coordenador:coordAtual,
          mensalidade:parseFloat(String(r["Mensalidade"]||r["mensalidade"]||"0").replace(",","."))||0,
          status:"ativo"
        });
      }
      if(mapped.length===0){setClientError('Nenhum cliente encontrado. Verifique as colunas: "Conta", "Fantasia (Razão Social)", "Empresa".');return;}
      setClientPreview(mapped);
    },setClientError);
  }

  function handleDispatchFile(e){
    const file=e.target.files[0];if(!file)return;
    setDispatchError("");setDispatchFileName(file.name);
    readExcel(file,rows=>{
      const total=rows.length;
      const mapped=rows.map(r=>{
        const codigo=String(r["Código da conta"]||r["Codigo da conta"]||r["Conta"]||r["conta"]||r["codigo_cliente"]||"").trim();
        const empresaRaw=String(r["Empresa"]||r["empresa"]||r["Filial"]||r["filial"]||"").trim();
        const cidadeRaw=String(r["Cidade"]||r["cidade"]||r["CIDADE"]||r["Município"]||r["Municipio"]||"").trim();
        const fantasiaRaw=String(r["Fantasia (Razão social)"]||r["Fantasia"]||r["fantasia"]||"").trim();
        const evento=String(r["Evento"]||r["evento"]||"").trim();
        const viatura=String(r["Viatura"]||r["viatura"]||"").trim();
        const dataRaw=r["Data de recepção"]||r["Data de recepcao"]||r["Data/Hora"]||r["Data"]||r["data_hora"]||"";
        let data_hora="";
        if(dataRaw instanceof Date){data_hora=dataRaw.toLocaleString("pt-BR");}
        else if(typeof dataRaw==="number"&&dataRaw>1000){const excelEpoch=new Date(1899,11,30);const d=new Date(excelEpoch.getTime()+dataRaw*86400000);data_hora=d.toLocaleString("pt-BR");}
        else{data_hora=String(dataRaw).trim();}
        let filial=limparEmpresa(empresaRaw,cidadeRaw);
        if(!cidadeRaw&&(filial==="SECOPI TERESINA"||filial==="SECOPI")){
          const clienteCadastrado=clients.find(c=>c.codigo_cliente===codigo);
          if(clienteCadastrado&&clienteCadastrado.filial)filial=clienteCadastrado.filial;
        }
        if(filialForcada)filial=filialForcada;
        const nome_cliente=limparFantasia(fantasiaRaw);
        const portaria_inteligente=fantasiaRaw.toUpperCase().includes("PORTARIA INTELIGENTE");
        return{codigo_cliente:codigo,filial,nome_cliente,data_hora,evento,viatura,portaria_inteligente};
      }).filter(r=>r.codigo_cliente&&r.evento);
      if(mapped.length===0){setDispatchError('Nenhum deslocamento encontrado. Verifique as colunas: "Código da conta", "Empresa", "Data de recepção", "Evento".');return;}
      const mesesNoArquivo={};
      for(const r of mapped){const dt=parseDataHora(r.data_hora);if(dt){const mk=getMonthKey(dt);if(mk)mesesNoArquivo[mk]=(mesesNoArquivo[mk]||0)+1;}}
      const semanasNoArquivo=new Set();
      for(const r of mapped){const dt=parseDataHora(r.data_hora);if(dt)semanasNoArquivo.add(getWeekKey(dt));}
      const semanasJaImportadas=new Set();
      for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt){const wk=getWeekKey(dt);if(semanasNoArquivo.has(wk))semanasJaImportadas.add(wk);}}
      const mesesJaImportados={};
      for(const wk of semanasJaImportadas){const[wy,wm]=wk.split("-");const mk=`${wy}-${wm}`;if(mesesNoArquivo[mk])mesesJaImportados[mk]=true;}
      const normais=mapped.filter(r=>!r.portaria_inteligente).length;
      const portaria=mapped.filter(r=>r.portaria_inteligente).length;
      setDispatchPreview({rows:mapped,normais,portaria,total,mesesNoArquivo,mesesJaImportados});
    },setDispatchError);
  }

  function confirmClients(){onImportClients(clientPreview);setClientPreview(null);setClientFileName("");if(clientRef.current)clientRef.current.value="";}
  function confirmDispatches(){onImportDispatches(dispatchPreview.rows);setDispatchPreview(null);setDispatchFileName("");if(dispatchRef.current)dispatchRef.current.value="";}
  const card={borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",padding:24,marginBottom:20};

  return(
    <div>
      {(clients.length>0||dispatches.length>0)&&(
        <div style={{ borderRadius:12,border:"1px solid rgba(56,189,248,0.2)",background:"rgba(56,189,248,0.05)",padding:"12px 18px",marginBottom:20,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12 }}>
          <div style={{ display:"flex",alignItems:"center",gap:10 }}>
            <span style={{ fontSize:18 }}>💾</span>
            <div><div style={{ fontSize:13,fontWeight:600,color:"#38bdf8" }}>Dados salvos no banco</div><div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{clients.length} clientes · {dispatches.filter(d=>!d.portaria_inteligente).length} deslocamentos · {dispatches.filter(d=>d.portaria_inteligente).length} portaria inteligente</div></div>
          </div>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",textAlign:"right" }}>Reimporte abaixo para<br/>atualizar os dados</div>
        </div>
      )}
      <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:24 }}>
        {[{label:"Clientes importados",value:clients.length,icon:"👥",color:"#38bdf8"},{label:"Deslocamentos normais",value:dispatches.filter(d=>!d.portaria_inteligente).length,icon:"🚗",color:"#818cf8"},{label:"Eventos Portaria Inteligente",value:dispatches.filter(d=>d.portaria_inteligente).length,icon:"🏢",color:"#a78bfa"}].map(({label,value,icon,color})=>(
          <div key={label} style={{ borderRadius:16,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",padding:20,display:"flex",alignItems:"center",gap:16 }}>
            <div style={{ width:44,height:44,borderRadius:12,background:`${color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>{icon}</div>
            <div><div style={{ fontSize:22,fontWeight:800,color:"#fff" }}>{value}</div><div style={{ fontSize:11,color:"rgba(255,255,255,0.35)" }}>{label}</div></div>
          </div>
        ))}
      </div>
      <div style={card}>
        <SectionLabel>📋 Importar Clientes</SectionLabel>
        <div style={{ borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.03)",padding:"12px 16px",marginBottom:16 }}>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em" }}>Colunas da planilha</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,alignItems:"center" }}>
            <ColTag color="#38bdf8">Conta</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Código</span>
            <ColTag color="#38bdf8">Fantasia (Razão Social)</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Nome</span>
            <ColTag color="#38bdf8">Empresa</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Filial</span>
            <ColTag color="#38bdf8">Cidade</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Cidade</span>
            <ColTag color="#38bdf8">Bairro</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Bairro</span>
            <ColTag color="#ffffff50">Mensalidade</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:10 }}>(opcional)</span>
          </div>
        </div>
        <DropZone color="#38bdf8" fileName={clientFileName} inputRef={clientRef} onChange={handleClientFile} label="Clique para selecionar a planilha de clientes" />
        {clientError&&<div style={{ marginTop:12,padding:"10px 14px",borderRadius:10,background:"#ef444420",border:"1px solid #ef444440",color:"#f87171",fontSize:12 }}>⚠️ {clientError}</div>}
        {clientPreview&&(
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:10 }}>✅ <strong style={{ color:"#34d399" }}>{clientPreview.length} clientes</strong> encontrados — prévia:</div>
            <div style={{ overflowX:"auto",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)" }}>
              <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
                <thead><tr style={{ background:"rgba(255,255,255,0.04)" }}>{["Código","Nome","Filial","Área","Coordenador","Mensalidade"].map(h=><th key={h} style={{ padding:"8px 12px",textAlign:"left",color:"rgba(255,255,255,0.3)",fontSize:10,textTransform:"uppercase" }}>{h}</th>)}</tr></thead>
                <tbody>{clientPreview.slice(0,5).map((r,i)=><tr key={i} style={{ borderTop:"1px solid rgba(255,255,255,0.05)" }}><td style={{ padding:"8px 12px",color:"#38bdf8",fontFamily:"monospace" }}>{r.codigo_cliente}</td><td style={{ padding:"8px 12px",color:"#fff" }}>{r.nome_cliente}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.filial}</td><td style={{ padding:"8px 12px",color:"#fb923c",fontWeight:700 }}>{r.area||"—"}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.6)",fontSize:11 }}>{r.coordenador||"—"}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.mensalidade?formatCurrency(r.mensalidade):"—"}</td></tr>)}</tbody>
              </table>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:14 }}>
              <button onClick={confirmClients} style={{ flex:1,padding:10,borderRadius:10,border:"none",background:"#38bdf8",color:"#0a0f1a",fontWeight:700,fontSize:13,cursor:"pointer" }}>✅ Confirmar — {clientPreview.length} clientes</button>
              <button onClick={()=>{setClientPreview(null);setClientFileName("");if(clientRef.current)clientRef.current.value="";}} style={{ padding:"10px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
      <div style={card}>
        <SectionLabel>🚗 Importar Deslocamentos</SectionLabel>
        <div style={{ borderRadius:10,border:"1px solid rgba(255,255,255,0.07)",background:"rgba(255,255,255,0.03)",padding:"12px 16px",marginBottom:16 }}>
          <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.08em" }}>Colunas da planilha</div>
          <div style={{ display:"flex",flexWrap:"wrap",gap:6,alignItems:"center" }}>
            <ColTag color="#818cf8">Código da conta</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Código</span>
            <ColTag color="#818cf8">Empresa</ColTag><span style={{ color:"rgba(255,255,255,0.2)",fontSize:11 }}>→ Filial</span>
            <ColTag color="#818cf8">Data de recepção</ColTag><ColTag color="#818cf8">Evento</ColTag>
            <ColTag color="#ffffff50">Viatura</ColTag><ColTag color="#ffffff50">Fantasia (Razão social)</ColTag>
          </div>
          <div style={{ marginTop:10,fontSize:11,color:"rgba(255,255,255,0.2)",lineHeight:1.7 }}>🏢 Clientes com <strong style={{ color:"#a78bfa" }}>Portaria Inteligente</strong> são separados automaticamente e aparecem na aba dedicada</div>
        </div>
        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em",color:"rgba(255,255,255,0.35)",marginBottom:8 }}>📌 Filial desta importação <span style={{ color:"#f87171",fontWeight:400,textTransform:"none",letterSpacing:0 }}>(obrigatório)</span></div>
          <select value={filialForcada} onChange={e=>{setFilialForcada(e.target.value);setDispatchPreview(null);setDispatchFileName("");if(dispatchRef.current)dispatchRef.current.value="";}} style={{ width:"100%",padding:"10px 14px",borderRadius:10,border:filialForcada?"1px solid rgba(129,140,248,0.5)":"1px solid rgba(239,68,68,0.5)",background:filialForcada?"rgba(129,140,248,0.08)":"rgba(239,68,68,0.06)",color:filialForcada?"#818cf8":"#f87171",fontSize:13,fontWeight:700,outline:"none",cursor:"pointer" }}>
            <option value="">— Selecione a filial antes de importar —</option>
            <option value="SERVIS CEARÁ">SERVIS CEARÁ</option><option value="SERVIS AMAZONAS">SERVIS AMAZONAS</option><option value="SERVIS MARANHÃO">SERVIS MARANHÃO</option>
            <option value="SECOPI TERESINA">SECOPI TERESINA</option><option value="SECOPI PICOS">SECOPI PICOS</option><option value="SECOPI PARNAÍBA">SECOPI PARNAÍBA</option>
            <option value="1 P3 SOLUCOES">P3 SOLUÇÕES</option><option value="2 PROGUARD">PROGUARD</option><option value="Maver Monitoramento">MAVER MONITORAMENTO</option>
            <option value="SIDERALTECH">SIDERALTECH</option><option value="VISION SEGURANCA">VISION SEGURANÇA</option><option value="OVERTEC">OVERTEC</option>
            <option value="3 LUXUS SERVICOS E TECNOLOGIA LTDA">LUXUS</option><option value="4 PRIORIDADE SERVICOS TERCEIRIZADOS LTDA">PRIORIDADE</option><option value="PERES MONITORAMENTO">PERES MONITORAMENTO</option>
          </select>
          {filialForcada&&<div style={{ marginTop:6,fontSize:11,color:"#34d399" }}>✅ Todos os registros desta importação serão salvos como <strong>{filialForcada}</strong></div>}
        </div>
        <DropZone color={filialForcada?"#818cf8":"#ef4444"} fileName={dispatchFileName} inputRef={dispatchRef} onChange={filialForcada?handleDispatchFile:()=>alert("Selecione a filial antes de escolher o arquivo!")} label={filialForcada?"Clique para selecionar a planilha de deslocamentos":"⚠️ Selecione a filial acima primeiro"} />
        {dispatchError&&<div style={{ marginTop:12,padding:"10px 14px",borderRadius:10,background:"#ef444420",border:"1px solid #ef444440",color:"#f87171",fontSize:12 }}>⚠️ {dispatchError}</div>}
        {dispatchPreview&&(
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginBottom:10 }}>✅ <strong style={{ color:"#34d399" }}>{dispatchPreview.normais} deslocamentos normais</strong>{dispatchPreview.portaria>0&&<span style={{ marginLeft:8,color:"#a78bfa" }}>+ {dispatchPreview.portaria} Portaria Inteligente (separados automaticamente)</span>}</div>
            <div style={{ marginBottom:12,display:"flex",flexWrap:"wrap",gap:6 }}>
              {Object.entries(dispatchPreview.mesesNoArquivo||{}).map(([mk,qt])=>{const jaImportado=dispatchPreview.mesesJaImportados?.[mk];return(<div key={mk} style={{ display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:99,fontSize:11,fontWeight:700,border:jaImportado?"1px solid rgba(251,146,60,0.5)":"1px solid rgba(52,211,153,0.4)",background:jaImportado?"rgba(251,146,60,0.1)":"rgba(52,211,153,0.08)",color:jaImportado?"#fb923c":"#34d399" }}>{jaImportado?"⚠️":"🆕"} {monthLabel(mk)} <span style={{ opacity:0.7 }}>({qt} registros)</span>{jaImportado&&<span style={{ fontSize:10,opacity:0.8 }}>— já importado!</span>}</div>);})}
            </div>
            {Object.keys(dispatchPreview.mesesJaImportados||{}).length>0&&<div style={{ marginBottom:12,padding:"10px 14px",borderRadius:10,background:"rgba(251,146,60,0.1)",border:"1px solid rgba(251,146,60,0.35)",color:"#fb923c",fontSize:12,lineHeight:1.6 }}>⚠️ <strong>Atenção:</strong> {Object.keys(dispatchPreview.mesesJaImportados).map(mk=>monthLabel(mk)).join(", ")} já {Object.keys(dispatchPreview.mesesJaImportados).length===1?"foi importado":"foram importados"} anteriormente. Importar novamente vai <strong>duplicar</strong> os registros desse período.</div>}
            <div style={{ overflowX:"auto",borderRadius:10,border:"1px solid rgba(255,255,255,0.07)" }}>
              <table style={{ width:"100%",borderCollapse:"collapse",fontSize:12 }}>
                <thead><tr style={{ background:"rgba(255,255,255,0.04)" }}>{["Código","Filial","Data","Evento","Portaria?"].map(h=><th key={h} style={{ padding:"8px 12px",textAlign:"left",color:"rgba(255,255,255,0.3)",fontSize:10,textTransform:"uppercase" }}>{h}</th>)}</tr></thead>
                <tbody>{dispatchPreview.rows.slice(0,5).map((r,i)=><tr key={i} style={{ borderTop:"1px solid rgba(255,255,255,0.05)" }}><td style={{ padding:"8px 12px",color:"#818cf8",fontFamily:"monospace" }}>{r.codigo_cliente}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.filial}</td><td style={{ padding:"8px 12px",color:"rgba(255,255,255,0.5)" }}>{r.data_hora}</td><td style={{ padding:"8px 12px",color:"#fff" }}>{r.evento}</td><td style={{ padding:"8px 12px" }}>{r.portaria_inteligente?<span style={{ color:"#a78bfa",fontWeight:700 }}>🏢 Sim</span>:<span style={{ color:"rgba(255,255,255,0.2)" }}>—</span>}</td></tr>)}</tbody>
              </table>
            </div>
            <div style={{ display:"flex",gap:10,marginTop:14 }}>
              <button onClick={confirmDispatches} style={{ flex:1,padding:10,borderRadius:10,border:"none",background:Object.keys(dispatchPreview.mesesJaImportados||{}).length>0?"#fb923c":"#818cf8",color:"#0a0f1a",fontWeight:700,fontSize:13,cursor:"pointer" }}>{Object.keys(dispatchPreview.mesesJaImportados||{}).length>0?"⚠️ Importar mesmo assim":"✅ Adicionar"} — {dispatchPreview.rows.length} registros ao banco</button>
              <button onClick={()=>{setDispatchPreview(null);setDispatchFileName("");if(dispatchRef.current)dispatchRef.current.value="";}} style={{ padding:"10px 16px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer" }}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
      <MensalidadesPadraoCard clients={clients} supabaseClient={supabaseClient} onRefresh={onRefresh} />

      {/* ── Log de importações ── */}
      {(()=>{
        const [logs,setLogs]=useState(()=>lerLogs());
        useEffect(()=>{ setLogs(lerLogs()); },[clients,dispatches]);
        if(logs.length===0)return null;
        return(
          <div style={{ borderRadius:12,border:"1px solid rgba(255,255,255,0.08)",overflow:"hidden",marginBottom:16 }}>
            <div style={{ padding:"12px 18px",background:"rgba(255,255,255,0.03)",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
              <div style={{ fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.5)" }}>📋 Histórico de Importações</div>
              <button onClick={()=>{try{localStorage.removeItem(LOG_KEY_GLOBAL);}catch{}setLogs([]);}} style={{ fontSize:10,color:"rgba(255,255,255,0.25)",background:"none",border:"none",cursor:"pointer" }}>Limpar</button>
            </div>
            <div style={{ maxHeight:200,overflowY:"auto" }}>
              {logs.map((l,i)=>(
                <div key={i} style={{ padding:"8px 18px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                  <div style={{ display:"flex",alignItems:"center",gap:10 }}>
                    <span style={{ fontSize:13 }}>{l.tipo==="clientes"?"👥":"🚗"}</span>
                    <div>
                      <div style={{ fontSize:12,color:"#fff",fontWeight:600 }}>{l.tipo==="clientes"?"Clientes":"Deslocamentos"} — <span style={{ color:l.tipo==="clientes"?"#38bdf8":"#818cf8" }}>{l.qtd} registros</span></div>
                      <div style={{ fontSize:10,color:"rgba(255,255,255,0.3)" }}>por {l.usuario}</div>
                    </div>
                  </div>
                  <div style={{ fontSize:11,color:"rgba(255,255,255,0.3)" }}>{l.data}</div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      <div style={{ borderRadius:12,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.02)",padding:"14px 18px" }}>
        <div style={{ fontSize:11,color:"rgba(255,255,255,0.25)",lineHeight:1.8 }}>💡 Importe primeiro os <strong style={{ color:"#38bdf8" }}>clientes</strong>, depois os <strong style={{ color:"#818cf8" }}>deslocamentos</strong>. O cruzamento é feito por <strong style={{ color:"rgba(255,255,255,0.4)" }}>Código + Filial</strong>. Clientes de <strong style={{ color:"#a78bfa" }}>Portaria Inteligente</strong> são separados automaticamente para a aba dedicada. <strong style={{ color:"#34d399" }}>📥 Cada importação de deslocamentos é acumulativa</strong> — os meses anteriores são mantidos.</div>
      </div>
    </div>
  );
}
</script>
<script type="text/babel" data-presets="react">
function ClientesTab({ clients, dispatches, supabaseClient, onRefresh, isAdmin }) {
  const [busca,setBusca]=useState("");
  const [buscaDebounced,setBuscaDebounced]=useState("");
  const [filialFiltro,setFilialFiltro]=useState("Todas");const [cidadeFiltro,setCidadeFiltro]=useState("Todas");
  const [bairroFiltro,setBairroFiltro]=useState("Todos");
  const [areaFiltro,setAreaFiltro]=useState("Todas");
  const [statusFiltro,setStatusFiltro]=useState("Todos");const [mesFiltro,setMesFiltro]=useState("Todos");
  const [modalNovoCliente,setModalNovoCliente]=useState(false);const [editando,setEditando]=useState(null);const [salvando,setSalvando]=useState(false);const [msgSalvo,setMsgSalvo]=useState("");
  // -- UX: paginação e ordenação --
  const [pagina,setPagina]=useState(1);
  const [sortBy,setSortBy]=useState("nome_cliente");
  const [sortDir,setSortDir]=useState("asc");
  const PER_PAGE=20;
  const FILIAIS=["SERVIS CEARÁ","SERVIS AMAZONAS","SERVIS MARANHÃO","SECOPI PIAUÍ","SECOPI PICOS","SECOPI PARNAÍBA","1 P3 SOLUCOES","2 PROGUARD","Maver Monitoramento","SIDERALTECH","VISION SEGURANCA","OVERTEC","3 LUXUS SERVICOS E TECNOLOGIA LTDA","4 PRIORIDADE SERVICOS TERCEIRIZADOS LTDA","PERES MONITORAMENTO"];

  useEffect(()=>{const t=setTimeout(()=>setBuscaDebounced(busca),250);return()=>clearTimeout(t);},[busca]);
  useEffect(()=>{setCidadeFiltro("Todas");setPagina(1);},[filialFiltro]);
  useEffect(()=>{setPagina(1);},[buscaDebounced,cidadeFiltro,statusFiltro,mesFiltro,sortBy,sortDir]);

  const cidadesDisponiveis=useMemo(()=>{const base=filialFiltro==="Todas"?clients:clients.filter(c=>c.filial===filialFiltro);const cidades=new Set(base.map(c=>String(c.cidade||"").trim().toUpperCase()).filter(Boolean));if(cidades.size<=1)return[];return["Todas",...Array.from(cidades).sort()];},[clients,filialFiltro]);
  const areasDisponiveis=useMemo(()=>{
    const base=clients.filter(c=>{
      if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;
      return true;
    });
    const areas=new Set(base.map(c=>String(c.area||"").trim()).filter(Boolean));
    if(areas.size===0)return[];
    const lista=[...areas].sort();
    // inclui label com coordenador
    return lista.map(a=>{
      const coord=base.find(cl=>cl.area===a&&cl.coordenador)?.coordenador||"";
      return{area:a,label:coord?`${a} — ${coord}`:a};
    });
  },[clients,filialFiltro]);

  const bairrosDisponiveis=useMemo(()=>{
    const base=clients.filter(c=>{
      if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;
      if(cidadeFiltro!=="Todas"&&String(c.cidade||"").trim().toUpperCase()!==cidadeFiltro)return false;
      return true;
    });
    const bairros=new Set(base.map(c=>String(c.bairro||"").trim()).filter(Boolean));
    if(bairros.size===0)return[];
    return["Todos",...Array.from(bairros).sort()];
  },[clients,filialFiltro,cidadeFiltro]);
  const mesesDisponiveis=useMemo(()=>{const s=new Set();for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];},[dispatches]);
  const dispMap=useMemo(()=>{const m={};for(const d of dispatches.filter(x=>!x.portaria_inteligente)){if(mesFiltro!=="Todos"){const dt=parseDataHora(d.data_hora);if(!dt||getMonthKey(dt)!==mesFiltro)continue;}const k=`${d.codigo_cliente}||${d.filial}`;m[k]=(m[k]||0)+1;}return m;},[dispatches,mesFiltro]);
  const filiais=useMemo(()=>{const s=new Set(clients.map(c=>c.filial).filter(Boolean));return["Todas",...Array.from(s).sort()];},[clients]);

  const filtrados=useMemo(()=>{
    const buscaNorm=buscaDebounced.toLowerCase().replace(/\s|^0+/g,"");
    const base=clients.filter(c=>{
      if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;
      if(cidadeFiltro!=="Todas"&&String(c.cidade||"").trim().toUpperCase()!==cidadeFiltro)return false;
      if(bairroFiltro!=="Todos"&&String(c.bairro||"").trim()!==bairroFiltro)return false;
      if(areaFiltro!=="Todas"&&String(c.area||"").trim()!==areaFiltro)return false;
      if(statusFiltro==="Ativos"&&c.status!=="ativo")return false;
      if(statusFiltro==="Inativos"&&c.status!=="inativo")return false;
      if(buscaDebounced){const nome=(c.nome_cliente||"").toLowerCase();const cod=String(c.codigo_cliente||"").replace(/^0+/,"");if(!nome.includes(buscaDebounced.toLowerCase())&&!cod.includes(buscaNorm))return false;}
      return true;
    });
    // -- UX: ordenação por coluna --
    return [...base].sort((a,b)=>{
      let va,vb;
      if(sortBy==="desl"){va=dispMap[`${a.codigo_cliente}||${a.filial}`]||0;vb=dispMap[`${b.codigo_cliente}||${b.filial}`]||0;}
      else if(sortBy==="mensalidade"){va=parseFloat(a.mensalidade)||0;vb=parseFloat(b.mensalidade)||0;}
      else if(sortBy==="nome_cliente"){va=(a.nome_cliente||"").toLowerCase();vb=(b.nome_cliente||"").toLowerCase();}
      else if(sortBy==="codigo_cliente"){va=String(a.codigo_cliente||"");vb=String(b.codigo_cliente||"");}
      else if(sortBy==="filial"){va=(a.filial||"").toLowerCase();vb=(b.filial||"").toLowerCase();}
      else if(sortBy==="bairro"){va=(a.bairro||"").toLowerCase();vb=(b.bairro||"").toLowerCase();}
      else if(sortBy==="area"){va=(a.area||"").toLowerCase();vb=(b.area||"").toLowerCase();}
      else if(sortBy==="status"){va=a.status||"";vb=b.status||"";}
      else{va=(a[sortBy]||"").toString().toLowerCase();vb=(b[sortBy]||"").toString().toLowerCase();}
      if(va<vb)return sortDir==="asc"?-1:1;
      if(va>vb)return sortDir==="asc"?1:-1;
      return 0;
    });
  },[clients,buscaDebounced,filialFiltro,cidadeFiltro,statusFiltro,dispMap,sortBy,sortDir]);

  const paginados=useMemo(()=>filtrados.slice((pagina-1)*PER_PAGE,pagina*PER_PAGE),[filtrados,pagina]);

  function handleSort(campo){
    if(sortBy===campo)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortBy(campo);setSortDir("asc");}
  }

  const toggleStatus=useCallback(async(c)=>{const novoStatus=c.status==="ativo"?"inativo":"ativo";await supabaseClient.from("clients").update({status:novoStatus}).eq("codigo_cliente",c.codigo_cliente);onRefresh();},[supabaseClient,onRefresh]);
  async function salvarNovoCliente(dados){setSalvando(true);const{error}=await supabaseClient.from("clients").upsert([{codigo_cliente:dados.codigo,nome_cliente:dados.nome,filial:dados.filial,bairro:sanitizeStr(dados.bairro||"",100),area:sanitizeStr(dados.area||"",10),coordenador:sanitizeStr(dados.coordenador||"",200),mensalidade:parseFloat(dados.mensalidade)||0,custo_individual:parseFloat(dados.custo_individual)||null,meta_desl:parseInt(dados.meta_desl)||0,status:"ativo"}],{onConflict:"codigo_cliente,filial"});setSalvando(false);if(!error){setModalNovoCliente(false);setMsgSalvo("✅ Cliente salvo!");setTimeout(()=>setMsgSalvo(""),4000);onRefresh();}else{setMsgSalvo("❌ Erro ao salvar: "+(error.message||JSON.stringify(error)));}}
  async function salvarEdicao(dados){setSalvando(true);const mensVal=parseFloat(String(dados.mensalidade).replace(",","."))||0;const custoVal=parseFloat(dados.custo_individual)||null;const{error}=await supabaseClient.from("clients").update({nome_cliente:dados.nome,mensalidade:mensVal,bairro:sanitizeStr(dados.bairro||"",100),area:sanitizeStr(dados.area||"",10),coordenador:sanitizeStr(dados.coordenador||"",200),custo_individual:custoVal,meta_desl:parseInt(dados.meta_desl)||0}).eq("codigo_cliente",editando.codigo_cliente);setSalvando(false);if(!error){setEditando(null);setMsgSalvo("✅ Cliente atualizado!");setTimeout(()=>setMsgSalvo(""),4000);onRefresh();}else{setMsgSalvo("❌ Erro ao salvar: "+(error.message||JSON.stringify(error)));}}
  function exportarXLSX(){
    const data=filtrados.map(c=>{const desl=dispMap[`${c.codigo_cliente}||${c.filial}`]||0;return{"Código":c.codigo_cliente,"Nome":c.nome_cliente||"","Filial":c.filial||"","Cidade":c.cidade||"","Bairro":c.bairro||"","Mensalidade (R$)":parseFloat(c.mensalidade)||0,"Custo/Desl (R$)":c.custo_individual||CUSTO_FISCAL,"Status":c.status||"","Deslocamentos":desl,"Custo Total (R$)":desl*(c.custo_individual||CUSTO_FISCAL),"Resultado (R$)":(parseFloat(c.mensalidade)||0)-desl*(c.custo_individual||CUSTO_FISCAL)};});
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Clientes");
    // Estilo cabeçalho
    const range=XLSX.utils.decode_range(ws["!ref"]);
    ws["!cols"]=[{wch:10},{wch:40},{wch:20},{wch:18},{wch:18},{wch:16},{wch:14},{wch:10},{wch:14},{wch:14},{wch:14}];
    XLSX.writeFile(wb,`clientes${filialFiltro!=="Todas"?"_"+filialFiltro.slice(0,15):""}.xlsx`);
  }
  const iStyle={width:"100%",padding:"9px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:13,outline:"none"};
  return(
    <div>
      {msgSalvo&&<div style={{ position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",zIndex:3000,padding:"10px 24px",borderRadius:12,background:msgSalvo.startsWith("✅")?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.15)",border:msgSalvo.startsWith("✅")?"1px solid #10b98150":"1px solid #ef444450",color:msgSalvo.startsWith("✅")?"#34d399":"#f87171",fontSize:14,fontWeight:600 }}>{msgSalvo}</div>}
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12 }}>
        <div><div style={{ fontSize:20,fontWeight:700 }}>👥 Clientes</div><div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{filtrados.length} de {clients.length} clientes{busca&&busca!==buscaDebounced&&<span style={{ marginLeft:8,color:"rgba(255,255,255,0.2)",fontStyle:"italic" }}>buscando…</span>}</div></div>
        <div style={{ display:"flex",gap:10 }}>
          <button onClick={exportarXLSX} style={{ background:"rgba(52,211,153,0.15)",border:"1px solid rgba(52,211,153,0.3)",color:"#34d399",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600 }}>⬇ Exportar Excel</button>
          <button onClick={()=>setModalNovoCliente(true)} style={{ background:"#38bdf8",border:"none",color:"#000",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:700 }}>+ Novo Cliente</button>
        </div>
      </div>
      <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
        <input placeholder="Buscar por nome ou código..." value={busca} onChange={e=>setBusca(e.target.value)} style={{ ...iStyle,flex:1,minWidth:200 }} />
        <select value={filialFiltro} onChange={e=>setFilialFiltro(e.target.value)} style={{ ...iStyle,width:"auto" }}>{filiais.map(f=><option key={f} value={f}>{f}</option>)}</select>
        {cidadesDisponiveis.length>0&&<select value={cidadeFiltro} onChange={e=>setCidadeFiltro(e.target.value)} style={{ ...iStyle,width:"auto",borderColor:cidadeFiltro!=="Todas"?"rgba(56,189,248,0.5)":"rgba(255,255,255,0.1)",color:cidadeFiltro!=="Todas"?"#38bdf8":"#fff" }}>{cidadesDisponiveis.map(c=><option key={c} value={c}>{c==="Todas"?"🏙 Todas as cidades":`🏙 ${c}`}</option>)}</select>}
        {bairrosDisponiveis.length>0&&<select value={bairroFiltro} onChange={e=>setBairroFiltro(e.target.value)} style={{ ...iStyle,width:"auto",borderColor:bairroFiltro!=="Todos"?"rgba(167,139,250,0.5)":"rgba(255,255,255,0.1)",color:bairroFiltro!=="Todos"?"#a78bfa":"#fff" }}>{bairrosDisponiveis.map(b=><option key={b} value={b}>{b==="Todos"?"📍 Todos os bairros":`📍 ${b}`}</option>)}</select>}
        {areasDisponiveis.length>0&&<select value={areaFiltro} onChange={e=>setAreaFiltro(e.target.value)} style={{ ...iStyle,width:"auto",borderColor:areaFiltro!=="Todas"?"rgba(251,146,60,0.5)":"rgba(255,255,255,0.1)",color:areaFiltro!=="Todas"?"#fb923c":"#fff" }}><option value="Todas">🗂 Todas as áreas</option>{areasDisponiveis.map(a=><option key={a.area} value={a.area}>🗂 {a.label}</option>)}</select>}
        <select value={statusFiltro} onChange={e=>setStatusFiltro(e.target.value)} style={{ ...iStyle,width:"auto" }}>{["Todos","Ativos","Inativos"].map(s=><option key={s} value={s}>{s}</option>)}</select>
        <select value={mesFiltro} onChange={e=>setMesFiltro(e.target.value)} style={{ ...iStyle,width:"auto",borderColor:mesFiltro!=="Todos"?"rgba(251,146,60,0.5)":"rgba(255,255,255,0.1)",color:mesFiltro!=="Todos"?"#fb923c":"#fff" }}>{mesesDisponiveis.map(m=><option key={m} value={m}>{m==="Todos"?"📅 Todos os meses":`📅 ${monthLabel(m)}`}</option>)}</select>
      </div>
      <Card style={{ overflow:"hidden" }}>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <SortHeader label="Nome" campo="nome_cliente" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="left" />
                <SortHeader label="Código" campo="codigo_cliente" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Filial" campo="filial" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Cidade" campo="cidade" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Bairro" campo="bairro" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Área" campo="area" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Mensalidade" campo="mensalidade" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label={mesFiltro!=="Todos"?`Disparos ${monthLabel(mesFiltro)}`:"Deslocamentos"} campo="desl" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Status" campo="status" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <th style={{ padding:"12px 16px",textAlign:"center",fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.4)" }}>Ações</th>
              </tr>
            </thead>
            <tbody>
              {paginados.length===0&&<tr><td colSpan={9} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.3)" }}>Nenhum cliente encontrado</td></tr>}
              {paginados.map((c,i)=>{const desl=dispMap[`${c.codigo_cliente}||${c.filial}`]||0;const ativo=c.status!=="inativo";return(
                <tr key={c.codigo_cliente+c.filial} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)",opacity:ativo?1:0.45,transition:"opacity 0.2s" }}>
                  <td style={{ padding:"12px 16px" }}><div style={{ fontWeight:600,color:ativo?"#fff":"rgba(255,255,255,0.5)" }}>{c.nome_cliente||"—"}</div></td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:"rgba(255,255,255,0.4)",fontFamily:"monospace" }}>{c.codigo_cliente}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:"rgba(255,255,255,0.6)",fontSize:12 }}>{c.filial}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:"rgba(255,255,255,0.4)",fontSize:12 }}>{c.cidade||"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center" }}>
                    {c.bairro
                      ? <span style={{ display:"inline-flex",alignItems:"center",gap:5,background:"rgba(167,139,250,0.12)",border:"1px solid rgba(167,139,250,0.25)",borderRadius:6,padding:"2px 10px",fontSize:11,color:"#a78bfa",fontWeight:600 }}>📍 {c.bairro}</span>
                      : <span style={{ color:"rgba(255,255,255,0.2)",fontSize:12 }}>—</span>
                    }
                  </td>
                  <td style={{ padding:"12px 16px",textAlign:"center" }}>
                    {c.area
                      ? <span style={{ display:"inline-flex",alignItems:"center",gap:5,background:"rgba(251,146,60,0.12)",border:"1px solid rgba(251,146,60,0.25)",borderRadius:6,padding:"2px 10px",fontSize:11,color:"#fb923c",fontWeight:700 }}>{c.area}</span>
                      : <span style={{ color:"rgba(255,255,255,0.2)",fontSize:12 }}>—</span>
                    }
                  </td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:c.mensalidade>0?"#34d399":"rgba(255,255,255,0.3)" }}>{c.mensalidade>0?`R$ ${Number(c.mensalidade).toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:desl>0?"#f472b6":"rgba(255,255,255,0.3)",fontWeight:desl>0?700:400 }}>{desl||"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center" }}><span style={{ fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,background:ativo?"rgba(52,211,153,0.15)":"rgba(239,68,68,0.15)",color:ativo?"#34d399":"#f87171" }}>{ativo?"ATIVO":"INATIVO"}</span></td>
                  <td style={{ padding:"12px 16px",textAlign:"center" }}>
                    <div style={{ display:"flex",gap:6,justifyContent:"center" }}>
                      <button onClick={()=>setEditando(c)} style={{ background:"rgba(56,189,248,0.1)",border:"1px solid rgba(56,189,248,0.2)",color:"#38bdf8",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11 }}>✏️ Editar</button>
                      <button onClick={()=>toggleStatus(c)} style={{ background:ativo?"rgba(239,68,68,0.1)":"rgba(52,211,153,0.1)",border:ativo?"1px solid rgba(239,68,68,0.2)":"1px solid rgba(52,211,153,0.2)",color:ativo?"#f87171":"#34d399",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:11 }}>{ativo?"Inativar":"Ativar"}</button>
                    </div>
                  </td>
                </tr>
              );})}
              {filtrados.length>0&&pagina===Math.ceil(filtrados.length/PER_PAGE)&&(()=>{
                const totalDisparos=filtrados.reduce((s,c)=>s+(dispMap[`${c.codigo_cliente}||${c.filial}`]||0),0);
                const totalMens=filtrados.reduce((s,c)=>s+(parseFloat(c.mensalidade)||0),0);
                const comMens=filtrados.filter(c=>c.mensalidade>0).length;
                const comDisparos=filtrados.filter(c=>(dispMap[`${c.codigo_cliente}||${c.filial}`]||0)>0).length;
                return(<tr style={{ borderTop:"2px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)" }}>
                  <td style={{ padding:"13px 16px" }}><div style={{ fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",textTransform:"uppercase",letterSpacing:"0.08em" }}>Total — {filtrados.length} clientes</div><div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2 }}>{comDisparos} com disparos · {comMens} com mensalidade{mesFiltro!=="Todos"&&<span style={{ marginLeft:6,color:"#fb923c",fontWeight:600 }}>· {monthLabel(mesFiltro)}</span>}</div></td>
                  <td colSpan={5}></td>
                  <td style={{ padding:"13px 16px",textAlign:"center",fontWeight:800,color:"#34d399",fontSize:14 }}>{totalMens>0?formatCurrency(totalMens):"—"}<div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:400,marginTop:2 }}>mensalidade/mês</div></td>
                  <td style={{ padding:"13px 16px",textAlign:"center",fontWeight:800,color:"#f472b6",fontSize:14 }}>{totalDisparos.toLocaleString("pt-BR")}<div style={{ fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:400,marginTop:2 }}>disparos{mesFiltro!=="Todos"?` em ${monthLabel(mesFiltro)}`:" no total"}</div></td>
                  <td colSpan={2}></td>
                </tr>);
              })()}
            </tbody>
          </table>
        </div>
        <Pagination total={filtrados.length} page={pagina} perPage={PER_PAGE} onChange={setPagina} />
      </Card>
      {modalNovoCliente&&<ModalFormCliente titulo="Novo Cliente" filiais={FILIAIS} onSalvar={salvarNovoCliente} onFechar={()=>setModalNovoCliente(false)} salvando={salvando} />}
      {editando&&<ModalFormCliente titulo="Editar Cliente" filiais={FILIAIS} inicial={editando} onSalvar={salvarEdicao} onFechar={()=>setEditando(null)} salvando={salvando} bloqueaCodigo={true} bloqueaFilial={true} />}
    </div>
  );
}

function ModalFormCliente({ titulo, filiais, inicial, onSalvar, onFechar, salvando, bloqueaCodigo, bloqueaFilial }) {
  const [codigo,setCodigo]=useState(inicial?.codigo_cliente||"");
  const [nome,setNome]=useState(inicial?.nome_cliente||"");
  const [filial,setFilial]=useState(inicial?.filial||filiais[0]);
  const [mens,setMens]=useState(inicial?.mensalidade||"");
  const [bairro,setBairro]=useState(inicial?.bairro||"");
  const [area,setArea]=useState(inicial?.area||"");
  const [coordenador,setCoordenador]=useState(inicial?.coordenador||"");
  const [custoIndividual,setCustoIndividual]=useState(inicial?.custo_individual||CUSTO_FISCAL||48);
  const [metaDesl,setMetaDesl]=useState(inicial?.meta_desl||0);

  useEffect(()=>{
    const h=(e)=>{ if(e.key==="Escape") onFechar(); };
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[onFechar]);
  const iStyle={width:"100%",padding:"9px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:13,outline:"none",marginTop:6};
  return(
    <div style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16 }} onClick={onFechar}>
      <div style={{ background:"#0f172a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,width:"100%",maxWidth:460,padding:28 }} onClick={e=>e.stopPropagation()}>
        <div style={{ fontSize:16,fontWeight:700,marginBottom:20 }}>{titulo}</div>
        <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
          <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>CÓDIGO</label><input value={codigo} onChange={e=>setCodigo(e.target.value)} disabled={bloqueaCodigo} style={{ ...iStyle,opacity:bloqueaCodigo?0.5:1 }} placeholder="Ex: 12345" /></div>
          <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>NOME DO CLIENTE</label><input value={nome} onChange={e=>setNome(e.target.value)} style={iStyle} placeholder="Ex: Condomínio Exemplo" /></div>
          <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>FILIAL</label><select value={filial} onChange={e=>setFilial(e.target.value)} disabled={bloqueaFilial} style={{ ...iStyle,opacity:bloqueaFilial?0.5:1 }}>{filiais.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
            <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>BAIRRO</label><input value={bairro} onChange={e=>setBairro(e.target.value)} style={iStyle} placeholder="Ex: Centro" /></div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 3fr",gap:12 }}>
            <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>ÁREA</label><input value={area} onChange={e=>setArea(e.target.value.toUpperCase())} style={iStyle} placeholder="Ex: F" maxLength={5} /></div>
            <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>COORDENADOR</label><input value={coordenador} onChange={e=>setCoordenador(e.target.value)} style={iStyle} placeholder="Ex: João Silva" /></div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
            <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>MENSALIDADE (R$)</label><input value={mens} onChange={e=>setMens(e.target.value)} style={iStyle} placeholder="Ex: 150.00" type="number" /></div>
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
            <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>CUSTO/DESL. (R$)</label><input value={custoIndividual} onChange={e=>setCustoIndividual(e.target.value)} style={iStyle} placeholder={`Padrão: R$ ${CUSTO_FISCAL}`} type="number" /><div style={{ fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:4 }}>Padrão global: R$ {CUSTO_FISCAL}/desl.</div></div>
            <div><label style={{ fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:0.5 }}>META DESL./MÊS</label><input value={metaDesl} onChange={e=>setMetaDesl(e.target.value)} style={iStyle} placeholder="0 = sem limite" type="number" min="0" /><div style={{ fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:4 }}>Alerta quando ultrapassar</div></div>
          </div>
        </div>
        <div style={{ display:"flex",gap:10,justifyContent:"flex-end",marginTop:24 }}>
          <button onClick={onFechar} style={{ background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:"#fff",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontSize:13 }}>Cancelar</button>
          <button onClick={()=>onSalvar({codigo,nome,filial,mensalidade:mens,bairro,area,coordenador,custo_individual:parseFloat(custoIndividual)||CUSTO_FISCAL,meta_desl:parseInt(metaDesl)||0})} disabled={salvando||!codigo||!nome} style={{ background:"#38bdf8",border:"none",color:"#000",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:700,fontSize:13,opacity:salvando||!codigo||!nome?0.6:1 }}>{salvando?"Salvando...":"Salvar"}</button>
        </div>
      </div>
    </div>
  );
}

function RelatoriosTab({ clients, dispatches, mesFiltro, setMesFiltro }) {
  const [filialFiltro,setFilialFiltro]=useState("Todas");const [statusFiltro,setStatusFiltro]=useState("Todos");
  const [busca,setBusca]=useState("");const [buscaDebounced,setBuscaDebounced]=useState("");
  const [clienteSelecionado,setClienteSelecionado]=useState(null);
  const [sortBy,setSortBy]=useState("desl");const [sortDir,setSortDir]=useState("desc");
  const [pagina,setPagina]=useState(1);const PER_PAGE=20;

  useEffect(()=>{const t=setTimeout(()=>setBuscaDebounced(busca),250);return()=>clearTimeout(t);},[busca]);
  useEffect(()=>{setPagina(1);},[buscaDebounced,filialFiltro,statusFiltro,mesFiltro,sortBy,sortDir]);

  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    for(const d of dispatches){const dt=parseDataHora(d.data_hora);if(dt)s.add(getMonthKey(dt));}
    return["Todos",...Array.from(s).filter(Boolean).sort().reverse()];
  },[dispatches]);

  const mesFiltroEfetivo = mesesDisponiveis.includes(mesFiltro) ? mesFiltro : "Todos";

  const dispMap=useMemo(()=>{
    const m={};
    for(const d of dispatches.filter(x=>!x.portaria_inteligente)){
      if(mesFiltroEfetivo!=="Todos"){const dt=parseDataHora(d.data_hora);if(!dt||getMonthKey(dt)!==mesFiltroEfetivo)continue;}
      const k=`${d.codigo_cliente}||${d.filial}`;m[k]=(m[k]||0)+1;
    }
    return m;
  },[dispatches,mesFiltroEfetivo]);

  const filiais=useMemo(()=>{const s=new Set(clients.map(c=>c.filial).filter(Boolean));return["Todas",...Array.from(s).sort()];},[clients]);
  const relatorio=useMemo(()=>clients.map(c=>{const desl=dispMap[`${c.codigo_cliente}||${c.filial}`]||0;const custo=desl*CUSTO_FISCAL;const mens=parseFloat(c.mensalidade)||0;const resultado=mens-custo;const status=calcStatus(mens,custo);return{...c,desl,custo,mens,resultado,status};}),[clients,dispMap]);
  const filtrado=useMemo(()=>{
    const base=relatorio.filter(c=>{
      if(filialFiltro!=="Todas"&&c.filial!==filialFiltro)return false;
      if(statusFiltro==="Prejuízo"&&c.status!=="PREJUÍZO")return false;
      if(statusFiltro==="Risco"&&c.status!=="RISCO")return false;
      if(statusFiltro==="Saudável"&&c.status!=="SAUDÁVEL")return false;
      if(statusFiltro==="Sem dados"&&c.status!=="SEM DADOS")return false;
      if(buscaDebounced){const b=buscaDebounced.toLowerCase();if(!(c.nome_cliente||"").toLowerCase().includes(b)&&!String(c.codigo_cliente).includes(b))return false;}
      return true;
    });
    return [...base].sort((a,b)=>{
      let va,vb;
      if(sortBy==="desl"){va=a.desl;vb=b.desl;}
      else if(sortBy==="mens"){va=a.mens;vb=b.mens;}
      else if(sortBy==="custo"){va=a.custo;vb=b.custo;}
      else if(sortBy==="resultado"){va=a.resultado;vb=b.resultado;}
      else if(sortBy==="nome_cliente"){va=(a.nome_cliente||"").toLowerCase();vb=(b.nome_cliente||"").toLowerCase();}
      else if(sortBy==="status"){va=a.status||"";vb=b.status||"";}
      else{va=a[sortBy]||0;vb=b[sortBy]||0;}
      if(va<vb)return sortDir==="asc"?-1:1;
      if(va>vb)return sortDir==="asc"?1:-1;
      return 0;
    });
  },[relatorio,filialFiltro,statusFiltro,buscaDebounced,sortBy,sortDir]);

  const paginadosRel=useMemo(()=>filtrado.slice((pagina-1)*PER_PAGE,pagina*PER_PAGE),[filtrado,pagina]);

  function handleSort(campo){
    if(sortBy===campo)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortBy(campo);setSortDir(campo==="nome_cliente"?"asc":"desc");}
  }
  const totais=useMemo(()=>({clientes:filtrado.length,desl:filtrado.reduce((s,c)=>s+c.desl,0),custo:filtrado.reduce((s,c)=>s+c.custo,0),mensalidade:filtrado.reduce((s,c)=>s+c.mens,0),resultado:filtrado.reduce((s,c)=>s+(c.mens>0?c.resultado:0),0),prejuizo:filtrado.filter(c=>c.status==="PREJUÍZO").length,risco:filtrado.filter(c=>c.status==="RISCO").length}),[filtrado]);

  // -- UX: nome do arquivo CSV inclui mês/filial filtrados --
  const exportarXLSX=useCallback(()=>{
    const data=filtrado.map(c=>({"Código":c.codigo_cliente,"Nome":c.nome_cliente||"","Filial":c.filial||"","Mensalidade (R$)":c.mens,"Deslocamentos":c.desl,"Custo/Desl (R$)":c.custo_individual||CUSTO_FISCAL,"Custo Total (R$)":c.custo,"Resultado (R$)":c.mens>0?c.resultado:"",'Status':c.status}));
    const ws=XLSX.utils.json_to_sheet(data);
    const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Relatório");
    ws["!cols"]=[{wch:10},{wch:40},{wch:20},{wch:16},{wch:14},{wch:14},{wch:14},{wch:14},{wch:12}];
    const sufixo=[filialFiltro!=="Todas"?filialFiltro.slice(0,15):"",mesFiltroEfetivo!=="Todos"?mesFiltroEfetivo:""].filter(Boolean).join("_");
    XLSX.writeFile(wb,`relatorio${sufixo?"_"+sufixo:""}.xlsx`);
  },[filtrado,filialFiltro,mesFiltroEfetivo]);
  const iStyle={padding:"9px 12px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#fff",fontSize:13,outline:"none"};
  return(
    <div>
      <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12 }}>
        <div>
          <div style={{ fontSize:20,fontWeight:700 }}>📋 Relatório de Rentabilidade</div>
          <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",marginTop:2 }}>{filtrado.length} clientes · {totais.desl} deslocamentos{mesFiltroEfetivo!=="Todos"&&<span style={{ marginLeft:8,color:"#fb923c",fontWeight:600 }}>· {monthLabel(mesFiltroEfetivo)}</span>}</div>
        </div>
        <button onClick={exportarXLSX} style={{ background:"rgba(251,146,60,0.15)",border:"1px solid rgba(251,146,60,0.3)",color:"#fb923c",borderRadius:10,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:600 }}>⬇ Exportar Excel</button>
      </div>

      {/* MELHORIA 2: filtro de mês compartilhado em Relatórios */}
      <MesFiltroBar value={mesFiltroEfetivo} onChange={setMesFiltro} meses={mesesDisponiveis} accent="#fb923c" />

      <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:20 }}>
        {[{label:"Total Mensalidade",val:`R$ ${totais.mensalidade.toLocaleString("pt-BR",{minimumFractionDigits:2})}`,color:"#34d399"},{label:"Custo Operacional",val:`R$ ${totais.custo.toLocaleString("pt-BR")}`,color:"#f472b6"},{label:"Resultado Líquido",val:`R$ ${totais.resultado.toLocaleString("pt-BR")}`,color:totais.resultado>=0?"#34d399":"#f87171"},{label:"Em Prejuízo",val:totais.prejuizo,color:"#f87171"},{label:"Em Risco",val:totais.risco,color:"#fbbf24"}].map((k,i)=>(
          <div key={i} style={{ background:"rgba(255,255,255,0.04)",borderRadius:12,padding:"14px 16px",textAlign:"center",border:"1px solid rgba(255,255,255,0.05)" }}>
            <div style={{ fontSize:18,fontWeight:800,color:k.color }}>{k.val}</div>
            <div style={{ fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:4 }}>{k.label}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex",gap:10,marginBottom:16,flexWrap:"wrap" }}>
        <input placeholder="Buscar cliente..." value={busca} onChange={e=>setBusca(e.target.value)} style={{ ...iStyle,flex:1,minWidth:200 }} />
        <select value={filialFiltro} onChange={e=>setFilialFiltro(e.target.value)} style={iStyle}>{filiais.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={statusFiltro} onChange={e=>setStatusFiltro(e.target.value)} style={iStyle}>{["Todos","Prejuízo","Risco","Saudável","Sem dados"].map(s=><option key={s} value={s}>{s}</option>)}</select>
      </div>
      <Card style={{ overflow:"hidden" }}>
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%",borderCollapse:"collapse",fontSize:13 }}>
            <thead>
              <tr style={{ borderBottom:"1px solid rgba(255,255,255,0.07)" }}>
                <th style={{ padding:"12px 16px",textAlign:"left",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap" }}>Código</th>
                <SortHeader label="Nome do Cliente" campo="nome_cliente" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="left" />
                <th style={{ padding:"12px 16px",textAlign:"center",fontSize:11,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap" }}>Filial</th>
                <SortHeader label="Mensalidade" campo="mens" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Deslocamentos" campo="desl" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Custo" campo="custo" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Resultado" campo="resultado" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
                <SortHeader label="Status" campo="status" sortBy={sortBy} sortDir={sortDir} onSort={handleSort} align="center" />
              </tr>
            </thead>
            <tbody>
              {paginadosRel.length===0&&<tr><td colSpan={8} style={{ padding:40,textAlign:"center",color:"rgba(255,255,255,0.3)" }}>Nenhum cliente encontrado</td></tr>}
              {paginadosRel.map((c,i)=>{const cfg=STATUS_CONFIG[c.status]||STATUS_CONFIG["SEM DADOS"];return(
                <tr key={c.codigo_cliente+c.filial} onClick={()=>setClienteSelecionado(c)} style={{ borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background 0.15s" }} onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.025)"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                  <td style={{ padding:"12px 16px",color:"rgba(255,255,255,0.4)",fontFamily:"monospace",fontSize:12 }}>{c.codigo_cliente}</td>
                  <td style={{ padding:"12px 16px",fontWeight:600 }}>{c.nome_cliente||"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:"rgba(255,255,255,0.5)",fontSize:12 }}>{c.filial}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:c.mens>0?"#34d399":"rgba(255,255,255,0.3)" }}>{c.mens>0?`R$ ${c.mens.toLocaleString("pt-BR",{minimumFractionDigits:2})}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:c.desl>0?"#38bdf8":"rgba(255,255,255,0.3)" }}>{c.desl||"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",color:c.custo>0?"#f472b6":"rgba(255,255,255,0.3)" }}>{c.custo>0?`R$ ${c.custo.toLocaleString("pt-BR")}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:c.mens>0?(c.resultado>=0?"#34d399":"#f87171"):"rgba(255,255,255,0.3)" }}>{c.mens>0?`R$ ${c.resultado.toLocaleString("pt-BR")}`:"—"}</td>
                  <td style={{ padding:"12px 16px",textAlign:"center" }}><span style={{ fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:99,background:cfg.bg,color:cfg.text }}>{c.status}</span></td>
                </tr>
              );})}
              {filtrado.length>0&&pagina===Math.ceil(filtrado.length/PER_PAGE)&&<tr style={{ borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)" }}><td colSpan={3} style={{ padding:"12px 16px",fontWeight:700,color:"rgba(255,255,255,0.6)",fontSize:12 }}>TOTAL ({filtrado.length} clientes)</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#34d399" }}>R$ {totais.mensalidade.toLocaleString("pt-BR",{minimumFractionDigits:2})}</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#38bdf8" }}>{totais.desl}</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:"#f472b6" }}>R$ {totais.custo.toLocaleString("pt-BR")}</td><td style={{ padding:"12px 16px",textAlign:"center",fontWeight:700,color:totais.resultado>=0?"#34d399":"#f87171" }}>R$ {totais.resultado.toLocaleString("pt-BR")}</td><td></td></tr>}
            </tbody>
          </table>
        </div>
        <Pagination total={filtrado.length} page={pagina} perPage={PER_PAGE} onChange={setPagina} />
      </Card>
      {clienteSelecionado&&<ClienteModal cliente={clienteSelecionado} dispatches={dispatches} onClose={()=>setClienteSelecionado(null)} supabaseClient={supabaseClient} />}
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email,setEmail]=useState("");const [senha,setSenha]=useState("");const [erro,setErro]=useState("");const [loading,setLoading]=useState(false);const [showSenha,setShowSenha]=useState(false);
  const [bloqueado,setBloqueado]=useState(isLockedOut());
  const [countdown,setCountdown]=useState(lockoutRemainingSeconds());

  // -- SEGURANÇA: countdown do bloqueio --
  useEffect(()=>{
    if(!bloqueado)return;
    const interval=setInterval(()=>{
      const rem=lockoutRemainingSeconds();
      setCountdown(rem);
      if(rem<=0){setBloqueado(false);setErro("");}
    },1000);
    return()=>clearInterval(interval);
  },[bloqueado]);

  async function handleLogin(){
    if(isLockedOut()){setBloqueado(true);setCountdown(lockoutRemainingSeconds());return;}
    setErro("");if(!email||!senha){setErro("Preencha e-mail e senha.");return;}
    // -- SEGURANÇA: validação básica de formato de e-mail antes de chamar API --
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())){setErro("Formato de e-mail inválido.");return;}
    setLoading(true);
    const{data,error}=await supabaseClient.auth.signInWithPassword({email:email.trim(),password:senha});
    if(error||!data.user){
      recordFailedAttempt();
      const rem=lockoutRemainingSeconds();
      if(rem>0){setBloqueado(true);setCountdown(rem);setErro("");}
      else{
        const tentativas=getLoginAttempts();
        const restantes=MAX_LOGIN_ATTEMPTS-tentativas;
        setErro(restantes>0?`E-mail ou senha incorretos. ${restantes} tentativa(s) restante(s).`:"E-mail ou senha incorretos.");
      }
      setLoading(false);return;
    }
    resetLoginAttempts();
    // -- Busca perfil; se não existir ou houver erro, entra como viewer --
    const{data:profile}=await supabaseClient.from("profiles").select("id,nome,perfil").eq("id",data.user.id).single();
    onLogin({...data.user,nome:profile?.nome||data.user.email,perfil:profile?.perfil||"viewer"});
    setLoading(false);
  }

  const inputStyle={width:"100%",padding:"11px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box",transition:"border 0.15s"};
  const minutosRestantes=Math.ceil(countdown/60);
  return(
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans','Segoe UI',sans-serif",padding:24,position:"relative",overflow:"hidden" }}>
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}} @keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{ position:"fixed",inset:0,zIndex:0 }}><div style={{ position:"absolute",inset:0,background:"rgba(8,12,20,0.85)" }} /></div>
      <div style={{ width:"100%",maxWidth:420,animation:"fadeIn 0.4s ease",position:"relative",zIndex:1 }}>
        <div style={{ textAlign:"center",marginBottom:36 }}>
          <div style={{ width:72,height:72,borderRadius:18,overflow:"hidden",margin:"0 auto 16px",boxShadow:"0 0 30px rgba(56,189,248,0.2)" }}>
              <img src={LOGO_AZUL} alt="Servis" style={{ width:"100%",height:"100%",objectFit:"cover" }} />
            </div>
          <h1 style={{ fontSize:22,fontWeight:800,color:"#fff",margin:"0 0 6px",letterSpacing:"-0.5px" }}>Central de Monitoramento</h1>
          <p style={{ fontSize:13,color:"rgba(255,255,255,0.3)",margin:0 }}>Dashboard Executivo de VTR</p>
        </div>
        <div style={{ background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:20,padding:32 }}>
          <h2 style={{ fontSize:16,fontWeight:700,color:"#fff",margin:"0 0 24px" }}>Entrar na plataforma</h2>
          {bloqueado?(
            <div style={{ textAlign:"center",padding:"24px 0" }}>
              <div style={{ fontSize:32,marginBottom:12 }}>🔒</div>
              <div style={{ fontSize:14,fontWeight:700,color:"#f87171",marginBottom:8 }}>Acesso temporariamente bloqueado</div>
              <div style={{ fontSize:12,color:"rgba(255,255,255,0.4)",lineHeight:1.6 }}>
                Muitas tentativas incorretas.<br/>
                Tente novamente em <span style={{ color:"#fbbf24",fontWeight:700 }}>{countdown}s</span> ({minutosRestantes} min).
              </div>
            </div>
          ):(
            <>
              <div style={{ marginBottom:16 }}>
                <label style={{ fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"rgba(255,255,255,0.4)",display:"block",marginBottom:8 }}>E-mail</label>
                <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setErro("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="seu@email.com" style={inputStyle} onFocus={e=>e.target.style.border="1px solid #38bdf8"} onBlur={e=>e.target.style.border="1px solid rgba(255,255,255,0.1)"} autoComplete="email" />
              </div>
              <div style={{ marginBottom:24 }}>
                <label style={{ fontSize:11,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.1em",color:"rgba(255,255,255,0.4)",display:"block",marginBottom:8 }}>Senha</label>
                <div style={{ position:"relative" }}>
                  <input type={showSenha?"text":"password"} value={senha} onChange={e=>{setSenha(e.target.value);setErro("");}} onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••" style={{ ...inputStyle,paddingRight:40 }} onFocus={e=>e.target.style.border="1px solid #38bdf8"} onBlur={e=>e.target.style.border="1px solid rgba(255,255,255,0.1)"} autoComplete="current-password" />
                  <button onClick={()=>setShowSenha(!showSenha)} style={{ position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"rgba(255,255,255,0.3)",cursor:"pointer",fontSize:14,padding:4 }}>{showSenha?"🙈":"👁"}</button>
                </div>
              </div>
              {erro&&<div style={{ marginBottom:16,padding:"10px 14px",borderRadius:10,background:"#ef444420",border:"1px solid #ef444440",color:"#f87171",fontSize:12 }}>⚠️ {erro}</div>}
              <button onClick={handleLogin} disabled={loading} style={{ width:"100%",padding:12,borderRadius:10,border:"none",background:loading?"rgba(56,189,248,0.4)":"#38bdf8",color:"#0a0f1a",fontWeight:800,fontSize:14,cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8 }}>
                {loading?<><div style={{ width:16,height:16,border:"2px solid #0a0f1a40",borderTopColor:"#0a0f1a",borderRadius:"50%",animation:"spin 0.7s linear infinite" }} />Entrando…</>:"Entrar →"}
              </button>
            </>
          )}
        </div>
        <p style={{ textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.15)",marginTop:20 }}>Acesso restrito · Solicite credenciais ao administrador</p>
      </div>
    </div>
  );
}

function UsuariosTab({ usuarioAtual }) {
  const [usuarios,setUsuarios]=useState([]);const [loading,setLoading]=useState(true);const [showForm,setShowForm]=useState(false);const [form,setForm]=useState({nome:"",email:"",senha:"",perfil:"viewer"});const [formErro,setFormErro]=useState("");const [salvando,setSalvando]=useState(false);const [editId,setEditId]=useState(null);const [confirmarDel,setConfirmarDel]=useState(null);const [msgSucesso,setMsgSucesso]=useState("");const [erroExclusao,setErroExclusao]=useState("");
  async function carregarUsuarios(){setLoading(true);const{data,error}=await supabaseClient.from("profiles").select("*").order("created_at");if(!error)setUsuarios(data||[]);setLoading(false);}
  useEffect(()=>{carregarUsuarios();},[]);
  async function salvar(){
    setFormErro("");setSalvando(true);if(!form.nome.trim()){setFormErro("Nome é obrigatório.");setSalvando(false);return;}if(!form.email.trim()){setFormErro("E-mail é obrigatório.");setSalvando(false);return;}
    if(editId){const{error}=await supabaseClient.from("profiles").update({nome:form.nome,perfil:form.perfil}).eq("id",editId);if(error){setFormErro("Erro ao salvar: "+error.message);setSalvando(false);return;}setMsgSucesso("Usuário atualizado!");}
    else{if(!form.senha.trim()||form.senha.length<6){setFormErro("Senha deve ter ao menos 6 caracteres.");setSalvando(false);return;}const{data,error}=await supabaseClient.auth.signUp({email:form.email,password:form.senha,options:{data:{nome:form.nome,perfil:form.perfil}}});if(error){setFormErro("Erro ao criar: "+error.message);setSalvando(false);return;}if(data?.user)await supabaseClient.from("profiles").upsert([{id:data.user.id,nome:form.nome,perfil:form.perfil}]);setMsgSucesso("Usuário criado! Um e-mail de confirmação foi enviado.");}
    await carregarUsuarios();setShowForm(false);setEditId(null);setForm({nome:"",email:"",senha:"",perfil:"viewer"});setSalvando(false);setTimeout(()=>setMsgSucesso(""),4000);

  async function excluir(id){

  const perfilStyle={admin:{label:"Admin",color:"#f87171",bg:"#ef444420",border:"#ef444440"},viewer:{label:"Visualizador",color:"#38bdf8",bg:"#38bdf820",border:"#38bdf840"}};
  return(

        <button onClick={()=>{setShowForm(true);setEditId(null);setForm({nome:"",email:"",senha:"",perfil:"viewer"});setFormErro("");}} style={{ padding:"9px 18px",borderRadius:10,border:"none",background:"#38bdf8",color:"#0a0f1a",fontWeight:700,fontSize:13,cursor:"pointer" }}>+ Novo Usuário</button>
      </div>

      {erroExclusao&&<div style={{ marginBottom:16,padding:"12px 16px",borderRadius:10,background:"#ef444420",border:"1px solid #ef444440",color:"#f87171",fontSize:13 }}>⚠️ {erroExclusao}</div>}

          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14 }}>
            {[{label:"Nome completo",key:"nome",type:"text",placeholder:"Ex: João Silva"},{label:"E-mail",key:"email",type:"email",placeholder:"Ex: joao@empresa.com",disabled:!!editId},...(!editId?[{label:"Senha (mín. 6 caracteres)",key:"senha",type:"password",placeholder:"••••••••"}]:[])].map(({label,key,type,placeholder,disabled})=>(

            ))}

                  <td style={{ padding:"14px 16px" }}><span style={{ display:"inline-flex",alignItems:"center",gap:5,borderRadius:999,border:`1px solid ${pl.border}`,background:pl.bg,color:pl.color,padding:"3px 10px",fontSize:11,fontWeight:700 }}>{pl.label}</span></td>
